  # Pipeline ARNs
  #############################################################################

  PipelineAl2023X8664Arn:
    Description: ARN of the Amazon Linux 2023 x86_64 Image Pipeline
    Value: !Ref ImagePipelineAl2023X8664

  PipelineAl2023Arm64Arn:
    Description: ARN of the Amazon Linux 2023 arm64 Image Pipeline
    Value: !Ref ImagePipelineAl2023Arm64

  PipelineUbuntu2404X8664Arn:
    Description: ARN of the Ubuntu 24.04 x86_64 Image Pipeline
    Value: !Ref ImagePipelineUbuntu2404X8664

  PipelineUbuntu2404Arm64Arn:
    Description: ARN of the Ubuntu 24.04 arm64 Image Pipeline
    Value: !Ref ImagePipelineUbuntu2404Arm64

  #############################################################################
  # SSM Parameter Paths (only shown when SSM publishing is enabled)
  #############################################################################

  SsmParameterAl2023X8664:
    Condition: EnableSsmPublishing
    Description: SSM Parameter path for Amazon Linux 2023 x86_64 AMI ID
    Value: !Sub '${SsmParameterPrefix}/al2023/x86_64/latest'

  SsmParameterAl2023Arm64:
    Condition: EnableSsmPublishing
    Description: SSM Parameter path for Amazon Linux 2023 arm64 AMI ID
    Value: !Sub '${SsmParameterPrefix}/al2023/arm64/latest'

  SsmParameterUbuntu2404X8664:
    Condition: EnableSsmPublishing
    Description: SSM Parameter path for Ubuntu 24.04 x86_64 AMI ID
    Value: !Sub '${SsmParameterPrefix}/ubuntu2404/x86_64/latest'

  SsmParameterUbuntu2404Arm64:
    Condition: EnableSsmPublishing
    Description: SSM Parameter path for Ubuntu 24.04 arm64 AMI ID
    Value: !Sub '${SsmParameterPrefix}/ubuntu2404/arm64/latest'

  #############################################################################
  # IAM Resources
  #############################################################################

  ImageBuilderRoleArn:
    Description: ARN of the IAM role for Image Builder
    Value: !GetAtt ImageBuilderRole.Arn

  ImageBuilderInstanceProfileArn:
    Description: ARN of the Instance Profile for Image Builder
    Value: !GetAtt ImageBuilderInstanceProfile.Arn

  #############################################################################
  # Component ARNs
  #############################################################################

  PcsAgentInstallerComponentArn:
    Description: ARN of the PCS Agent Installer component
    Value: !Ref PcsAgentInstallerComponent

  Slurm2411InstallerComponentArn:
    Description: ARN of the Slurm 24.11 Installer component
    Value: !Ref Slurm2411InstallerComponent

  Slurm2505InstallerComponentArn:
    Description: ARN of the Slurm 25.05 Installer component
    Value: !Ref Slurm2505InstallerComponent

  SlurmPathConfigComponentArn:
    Description: ARN of the Slurm PATH Configuration component
    Value: !Ref SlurmPathConfigComponent

  EfsUtilsInstallerComponentArn:
    Description: ARN of the EFS Utils Installer component
    Value: !Ref EfsUtilsInstallerComponent

  CloudWatchAgentInstallerComponentArn:
    Description: ARN of the CloudWatch Agent Installer component
    Value: !Ref CloudWatchAgentInstallerComponent

  SsmAgentInstallerComponentArn:
    Description: ARN of the SSM Agent Installer component
    Value: !Ref SsmAgentInstallerComponent

  #############################################################################
  # Lifecycle Policy (only shown when lifecycle policy is enabled)
  #############################################################################

  LifecyclePolicyArn:
    Condition: EnableLifecycle
    Description: ARN of the AMI lifecycle policy
    Value: !GetAtt AmiLifecyclePolicy.Arn
