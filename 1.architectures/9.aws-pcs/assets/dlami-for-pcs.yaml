  #############################################################################
  # AMI Lifecycle Policy Resources
  # Deprecates old AMIs to keep EC2 console clean while preserving usability
  #############################################################################

  # IAM Role for lifecycle policy execution
  LifecyclePolicyRole:
    Type: AWS::IAM::Role
    Condition: EnableLifecycle
    Properties:
      Description: IAM role for Image Builder lifecycle policy execution
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: imagebuilder.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - !Sub arn:${AWS::Partition}:iam::aws:policy/service-role/EC2ImageBuilderLifecycleExecutionPolicy

  # Lifecycle policy to deprecate old AMIs
  # Deprecated AMIs remain usable by PCS but are hidden from EC2 console searches
  AmiLifecyclePolicy:
    Type: AWS::ImageBuilder::LifecyclePolicy
    Condition: EnableLifecycle
    Properties:
      Name: !Sub 'dlami-for-pcs-lifecycle-${AWS::StackName}'
      Description: Deprecates old DLAMI for PCS AMIs while keeping them usable
      ExecutionRole: !GetAtt LifecyclePolicyRole.Arn
      ResourceType: AMI_IMAGE
      Status: ENABLED
      # Select AMIs by the SourceStack tag applied during distribution
      ResourceSelection:
        TagMap:
          SourceStack: !Ref 'AWS::StackName'
      PolicyDetails:
        - Action:
            Type: DEPRECATE
          Filter:
            Type: AGE
            Unit: WEEKS
            # Deprecate AMIs older than this many weeks
            Value: !Ref LifecycleDeprecateAfterWeeks
            # Always keep at least 1 AMI visible even if older than threshold
            RetainAtLeast: 1


