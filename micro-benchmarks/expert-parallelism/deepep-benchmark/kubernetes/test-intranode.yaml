apiVersion: kubeflow.org/v2beta1
kind: MPIJob
metadata:
  name: deepep-intranode
spec:
  runPolicy:
    cleanPodPolicy: Running
    backoffLimit: 3
  # Single node: one MPI process that spawns 8 local GPU ranks itself
  # (torch.multiprocessing.spawn). WORLD_SIZE defaults to 1, RANK to 0.
  slotsPerWorker: 1
  mpiReplicaSpecs:
    Launcher:
      replicas: 1
      template:
        spec:
          restartPolicy: OnFailure
          # The launcher runs the full benchmark image (~20GB) just to invoke
          # mpirun. Co-locate it on the GPU node pool, whose nodes have enough
          # ephemeral storage; small CPU nodes hit DiskPressure and evict it.
          nodeSelector:
            node.kubernetes.io/instance-type: ${INSTANCE_TYPE}
          tolerations:
          - key: nvidia.com/gpu
            operator: Exists
            effect: NoSchedule
          - key: workload
            value: bench
            operator: Equal
            effect: NoSchedule
          - key: capacity-reservation
            operator: Exists
            effect: NoSchedule
          containers:
          - image: ${IMAGE_URI}
            imagePullPolicy: IfNotPresent
            name: deepep-intranode-launcher
            resources:
              requests:
                cpu: "1"
                memory: 2Gi
            command:
            - /bin/bash
            - -c
            - |
              # SSH-launched workers do not inherit Dockerfile ENV, so pass every
              # needed variable through `mpirun -x`. Single node, so no MASTER_ADDR
              # is needed (the test defaults to 127.0.0.1).
              # Wait for each worker's sshd to accept connections before launching.
              # mpi-operator starts the launcher as soon as workers are Running, but
              # their sshd may not be ready yet; without this wait the launcher loses
              # the SSH race, exits non-zero, and burns Job retries (backoffLimit).
              for host in $(awk '{print $1}' /etc/mpi/hostfile); do
                until ssh -o ConnectTimeout=3 -o BatchMode=yes -o StrictHostKeyChecking=no "$host" true 2>/dev/null; do
                  echo "waiting for sshd on $host"; sleep 3
                done
              done
              /opt/amazon/openmpi/bin/mpirun \
                --allow-run-as-root --tag-output \
                -np 1 -N 1 --bind-to none \
                -x PATH -x LD_LIBRARY_PATH \
                -x FI_PROVIDER=efa \
                -x NVSHMEM_REMOTE_TRANSPORT=libfabric \
                -x NVSHMEM_LIBFABRIC_PROVIDER=efa \
                -x NCCL_SOCKET_IFNAME -x LD_PRELOAD \
                bash -c 'RANK=$OMPI_COMM_WORLD_RANK WORLD_SIZE=$OMPI_COMM_WORLD_SIZE \
                         python3 /DeepEP/tests/test_intranode.py'
    Worker:
      replicas: 1
      template:
        spec:
          nodeSelector:
            node.kubernetes.io/instance-type: ${INSTANCE_TYPE}
          tolerations:
          - key: nvidia.com/gpu
            operator: Exists
            effect: NoSchedule
          - key: workload
            value: bench
            operator: Equal
            effect: NoSchedule
          - key: capacity-reservation
            operator: Exists
            effect: NoSchedule
          containers:
          - image: ${IMAGE_URI}
            imagePullPolicy: IfNotPresent
            name: deepep-intranode-worker
            volumeMounts:
            - name: shmem
              mountPath: /dev/shm
            resources:
              limits:
                nvidia.com/gpu: ${GPU_PER_NODE}
                vpc.amazonaws.com/efa: ${EFA_PER_NODE}
                hugepages-2Mi: 5120Mi
                memory: 32000Mi
              requests:
                nvidia.com/gpu: ${GPU_PER_NODE}
                vpc.amazonaws.com/efa: ${EFA_PER_NODE}
                hugepages-2Mi: 5120Mi
                memory: 32000Mi
          volumes:
          - name: shmem
            hostPath:
              path: /dev/shm
