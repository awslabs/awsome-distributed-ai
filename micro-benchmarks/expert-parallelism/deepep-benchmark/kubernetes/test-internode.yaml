apiVersion: kubeflow.org/v2beta1
kind: MPIJob
metadata:
  name: deepep-internode
spec:
  runPolicy:
    cleanPodPolicy: Running
    backoffLimit: 20
  # One MPI slot per node: each worker process spawns 8 local GPU ranks itself
  # (torch.multiprocessing.spawn). The test reads WORLD_SIZE = number of nodes
  # and RANK = node rank, so MPI launches exactly one process per node.
  slotsPerWorker: 1
  mpiReplicaSpecs:
    Launcher:
      replicas: 1
      template:
        spec:
          restartPolicy: OnFailure
          containers:
          - image: ${IMAGE_URI}
            imagePullPolicy: IfNotPresent
            name: deepep-internode-launcher
            command:
            - /bin/bash
            - -c
            - |
              # MASTER_ADDR must be worker-0 and must resolve from the other workers
              # (the torch rendezvous runs on the worker pods). Read it from the
              # mpi-operator-injected hostfile so we use exactly the DNS name the
              # operator made cluster-resolvable.
              MASTER_ADDR=$(head -n1 /etc/mpi/hostfile | awk '{print $1}')
              # SSH-launched workers do not inherit Dockerfile ENV, so pass every
              # needed variable through `mpirun -x`.
              /opt/amazon/openmpi/bin/mpirun \
                --allow-run-as-root --tag-output \
                -np ${NUM_NODES} -N 1 --bind-to none \
                -x PATH -x LD_LIBRARY_PATH \
                -x FI_PROVIDER=efa \
                -x NVSHMEM_REMOTE_TRANSPORT=libfabric \
                -x NVSHMEM_LIBFABRIC_PROVIDER=efa \
                -x NCCL_SOCKET_IFNAME -x LD_PRELOAD \
                -x MASTER_ADDR=$MASTER_ADDR -x MASTER_PORT=8361 \
                bash -c 'RANK=$OMPI_COMM_WORLD_RANK WORLD_SIZE=$OMPI_COMM_WORLD_SIZE \
                         python3 /DeepEP/tests/test_internode.py'
    Worker:
      replicas: ${NUM_NODES}
      template:
        spec:
          nodeSelector:
            node.kubernetes.io/instance-type: ${INSTANCE_TYPE}
          tolerations:
          - key: nvidia.com/gpu
            operator: Exists
            effect: NoSchedule
          - key: workload
            value: bench
            operator: Equal
            effect: NoSchedule
          - key: capacity-reservation
            operator: Exists
            effect: NoSchedule
          containers:
          - image: ${IMAGE_URI}
            imagePullPolicy: IfNotPresent
            name: deepep-internode-worker
            volumeMounts:
            - name: shmem
              mountPath: /dev/shm
            resources:
              limits:
                nvidia.com/gpu: ${GPU_PER_NODE}
                vpc.amazonaws.com/efa: ${EFA_PER_NODE}
                hugepages-2Mi: 5120Mi
                memory: 32000Mi
              requests:
                nvidia.com/gpu: ${GPU_PER_NODE}
                vpc.amazonaws.com/efa: ${EFA_PER_NODE}
                hugepages-2Mi: 5120Mi
                memory: 32000Mi
          volumes:
          - name: shmem
            hostPath:
              path: /dev/shm
