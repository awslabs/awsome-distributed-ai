apiVersion: kubeflow.org/v2beta1
kind: MPIJob
metadata:
  name: uccl-ep-internode
spec:
  runPolicy:
    cleanPodPolicy: Running
    backoffLimit: 3
  # 8 MPI slots per node: mpirun launches one rank per GPU (the UCCL bench runs
  # one process per GPU and initializes torch.distributed directly). Rank /
  # world-size / local-rank come from the OMPI_* env, mapped to the standard
  # torch.distributed env contract (RANK/WORLD_SIZE/LOCAL_RANK/LOCAL_WORLD_SIZE),
  # so no torchrun launcher is needed.
  slotsPerWorker: 8
  mpiReplicaSpecs:
    Launcher:
      replicas: 1
      template:
        spec:
          restartPolicy: OnFailure
          # The launcher runs the full benchmark image just to invoke mpirun.
          # Co-locate it on the GPU node pool, whose nodes have enough ephemeral
          # storage; small CPU nodes hit DiskPressure and evict it.
          nodeSelector:
            node.kubernetes.io/instance-type: ${INSTANCE_TYPE}
          tolerations:
          - key: nvidia.com/gpu
            operator: Exists
            effect: NoSchedule
          - key: capacity-reservation
            operator: Exists
            effect: NoSchedule
          containers:
          - image: ${IMAGE_URI}
            imagePullPolicy: IfNotPresent
            name: uccl-ep-internode-launcher
            resources:
              requests:
                cpu: "1"
                memory: 2Gi
            command:
            - /bin/bash
            - -c
            - |
              # MASTER_ADDR must be worker-0 and resolve from the other workers
              # (the torch rendezvous runs on the worker pods). Read it from the
              # mpi-operator-injected hostfile so we use exactly the DNS name the
              # operator made cluster-resolvable.
              # Wait for each worker's sshd before launching: mpi-operator starts
              # the launcher as soon as workers are Running, but their sshd may not
              # be ready yet; without this wait the launcher loses the SSH race.
              for host in $(awk '{print $1}' /etc/mpi/hostfile); do
                until ssh -o ConnectTimeout=3 -o BatchMode=yes -o StrictHostKeyChecking=no "$host" true 2>/dev/null; do
                  echo "waiting for sshd on $host"; sleep 3
                done
              done
              MASTER_ADDR=$(head -n1 /etc/mpi/hostfile | awk '{print $1}')
              # SSH-launched workers do not inherit Dockerfile ENV, so pass every
              # needed variable through `mpirun -x`. Map the OMPI per-rank vars to
              # the torch.distributed env contract on each rank.
              /opt/amazon/openmpi/bin/mpirun \
                --allow-run-as-root --tag-output \
                -np ${NP} -N ${GPU_PER_NODE} --bind-to none \
                -x PATH -x LD_LIBRARY_PATH -x LD_PRELOAD \
                -x FI_PROVIDER=efa \
                -x FI_EFA_USE_DEVICE_RDMA=1 \
                -x FI_EFA_FORK_SAFE=1 \
                -x NCCL_SOCKET_IFNAME \
                -x OMP_NUM_THREADS=8 \
                -x PYTHONFAULTHANDLER=1 \
                -x MASTER_ADDR=$MASTER_ADDR -x MASTER_PORT=29400 \
                bash -c 'cd /opt/uccl/ep && \
                         RANK=$OMPI_COMM_WORLD_RANK \
                         WORLD_SIZE=$OMPI_COMM_WORLD_SIZE \
                         LOCAL_RANK=$OMPI_COMM_WORLD_LOCAL_RANK \
                         LOCAL_WORLD_SIZE=$OMPI_COMM_WORLD_LOCAL_SIZE \
                         python3 bench/test_internode.py \
                           --num-tokens=4096 \
                           --hidden=7168 \
                           --num-topk=8 \
                           --num-experts=256 \
                           --test-ll-compatibility'
    Worker:
      replicas: ${NUM_NODES}
      template:
        spec:
          nodeSelector:
            node.kubernetes.io/instance-type: ${INSTANCE_TYPE}
          tolerations:
          - key: nvidia.com/gpu
            operator: Exists
            effect: NoSchedule
          - key: capacity-reservation
            operator: Exists
            effect: NoSchedule
          containers:
          - image: ${IMAGE_URI}
            imagePullPolicy: IfNotPresent
            name: uccl-ep-internode-worker
            # The internode tuning phase profiles kernels via CUPTI. Nodes that
            # load the driver with NVreg_RestrictProfilingToAdminUsers=1 need
            # SYS_ADMIN to profile. Remove if your nodes permit non-admin profiling.
            securityContext:
              capabilities:
                add: ["SYS_ADMIN"]
            volumeMounts:
            - name: shmem
              mountPath: /dev/shm
            resources:
              limits:
                nvidia.com/gpu: ${GPU_PER_NODE}
                vpc.amazonaws.com/efa: ${EFA_PER_NODE}
                hugepages-2Mi: 5120Mi
                memory: 32000Mi
              requests:
                nvidia.com/gpu: ${GPU_PER_NODE}
                vpc.amazonaws.com/efa: ${EFA_PER_NODE}
                hugepages-2Mi: 5120Mi
                memory: 32000Mi
          volumes:
          - name: shmem
            hostPath:
              path: /dev/shm
