AWSTemplateFormatVersion: '2010-09-09'
Description: >
  Network and storage prerequisites for an ML PCS cluster: a VPC with one public and
  one private subnet, a security group, an FSx for Lustre filesystem (high-speed
  shared scratch, /fsx), and an FSx for OpenZFS filesystem (home directories, /home).
  A public and a private subnet are created in the Availability Zone you provide. It
  also deploys an Internet Gateway, a NAT Gateway in the public subnet, and an Amazon
  S3 VPC endpoint. The VPC has two CIDR blocks (10.0.0.0/16 public, 10.1.0.0/16
  private). FSx for Lustre defaults to 1.2 TB; deployment types/throughput are parameters.


####################
## Stack Metadata ##
####################

Metadata:
  AWS::CloudFormation::Interface:
    ParameterGroups:
      - Label:
          default: General configuration
        Parameters:
          - VPCName
      - Label:
          default: Availability Zone configuration for the subnets
        Parameters:
          - PrimarySubnetAZ
      - Label:
          default: FSx for Lustre (/fsx) storage size
        Parameters:
          - Capacity
          - FSxLustreEnableEfa
      - Label:
          default: Network and S3 endpoints configuration
        Parameters:
          - CreateS3Endpoint
    ParameterLabels:
      VPCName:
        default: Name of your VPC
      FSxLustreEnableEfa:
        default: Enable EFA + GDS on FSx for Lustre (PERSISTENT_2 only)
      PrimarySubnetAZ:
        default: Availability zone id to deploy the primary subnets
      CreateS3Endpoint:
        default: Create an S3 endpoint

######################
## Stack Parameters ##
######################

Parameters:
  VPCName:
    Description: Name of your VPC
    Default: 'ML-Cluster-VPC'
    Type: String

  PrimarySubnetAZ:
    Description: Availability zone id in which the public subnet and primary private subnet will be created.
    Type: AWS::EC2::AvailabilityZone::Name

  CreateS3Endpoint:
    AllowedValues:
      - 'true'
      - 'false'
    Default: 'true'
    Description:
      Set to false if to avoid creating an S3 endpoint on your VPC.
    Type: String

  Capacity:
    Description: Storage capacity in GiB (1200 or increments of 2400)
    Type: Number
    Default: 1200

  LustreDeploymentType:
    Description: >-
      FSx for Lustre deployment type. PERSISTENT_2 is the latest generation
      (throughput per TiB of 125/250/500/1000) but is not available in every
      Region; PERSISTENT_1 (50/100/200) is available in more Regions. Check the
      FSx for Lustre Region table and pick the one your Region supports.
    Type: String
    Default: PERSISTENT_2
    AllowedValues:
      - PERSISTENT_2
      - PERSISTENT_1

  PerUnitStorageThroughput:
    Description: >-
      Provisioned Read/Write throughput per unit of storage (MB/s/TiB). Valid
      values depend on LustreDeploymentType: PERSISTENT_2 supports 125/250/500/1000,
      PERSISTENT_1 supports 50/100/200. If you change LustreDeploymentType you must
      pick a value valid for it (enforced by a template Rule below).
    Type: String
    Default: "250"
    AllowedValues: ["50", "100", "200", "125", "250", "500", "1000"]

  Compression:
    Description: Data compression type
    Type: String
    AllowedValues:
      - "LZ4"
      - "NONE"
    Default: "LZ4"
  
  LustreVersion:
    Description: Lustre software version
    Type: String
    AllowedValues:
      - "2.15"
      - "2.12"
    Default: "2.15"

  FSxLustreEnableEfa:
    Description: >-
      (Optional) Enable EFA on the FSx for Lustre filesystem. Default false.
      PERSISTENT_2 SSD only — a Rule below fails the stack at create time when
      combined with PERSISTENT_1 (rather than silently ignoring the opt-in).
      The headline feature is GPUDirect Storage (GDS) for P5/P5e/P5en/P6-B200
      GPU clients, which DMAs file data straight into GPU memory (the NVIDIA
      nvidia-fs/cuFile stack must be installed on the client — currently a
      ROADMAP follow-up). EFA-capable CPU CNGs (OnDemandEnableEfa=true) get
      the EFA transport path to storage as a secondary benefit, useful when a
      single client is pushing past ~10 GBps. **EFA-enabled Lustre has a
      much larger minimum storage capacity than the non-EFA default**: at
      PerUnitStorageThroughput=250 the minimum is 19200 GiB (16x the non-EFA
      default of 1200 GiB). Set Capacity to >= the EFA minimum when enabling
      this; the full minimum-capacity matrix per throughput tier is in the
      FSx for Lustre User Guide. The FSx side rejects undersized capacity at
      stack-create time with a clear error.
    Type: String
    Default: 'false'
    AllowedValues:
      - 'true'
      - 'false'

  HomeCapacity:
    Description: "Home directories storage capacity in GiB"
    Type: Number
    Default: 512

  HomeThroughput:
    Description: >-
      Home directories (FSx for OpenZFS) storage throughput (MB/s). Valid values
      depend on OpenZFSDeploymentType: SINGLE_AZ_HA_2 / SINGLE_AZ_2 =
      160/320/640/1280/2560/3840/5120/7680/10240; SINGLE_AZ_HA_1 / SINGLE_AZ_1 =
      64/128/256/512/1024/2048/3072/4096. If you change OpenZFSDeploymentType you
      must pick a value valid for it (enforced by a template Rule below).
    Type: String
    Default: "320"
    AllowedValues:
      ["64", "128", "256", "512", "1024", "2048", "3072", "4096",
       "160", "320", "640", "1280", "2560", "3840", "5120", "7680", "10240"]

  OpenZFSDeploymentType:
    Description: >-
      FSx for OpenZFS deployment type for the /home file system. SINGLE_AZ_HA_2
      (the default) is not available in every Region; SINGLE_AZ_1 is available in
      all Regions. SINGLE_AZ_HA_1 / SINGLE_AZ_2 are also offered in some Regions.
      Check the FSx for OpenZFS Region table and pick one your Region supports.
      (MULTI_AZ types are intentionally excluded — they require a second subnet
      this template does not provision.)
    Type: String
    Default: SINGLE_AZ_HA_2
    AllowedValues:
      - SINGLE_AZ_HA_2
      - SINGLE_AZ_HA_1
      - SINGLE_AZ_2
      - SINGLE_AZ_1


###########################################
## Rules: validate FSx throughput vs type ##
###########################################
# FSx throughput is a discrete grid that depends on the chosen deployment type.
# Reject an invalid (DeploymentType, throughput) pair at stack-create time with a
# clear message, instead of an opaque CreateFileSystem failure later.
Rules:
  LustrePersistent1Throughput:
    RuleCondition: !Equals [!Ref LustreDeploymentType, 'PERSISTENT_1']
    Assertions:
      - Assert: !Contains [["50", "100", "200"], !Ref PerUnitStorageThroughput]
        AssertDescription: >-
          PERSISTENT_1 supports PerUnitStorageThroughput of 50, 100, or 200 MB/s/TiB only.
  LustrePersistent2Throughput:
    RuleCondition: !Equals [!Ref LustreDeploymentType, 'PERSISTENT_2']
    Assertions:
      - Assert: !Contains [["125", "250", "500", "1000"], !Ref PerUnitStorageThroughput]
        AssertDescription: >-
          PERSISTENT_2 supports PerUnitStorageThroughput of 125, 250, 500, or 1000 MB/s/TiB only.
  OpenZFS64GridThroughput:
    RuleCondition: !Or
      - !Equals [!Ref OpenZFSDeploymentType, 'SINGLE_AZ_1']
      - !Equals [!Ref OpenZFSDeploymentType, 'SINGLE_AZ_HA_1']
    Assertions:
      - Assert: !Contains [["64", "128", "256", "512", "1024", "2048", "3072", "4096"], !Ref HomeThroughput]
        AssertDescription: >-
          SINGLE_AZ_1 / SINGLE_AZ_HA_1 support HomeThroughput of
          64/128/256/512/1024/2048/3072/4096 MB/s only.
  OpenZFS160GridThroughput:
    RuleCondition: !Or
      - !Equals [!Ref OpenZFSDeploymentType, 'SINGLE_AZ_2']
      - !Equals [!Ref OpenZFSDeploymentType, 'SINGLE_AZ_HA_2']
    Assertions:
      - Assert: !Contains [["160", "320", "640", "1280", "2560", "3840", "5120", "7680", "10240"], !Ref HomeThroughput]
        AssertDescription: >-
          SINGLE_AZ_2 / SINGLE_AZ_HA_2 support HomeThroughput of
          160/320/640/1280/2560/3840/5120/7680/10240 MB/s only.
  # FSx EFA + GDS is a PERSISTENT_2-only feature. Fail fast if a user opts in on
  # PERSISTENT_1 instead of silently dropping the EfaEnabled property.
  FSxLustreEfaRequiresPersistent2:
    RuleCondition: !Equals [!Ref FSxLustreEnableEfa, 'true']
    Assertions:
      - Assert: !Equals [!Ref LustreDeploymentType, 'PERSISTENT_2']
        AssertDescription: >-
          FSxLustreEnableEfa=true requires LustreDeploymentType=PERSISTENT_2
          (EFA on FSx for Lustre is a PERSISTENT_2-only feature).


###############################
## Conditions for Parameters ##
###############################

Conditions:
  S3EndpointCondition: !Equals [!Ref 'CreateS3Endpoint', 'true']
  # PERSISTENT_2 is the only Lustre deployment type that supports a metadata
  # configuration (and the EFA/Intelligent-Tiering features); PERSISTENT_1 does
  # not, so the MetadataConfiguration block is only emitted for PERSISTENT_2.
  LustreIsPersistent2: !Equals [!Ref 'LustreDeploymentType', 'PERSISTENT_2']
  # EFA on Lustre is a PERSISTENT_2-only feature; the
  # FSxLustreEfaRequiresPersistent2 Rule above already fails the stack at
  # create time on PERSISTENT_1, so the !And here is just defense-in-depth so
  # this template's resource synthesis is still correct in isolation.
  FSxLustreEfaEnabled: !And
    - !Equals [!Ref 'FSxLustreEnableEfa', 'true']
    - !Condition LustreIsPersistent2

#########################
## VPC & Network Setup ##
#########################

Mappings:
  Networking:
    VPC:
      CIDR0: 10.0.0.0/16
      CIDR1: 10.1.0.0/16

Resources:
  # Create a VPC
  VPC:
    Type: AWS::EC2::VPC
    Properties:
      EnableDnsSupport: true
      EnableDnsHostnames: true
      CidrBlock: !FindInMap [Networking, VPC, CIDR0]
      Tags:
        - Key: Name
          Value: ML Cluster VPC

  VpcCidrBlock:
    Type: AWS::EC2::VPCCidrBlock
    DependsOn: VPC
    Properties:
      VpcId: !Ref VPC
      CidrBlock: !FindInMap [Networking, VPC, CIDR1]


  # Create an IGW and add it to the VPC
  InternetGateway:
    Type: AWS::EC2::InternetGateway

  GatewayToInternet:
    Type: AWS::EC2::VPCGatewayAttachment
    Properties:
      VpcId: !Ref VPC
      InternetGatewayId: !Ref InternetGateway

  # Create a NAT GW then add it to the public subnet
  NATGateway:
    Type: AWS::EC2::NatGateway
    Properties:
      AllocationId: !GetAtt ElasticIP.AllocationId
      SubnetId: !Ref PublicSubnet

  ElasticIP:
    Type: AWS::EC2::EIP
    Properties:
      Domain: vpc

  SecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Allow EFA communication for Multi-Node Parallel Batch jobs
      VpcId: !Ref VPC
  EFASecurityGroupIngress:
    Type: AWS::EC2::SecurityGroupIngress
    Properties:
      Description: All to all communication for EFA Ingress within Security Group
      IpProtocol: -1
      FromPort: -1
      ToPort: -1
      GroupId: !Ref SecurityGroup
      SourceSecurityGroupId: !Ref SecurityGroup
  EFASecurityGroupEgress:
    Type: AWS::EC2::SecurityGroupEgress
    Properties:
      Description: All to all communication for EFA Egress  within Security Group
      IpProtocol: -1
      FromPort: -1
      ToPort: -1
      GroupId: !Ref SecurityGroup
      DestinationSecurityGroupId: !Ref SecurityGroup
  EFASecurityGroupEgressECS:
    Type: AWS::EC2::SecurityGroupEgress
    Properties:
      Description: All to all communication for Egress to all
      IpProtocol: -1
      FromPort: -1
      ToPort: -1
      GroupId: !Ref SecurityGroup
      CidrIp: 0.0.0.0/0

  # Build the public subnet
  PublicSubnet:
    Type: AWS::EC2::Subnet
    DependsOn: VPC
    Properties:
      MapPublicIpOnLaunch: true
      VpcId: !Ref VPC
      CidrBlock: !Select [ 0, !Cidr [ !GetAtt VPC.CidrBlock, 2, 15 ]]
      AvailabilityZone: !Ref PrimarySubnetAZ
      Tags:
        - Key: Name
          Value: !Join [ ' ', [ !Ref VPCName, 'Public Subnet -', !Ref PrimarySubnetAZ ] ]

  # Create the primary private subnet
  PrimaryPrivateSubnet:
    Type: AWS::EC2::Subnet
    DependsOn: [VpcCidrBlock]
    Properties:
      VpcId: !Ref VPC
      CidrBlock: !Select [ 0, !Cidr [ !FindInMap [Networking, VPC, CIDR1], 2, 15 ]]
      AvailabilityZone: !Ref PrimarySubnetAZ
      Tags:
        - Key: Name
          Value: !Join [ ' ', [ !Ref VPCName, 'Private Subnet -', !Ref PrimarySubnetAZ ] ]

  # Create and set the public route table
  PublicRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref VPC

  PublicRoute:
    Type: AWS::EC2::Route
    Properties:
      RouteTableId: !Ref PublicRouteTable
      DestinationCidrBlock: 0.0.0.0/0
      GatewayId: !Ref InternetGateway

  # Then the private route table
  PrivateRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref VPC

  PrivateRouteToInternet:
    Type: AWS::EC2::Route
    Properties:
      RouteTableId: !Ref PrivateRouteTable
      DestinationCidrBlock: 0.0.0.0/0
      NatGatewayId: !Ref NATGateway

  # Associate the public route table to the public subnet
  PublicSubnetRouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PublicSubnet
      RouteTableId: !Ref PublicRouteTable

  # and the primary private subnet to the private route table
  PrimaryPrivateSubnetRTAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PrimaryPrivateSubnet
      RouteTableId: !Ref PrivateRouteTable

  # S3 endpoint
  S3Endpoint:
    Condition: S3EndpointCondition
    Type: AWS::EC2::VPCEndpoint
    Properties:
      PolicyDocument:
        Version: 2012-10-17
        Statement:
            - Effect: Allow
              Principal: '*'
              Action:
                - '*'
              Resource:
                - '*'
      RouteTableIds:
        - !Ref PublicRouteTable
        - !Ref PrivateRouteTable
      ServiceName: !Join
        - ''
        - - com.amazonaws.
          - !Ref AWS::Region
          - .s3
      VpcId: !Ref VPC

  FSxLFilesystem:
    Type: AWS::FSx::FileSystem
    DeletionPolicy: Delete
    UpdateReplacePolicy: Delete
    Properties:
      FileSystemType: LUSTRE
      StorageType: SSD
      FileSystemTypeVersion: !Ref LustreVersion
      StorageCapacity: !Ref Capacity
      SecurityGroupIds:
        - !Ref SecurityGroup
      SubnetIds:
        - !Ref PrimaryPrivateSubnet
      LustreConfiguration:
        DataCompressionType: !Ref Compression
        DeploymentType: !Ref LustreDeploymentType
        PerUnitStorageThroughput: !Ref PerUnitStorageThroughput
        # MetadataConfiguration is only valid on PERSISTENT_2.
        MetadataConfiguration: !If
          - LustreIsPersistent2
          - Mode: AUTOMATIC
          - !Ref AWS::NoValue
        # EfaEnabled enables EFA + GPUDirect Storage (GDS) on the FSx-side
        # endpoints. PERSISTENT_2 only; the FSxLustreEfaEnabled condition gates
        # both the user toggle and the deployment-type prerequisite.
        EfaEnabled: !If
          - FSxLustreEfaEnabled
          - true
          - !Ref AWS::NoValue


  OpenZFSFileSystem:
    Type: AWS::FSx::FileSystem
    Properties:
      FileSystemType: OPENZFS
      OpenZFSConfiguration: 
        AutomaticBackupRetentionDays: 30
        CopyTagsToBackups: Yes
        CopyTagsToVolumes: Yes
        DailyAutomaticBackupStartTime: '19:00'
        DeploymentType: !Ref OpenZFSDeploymentType
        Options: 
          - DELETE_CHILD_VOLUMES_AND_SNAPSHOTS
        RootVolumeConfiguration: 
          DataCompressionType: NONE
          NfsExports: 
            - ClientConfigurations: 
              -  Clients: '*'
                 Options: 
                    - rw
                    - no_root_squash
                    - crossmnt
        ThroughputCapacity: !Ref HomeThroughput
        WeeklyMaintenanceStartTime: '1:04:00'
      SecurityGroupIds: 
        - !Ref SecurityGroup
      StorageCapacity: !Ref HomeCapacity
      StorageType: SSD
      SubnetIds: 
        - !Ref PrimaryPrivateSubnet

#############
## Outputs ##
#############
Outputs:
  VPC:
    Value: !Ref VPC
    Description: ID of the VPC
    Export:
      Name: !Sub ${AWS::StackName}-VPC
  PublicSubnet:
    Value: !Ref PublicSubnet
    Description: ID of the public subnet
    Export:
      Name: !Sub ${AWS::StackName}-PublicSubnet
  PrimaryPrivateSubnet:
    Value: !Ref PrimaryPrivateSubnet
    Description: ID of the primary private subnet
    Export:
      Name: !Sub ${AWS::StackName}-PrimaryPrivateSubnet
  PrivateSubnet:
    Value: !Ref PrimaryPrivateSubnet
    Description: ID of the primary private subnet (alias for compatibility)
    Export:
      Name: !Sub ${AWS::StackName}-PrivateSubnet
  SecurityGroup:
    Value: !Ref SecurityGroup
    Description: SecurityGroup for Batch
    Export:
      Name: !Sub ${AWS::StackName}-SecurityGroup
  FSxLustreFilesystemMountname:
    Description: The ID of the FSxL filesystem that has been created
    Value: !GetAtt FSxLFilesystem.LustreMountName
    Export:
      Name: !Sub ${AWS::StackName}-FSxLustreFilesystemMountname
  FSxLustreFilesystemDNSname:
    Description: The DNS of the FSxL filesystem that has been created
    Value: !GetAtt FSxLFilesystem.DNSName
    Export:
      Name: !Sub ${AWS::StackName}-FSxLustreFilesystemDNSname
  FSxLustreFilesystemId:
    Description: The ID of the FSxL filesystem that has been created
    Value: !Ref FSxLFilesystem
    Export:
      Name: !Sub ${AWS::StackName}-FSxLustreFilesystemId
  FSxORootVolumeId:
    Description: The ID of FSx for OpenZFS root volume
    Value: !GetAtt OpenZFSFileSystem.RootVolumeId
    Export:
      Name: !Sub ${AWS::StackName}-FSxORootVolumeId
  FSxOFilesystemId:
    Description: The ID of FSx for OpenZFS filesystem
    Value: !Ref OpenZFSFileSystem
    Export:
      Name: !Sub ${AWS::StackName}-FSxOFilesystemId
  FSxOpenZFSFilesystemId:
    Description: The ID of FSx for OpenZFS filesystem (alias for compatibility)
    Value: !Ref OpenZFSFileSystem
    Export:
      Name: !Sub ${AWS::StackName}-FSxOpenZFSFilesystemId
