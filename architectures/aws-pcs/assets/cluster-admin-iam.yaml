AWSTemplateFormatVersion: "2010-09-09"
Description: |
  Creates two customer-managed IAM policies that together grant the
  permissions a deploying principal needs to create / update / delete an
  AWS PCS reference cluster from the templates in architectures/aws-pcs/.
  Optionally attaches them to an IAM Group whose members become PCS cluster
  admins. The policy set is split into two because it exceeds the IAM
  per-policy 6144-char limit: a "core" policy for everyday cluster CRUD,
  and an optional "Image Builder" policy for the standalone DLAMI builder
  template (pcs-ready-dlami-with-enroot-pyxis.yaml).
Metadata:
  AWS::CloudFormation::Interface:
    ParameterGroups:
      - Label: { default: "Group + IAM users (optional)" }
        Parameters: [GroupName, AttachUsers, AttachImageBuilderPolicy]
    ParameterLabels:
      GroupName: { default: "Name of the IAM group to create" }
      AttachUsers: { default: "Existing IAM users to add to the group (comma-separated, optional)" }
      AttachImageBuilderPolicy: { default: "Also attach the Image Builder admin policy" }
Parameters:
  GroupName:
    Type: String
    Default: PCSClusterAdmins
    Description: IAM group name for cluster administrators
  AttachUsers:
    Type: CommaDelimitedList
    Default: ""
    Description: Comma-separated list of existing IAM user names to add to the group. Leave empty to skip.
  AttachImageBuilderPolicy:
    Type: String
    Default: "false"
    AllowedValues: ["true", "false"]
    Description: Attach the optional Image Builder admin policy (needed only when deploying pcs-ready-dlami-with-enroot-pyxis.yaml).
Conditions:
  HasUsers: !Not [!Equals [!Join ["", !Ref AttachUsers], ""]]
  AttachImageBuilder: !Equals [!Ref AttachImageBuilderPolicy, "true"]
Resources:
  PCSClusterAdminPolicy:
    Type: AWS::IAM::ManagedPolicy
    Properties:
      ManagedPolicyName: !Sub "${AWS::StackName}-PCSClusterAdmin-core"
      Description: "Core CFN+EC2+FSx+PCS+IAM(scoped)+SSM+KMS+Secrets+Logs permissions for AWS PCS cluster CRUD"
      PolicyDocument:
        {
          "Version": "2012-10-17",
          "Statement": [
            {
              "Sid": "CloudFormationStackLifecycle",
              "Effect": "Allow",
              "Action": [
                "cloudformation:CreateStack",
                "cloudformation:UpdateStack",
                "cloudformation:DeleteStack",
                "cloudformation:CancelUpdateStack",
                "cloudformation:ContinueUpdateRollback",
                "cloudformation:CreateChangeSet",
                "cloudformation:ExecuteChangeSet",
                "cloudformation:DescribeChangeSet",
                "cloudformation:DeleteChangeSet",
                "cloudformation:DescribeStacks",
                "cloudformation:DescribeStackEvents",
                "cloudformation:DescribeStackResource",
                "cloudformation:DescribeStackResources",
                "cloudformation:ListStackResources",
                "cloudformation:GetTemplate",
                "cloudformation:GetTemplateSummary",
                "cloudformation:TagResource",
                "cloudformation:UntagResource"
              ],
              "Resource": "*"
            },
            {
              "Sid": "CloudFormationDescribeStackless",
              "Effect": "Allow",
              "Action": [
                "cloudformation:ValidateTemplate",
                "cloudformation:ListStacks",
                "cloudformation:ListExports",
                "cloudformation:ListImports"
              ],
              "Resource": "*"
            },
            {
              "Sid": "EC2NetworkingAndComputeLifecycle",
              "Effect": "Allow",
              "Action": [
                "ec2:CreateVpc",
                "ec2:DeleteVpc",
                "ec2:ModifyVpcAttribute",
                "ec2:AssociateVpcCidrBlock",
                "ec2:DisassociateVpcCidrBlock",
                "ec2:CreateSubnet",
                "ec2:DeleteSubnet",
                "ec2:ModifySubnetAttribute",
                "ec2:CreateInternetGateway",
                "ec2:DeleteInternetGateway",
                "ec2:AttachInternetGateway",
                "ec2:DetachInternetGateway",
                "ec2:CreateNatGateway",
                "ec2:DeleteNatGateway",
                "ec2:AllocateAddress",
                "ec2:ReleaseAddress",
                "ec2:AssociateAddress",
                "ec2:DisassociateAddress",
                "ec2:CreateRouteTable",
                "ec2:DeleteRouteTable",
                "ec2:CreateRoute",
                "ec2:DeleteRoute",
                "ec2:ReplaceRoute",
                "ec2:AssociateRouteTable",
                "ec2:DisassociateRouteTable",
                "ec2:CreateSecurityGroup",
                "ec2:DeleteSecurityGroup",
                "ec2:AuthorizeSecurityGroupIngress",
                "ec2:AuthorizeSecurityGroupEgress",
                "ec2:RevokeSecurityGroupIngress",
                "ec2:RevokeSecurityGroupEgress",
                "ec2:UpdateSecurityGroupRuleDescriptionsIngress",
                "ec2:UpdateSecurityGroupRuleDescriptionsEgress",
                "ec2:CreateVpcEndpoint",
                "ec2:ModifyVpcEndpoint",
                "ec2:DeleteVpcEndpoints",
                "ec2:CreateLaunchTemplate",
                "ec2:CreateLaunchTemplateVersion",
                "ec2:ModifyLaunchTemplate",
                "ec2:DeleteLaunchTemplate",
                "ec2:DeleteLaunchTemplateVersions",
                "ec2:CreatePlacementGroup",
                "ec2:DeletePlacementGroup",
                "ec2:CreateNetworkInterface",
                "ec2:DeleteNetworkInterface",
                "ec2:ModifyNetworkInterfaceAttribute",
                "ec2:AttachNetworkInterface",
                "ec2:DetachNetworkInterface",
                "ec2:CreateTags",
                "ec2:DeleteTags",
                "ec2:RunInstances",
                "ec2:CreateFleet"
              ],
              "Resource": "*"
            },
            {
              "Sid": "EC2DescribeForPCS",
              "Effect": "Allow",
              "Action": [
                "ec2:Describe*",
                "ec2:GetSecurityGroupsForVpc"
              ],
              "Resource": "*"
            },
            {
              "Sid": "FSxLifecycle",
              "Effect": "Allow",
              "Action": [
                "fsx:CreateFileSystem",
                "fsx:UpdateFileSystem",
                "fsx:DeleteFileSystem",
                "fsx:DescribeFileSystems",
                "fsx:DescribeBackups",
                "fsx:CreateBackup",
                "fsx:DeleteBackup",
                "fsx:TagResource",
                "fsx:UntagResource",
                "fsx:ListTagsForResource"
              ],
              "Resource": "*"
            },
            {
              "Sid": "PCSFullAccess",
              "Effect": "Allow",
              "Action": [
                "pcs:*"
              ],
              "Resource": "*"
            },
            {
              "Sid": "IAMRoleAndInstanceProfileLifecycle",
              "Effect": "Allow",
              "Action": [
                "iam:CreateRole",
                "iam:DeleteRole",
                "iam:GetRole",
                "iam:UpdateAssumeRolePolicy",
                "iam:UpdateRole",
                "iam:UpdateRoleDescription",
                "iam:PutRolePolicy",
                "iam:DeleteRolePolicy",
                "iam:GetRolePolicy",
                "iam:ListRolePolicies",
                "iam:AttachRolePolicy",
                "iam:DetachRolePolicy",
                "iam:ListAttachedRolePolicies",
                "iam:CreateInstanceProfile",
                "iam:DeleteInstanceProfile",
                "iam:GetInstanceProfile",
                "iam:ListInstanceProfilesForRole",
                "iam:AddRoleToInstanceProfile",
                "iam:RemoveRoleFromInstanceProfile",
                "iam:TagRole",
                "iam:UntagRole",
                "iam:TagInstanceProfile",
                "iam:UntagInstanceProfile"
              ],
              "Resource": [
                "arn:aws:iam::*:role/*PCS*",
                "arn:aws:iam::*:role/*pcs*",
                "arn:aws:iam::*:role/*ImageBuilder*",
                "arn:aws:iam::*:instance-profile/*PCS*",
                "arn:aws:iam::*:instance-profile/*pcs*",
                "arn:aws:iam::*:instance-profile/*ImageBuilder*"
              ]
            },
            {
              "Sid": "IAMPassRoleToPCSAndEC2",
              "Effect": "Allow",
              "Action": "iam:PassRole",
              "Resource": [
                "arn:aws:iam::*:role/*PCS*",
                "arn:aws:iam::*:role/*pcs*"
              ],
              "Condition": {
                "StringEquals": {
                  "iam:PassedToService": [
                    "ec2.amazonaws.com",
                    "pcs.amazonaws.com"
                  ]
                }
              }
            },
            {
              "Sid": "ServiceLinkedRolesOneTime",
              "Effect": "Allow",
              "Action": "iam:CreateServiceLinkedRole",
              "Resource": "arn:aws:iam::*:role/aws-service-role/*",
              "Condition": {
                "StringLike": {
                  "iam:AWSServiceName": [
                    "pcs.amazonaws.com",
                    "spot.amazonaws.com",
                    "spotfleet.amazonaws.com",
                    "fsx.amazonaws.com",
                    "s3.data-source.lustre.fsx.amazonaws.com",
                    "imagebuilder.amazonaws.com"
                  ]
                }
              }
            },
            {
              "Sid": "SSMParameterLifecycle",
              "Effect": "Allow",
              "Action": [
                "ssm:PutParameter",
                "ssm:GetParameter",
                "ssm:GetParameters",
                "ssm:GetParametersByPath",
                "ssm:DeleteParameter",
                "ssm:DeleteParameters",
                "ssm:DescribeParameters",
                "ssm:AddTagsToResource",
                "ssm:RemoveTagsFromResource",
                "ssm:ListTagsForResource",
                "ssm:LabelParameterVersion"
              ],
              "Resource": [
                "arn:aws:ssm:*:*:parameter/pcs/*",
                "arn:aws:ssm:*:*:parameter/aws/service/*"
              ]
            },
            {
              "Sid": "KMSAccessForDefaultEncryption",
              "Effect": "Allow",
              "Action": [
                "kms:Decrypt",
                "kms:Encrypt",
                "kms:GenerateDataKey",
                "kms:GenerateDataKeyWithoutPlaintext",
                "kms:CreateGrant",
                "kms:DescribeKey"
              ],
              "Resource": "*"
            },
            {
              "Sid": "SecretsManagerForPCS",
              "Effect": "Allow",
              "Action": [
                "secretsmanager:CreateSecret",
                "secretsmanager:UpdateSecret",
                "secretsmanager:RotateSecret",
                "secretsmanager:DescribeSecret",
                "secretsmanager:DeleteSecret",
                "secretsmanager:TagResource",
                "secretsmanager:UntagResource"
              ],
              "Resource": "arn:aws:secretsmanager:*:*:secret:pcs!*"
            },
            {
              "Sid": "CloudWatchLogsForMonitoring",
              "Effect": "Allow",
              "Action": [
                "logs:CreateLogGroup",
                "logs:DeleteLogGroup",
                "logs:DescribeLogGroups",
                "logs:PutRetentionPolicy",
                "logs:TagResource",
                "logs:UntagResource",
                "logs:CreateDelivery",
                "logs:DeleteDelivery",
                "logs:GetDelivery",
                "logs:PutDeliverySource",
                "logs:DeleteDeliverySource",
                "logs:PutDeliveryDestination",
                "logs:DeleteDeliveryDestination"
              ],
              "Resource": "*"
            },
            {
              "Sid": "PCSVendedLogsDelivery",
              "Effect": "Allow",
              "Action": [
                "pcs:AllowVendedLogDeliveryForResource"
              ],
              "Resource": "*"
            }
          ]
        }
  PCSClusterAdminImageBuilderPolicy:
    Type: AWS::IAM::ManagedPolicy
    Condition: AttachImageBuilder
    Properties:
      ManagedPolicyName: !Sub "${AWS::StackName}-PCSClusterAdmin-imagebuilder"
      Description: "Image Builder permissions for the optional standalone DLAMI builder template"
      PolicyDocument:
        {
          "Version": "2012-10-17",
          "Statement": [
            {
              "Sid": "IAMPassRoleToImageBuilder",
              "Effect": "Allow",
              "Action": "iam:PassRole",
              "Resource": "arn:aws:iam::*:role/*ImageBuilder*",
              "Condition": {
                "StringEquals": {
                  "iam:PassedToService": "imagebuilder.amazonaws.com"
                }
              }
            },
            {
              "Sid": "ImageBuilderLifecycleOptional",
              "Effect": "Allow",
              "Action": [
                "imagebuilder:CreateImagePipeline",
                "imagebuilder:UpdateImagePipeline",
                "imagebuilder:DeleteImagePipeline",
                "imagebuilder:GetImagePipeline",
                "imagebuilder:ListImagePipelines",
                "imagebuilder:CreateImageRecipe",
                "imagebuilder:DeleteImageRecipe",
                "imagebuilder:GetImageRecipe",
                "imagebuilder:ListImageRecipes",
                "imagebuilder:CreateComponent",
                "imagebuilder:DeleteComponent",
                "imagebuilder:GetComponent",
                "imagebuilder:ListComponents",
                "imagebuilder:CreateInfrastructureConfiguration",
                "imagebuilder:UpdateInfrastructureConfiguration",
                "imagebuilder:DeleteInfrastructureConfiguration",
                "imagebuilder:GetInfrastructureConfiguration",
                "imagebuilder:ListInfrastructureConfigurations",
                "imagebuilder:CreateDistributionConfiguration",
                "imagebuilder:UpdateDistributionConfiguration",
                "imagebuilder:DeleteDistributionConfiguration",
                "imagebuilder:GetDistributionConfiguration",
                "imagebuilder:ListDistributionConfigurations",
                "imagebuilder:CreateImage",
                "imagebuilder:DeleteImage",
                "imagebuilder:GetImage",
                "imagebuilder:ListImages",
                "imagebuilder:StartImagePipelineExecution",
                "imagebuilder:CancelImageCreation",
                "imagebuilder:CreateLifecyclePolicy",
                "imagebuilder:UpdateLifecyclePolicy",
                "imagebuilder:DeleteLifecyclePolicy",
                "imagebuilder:GetLifecyclePolicy",
                "imagebuilder:ListLifecyclePolicies",
                "imagebuilder:TagResource",
                "imagebuilder:UntagResource",
                "imagebuilder:ListTagsForResource"
              ],
              "Resource": "*"
            }
          ]
        }
  PCSClusterAdminGroup:
    Type: AWS::IAM::Group
    Properties:
      GroupName: !Ref GroupName
      ManagedPolicyArns:
        - !Ref PCSClusterAdminPolicy
        - !If [AttachImageBuilder, !Ref PCSClusterAdminImageBuilderPolicy, !Ref "AWS::NoValue"]
  GroupMembership:
    Type: AWS::IAM::UserToGroupAddition
    Condition: HasUsers
    Properties:
      GroupName: !Ref PCSClusterAdminGroup
      Users: !Ref AttachUsers
Outputs:
  GroupName:
    Description: IAM group with cluster-admin permissions
    Value: !Ref PCSClusterAdminGroup
  CorePolicyArn:
    Description: ARN of the core admin managed policy
    Value: !Ref PCSClusterAdminPolicy
  ImageBuilderPolicyArn:
    Condition: AttachImageBuilder
    Description: ARN of the optional Image Builder admin managed policy
    Value: !Ref PCSClusterAdminImageBuilderPolicy
