AWSTemplateFormatVersion: '2010-09-09'
Description: Adding Compute Node Group to PCS Cluster

Metadata:
  AWS::CloudFormation::Interface:
    ParameterGroups:
      - Label:
          default: Additional Compute Node Group Settings
        Parameters:
          - CngName
          - QueueName
          - InstanceType
          - MaxCount
          - MinCount
      - Label:
          default: PCS Cluster configuration
        Parameters:
          - ClusterId
          - SubnetId
          - AmiId
          - ClusterSecurityGroupId
          - IamProfileArn
          - FSxLustreFilesystemId
          - FSxLustreFilesystemMountName
          - FSxOpenZFSFilesystemId
      - Label:
          default: Monitoring configuration
        Parameters:
          - DeployMonitoring
          - MonitoringVersion
          - MonitoringRole
      - Label:
          default: Post-install script (OnNodeConfigured)
        Parameters:
          - PostInstallScriptUrl
          - PostInstallScriptArgs

Parameters:
  ClusterId:
    Type: String
    Description: Cluster ID (actual PCS cluster ID like pcs_xxxxx)

  ClusterName:
    Type: String
    Description: User-friendly cluster name

  CngName:
    Type: String
    Description: Name for Compute Node Group

  QueueName:
    Type: String
    Description: Name for Queue (leave empty to skip queue creation)
    Default: ""

  InstanceType:
    Type: String
    Description: Instance Type for Compute Node Group

  RootVolumeSize:
    Type: Number
    Description: >-
      Root EBS volume size (GiB) for nodes. The PCS DLAMI default (~75 GiB) is
      too small for pulling/importing large container images; 300 GiB gives ample
      headroom.
    Default: 300
    MinValue: 75

  MaxCount:
    Type: Number
    Description: Maximum number of instance

  MinCount:
    Type: Number
    Description: Minimum number of instance. (it must be 0 if you want to use dynamic scaling)

  SubnetId:
    Type: AWS::EC2::Subnet::Id
    Description: Select the Subnet where the Compute Node will be launched

  AmiId:
    Type: AWS::EC2::Image::Id
    Description: Enter the AMI ID for the Login Node and Compute Node (e.g. ami-0abcdef1234567890)
    ConstraintDescription: Must be a valid AMI ID (ami-xxxxxxxxxxxxxxxxx)

  ClusterSecurityGroupId:
    Type: AWS::EC2::SecurityGroup::Id
    Description: Select SecurityGroup for Compute Node Group for Cluster Communication

  IamProfileArn:
    Type: String
    Description: IAM Instance Profile for Compute Node Group

  FSxLustreFilesystemId:
    Type: String
    Description: Filesystem ID for FSx for Lustre

  FSxLustreFilesystemMountName:
    Type: String
    Description: MountName for FSx for Lustre

  FSxOpenZFSFilesystemId:
    Type: String
    Description: Filesystem ID for FSx for OpenZFS

  DeployMonitoring:
    Type: String
    Description: Deploy monitoring stack (Prometheus/Grafana on Login Node, DCGM exporter on Compute Node with GPU)
    Default: 'false'
    AllowedValues:
      - 'true'
      - 'false'

  MonitoringVersion:
    Type: String
    Description: >-
      aws-parallelcluster-monitoring version to install, pinned to a release tag
      for upstream stability. Used both to fetch post-install.sh from that tag
      and as the version argument passed to it. Avoid 'latest'/'main' in
      production as upstream changes can break deployments.
    Default: 'v2.6.3'

  MonitoringRole:
    Type: String
    Description: Monitoring role for this node (login=head node with Prometheus/Grafana, compute=compute node with exporters, none=no monitoring)
    Default: 'none'
    AllowedValues:
      - 'login'
      - 'compute'
      - 'none'

  PostInstallScriptUrl:
    Type: String
    Description: >-
      Optional URL of a post-install script to download and run on each node at
      first boot (PCS equivalent of ParallelCluster OnNodeConfigured). Leave
      empty to skip. To install Enroot/Pyxis, point this at scripts/install-enroot-pyxis.sh.
      Must be an HTTP(S) URL (e.g. a GitHub raw URL); S3 public hosting is not allowed.
    Default: ''

  PostInstallScriptArgs:
    Type: String
    Description: Space-separated arguments passed to the post-install script.
    Default: ''

Conditions:
  CreateQueue: !Not [!Equals [!Ref QueueName, ""]]
  IsMonitoringLogin: !Equals [!Ref MonitoringRole, 'login']

Resources:

  # Compute Node groups - Compute Nodes
  PCSNodeGroupCompute:
    Type: AWS::PCS::ComputeNodeGroup
    Properties:
      ClusterId: !Ref ClusterId
      Name: !Ref CngName
      ScalingConfiguration:
        MinInstanceCount: !Ref MinCount
        MaxInstanceCount: !Ref MaxCount
      IamInstanceProfileArn: !Ref IamProfileArn
      CustomLaunchTemplate:
        TemplateId: !Ref PCSLaunchTemplate
        Version: 1
      SubnetIds:
        - !Ref SubnetId
      AmiId: !Ref AmiId
      InstanceConfigs:
        - InstanceType: !Ref InstanceType

  PCSQueueCompute:
    Type: AWS::PCS::Queue
    Condition: CreateQueue
    Properties:
      ClusterId: !Ref ClusterId
      Name: !Ref QueueName
      ComputeNodeGroupConfigurations:
        - ComputeNodeGroupId: !GetAtt [PCSNodeGroupCompute, Id]

  PCSLaunchTemplate:
    Type: AWS::EC2::LaunchTemplate
    Properties:
      LaunchTemplateName: !Sub 'PCS-lt-${AWS::StackName}'

      LaunchTemplateData:
        BlockDeviceMappings:
          - DeviceName: /dev/sda1
            Ebs:
              VolumeSize: !Ref RootVolumeSize
              VolumeType: gp3
              DeleteOnTermination: true
        TagSpecifications:
          - ResourceType: instance
            Tags:
              - Key: HPCRecipes
                Value: "true"
              # The Name tag doubles as the monitoring dashboards' node selector:
              # aws-parallelcluster-monitoring relabels __meta_ec2_tag_Name into the
              # instance_name label, and the upstream Grafana dashboards filter on the
              # literals "HeadNode" (login/head) and "Compute" (compute). A node with a
              # queue is a compute node; a node without one is the login/head node.
              - Key: Name
                Value: !If [CreateQueue, 'Compute', 'HeadNode']
              - Key: CngName
                Value: !Sub 'PCS-${CngName}'
              - Key: ClusterName
                Value: !Ref ClusterName
              - Key: pcs-cluster-id
                Value: !Ref ClusterId
              - !If
                - IsMonitoringLogin
                - Key: monitoring-role
                  Value: !Ref MonitoringRole
                - !Ref AWS::NoValue
        MetadataOptions:
          HttpEndpoint: enabled
          HttpPutResponseHopLimit: 4
          HttpTokens: required
          InstanceMetadataTags: enabled
        SecurityGroupIds:
          - !Ref ClusterSecurityGroupId
        UserData:
          Fn::Base64: !Sub |
            MIME-Version: 1.0
            Content-Type: multipart/mixed; boundary="==MYBOUNDARY=="

            --==MYBOUNDARY==
            Content-Type: text/cloud-config; charset="us-ascii"
            MIME-Version: 1.0
            
            runcmd:
            # Post-install script (optional) - generic OnNodeConfigured-style hook.
            # Downloads and runs a user-supplied script (e.g. Enroot/Pyxis install).
            - |
              if [ -n "${PostInstallScriptUrl}" ]; then
                echo "Downloading post-install script from ${PostInstallScriptUrl}..." | tee /var/log/pcs-post-install.log
                curl -fsSL "${PostInstallScriptUrl}" -o /tmp/pcs-post-install.sh
                chmod +x /tmp/pcs-post-install.sh
                echo "Executing post-install script..." | tee -a /var/log/pcs-post-install.log
                bash /tmp/pcs-post-install.sh ${PostInstallScriptArgs} >> /var/log/pcs-post-install.log 2>&1
                echo "Post-install script completed (exit $?)" | tee -a /var/log/pcs-post-install.log
              else
                echo "No post-install script configured (PostInstallScriptUrl empty)" | tee /var/log/pcs-post-install.log
              fi
            # FSx Home directories mount
            - mkdir -p /tmp/home
            - rsync -aA /home/ /tmp/home
            - echo "${FSxOpenZFSFilesystemId}.fsx.${AWS::Region}.amazonaws.com:/fsx/ /home nfs noatime,nfsvers=3,sync,nconnect=16,rsize=1048576,wsize=1048576,defaults 0 0" >> /etc/fstab
            - mount -a -t nfs defaults
            - if [ "enabled" = "$(sestatus | awk '/^SELinux status:/{print $3}')" ]; then setsebool -P use_nfs_home_dirs 1; fi
            - rsync -aA --ignore-existing /tmp/home/ /home
            - rm -rf /tmp/home/
            # If provided, mount FSxL filesystem as /fsx
            - if [ ! -z "${FSxLustreFilesystemId}" ]; then mkdir -p /fsx; mount -t lustre ${FSxLustreFilesystemId}.fsx.${AWS::Region}.amazonaws.com@tcp:/${FSxLustreFilesystemMountName} /fsx; chmod 1777 /fsx; fi
            # Monitoring stack installation (optional, enabled on Login Node only)
            - |
              if [ "${DeployMonitoring}" = "true" ]; then
                echo "Installing monitoring stack..."
                # Pin post-install.sh to the same release tag as MonitoringVersion for upstream stability.
                # As of v2.6.3 the installer auto-detects the Ubuntu 'ubuntu' user and runs install.sh
                # itself (aws-parallelcluster-monitoring PR #44), so no ec2-user shim or local-var patch
                # is needed here.
                curl -fsSL https://raw.githubusercontent.com/aws-samples/aws-parallelcluster-monitoring/${MonitoringVersion}/post-install.sh -o /tmp/post-install.sh
                bash /tmp/post-install.sh ${MonitoringVersion} 2>&1 | tee /var/log/monitoring-install.log
                echo "Monitoring installation complete"
              fi

            --==MYBOUNDARY==

Outputs:
  NodeGroupId:
    Description: Compute Node Group ID
    Value: !GetAtt PCSNodeGroupCompute.Id
  QueueId:
    Condition: CreateQueue
    Description: Queue ID
    Value: !GetAtt PCSQueueCompute.Id
