AWSTemplateFormatVersion: '2010-09-09'
Description: Adding Compute Node Group to PCS Cluster

Metadata:
  AWS::CloudFormation::Interface:
    ParameterGroups:
      - Label:
          default: Additional Compute Node Group Settings
        Parameters:
          - CngName
          - QueueName
          - InstanceType
          - MaxCount
          - MinCount
      - Label:
          default: PCS Cluster configuration
        Parameters:
          - ClusterId
          - SubnetId
          - AmiId
          - ClusterSecurityGroupId
          - IamProfileArn
          - FSxLustreFilesystemId
          - FSxLustreFilesystemMountName
          - FSxOpenZFSFilesystemId
      - Label:
          default: Monitoring configuration
        Parameters:
          - DeployMonitoring
          - MonitoringVersion
          - MonitoringRole

Parameters:
  ClusterId:
    Type: String
    Description: Cluster ID (actual PCS cluster ID like pcs_xxxxx)

  ClusterName:
    Type: String
    Description: User-friendly cluster name

  CngName:
    Type: String
    Description: Name for Compute Node Group

  QueueName:
    Type: String
    Description: Name for Queue (leave empty to skip queue creation)
    Default: ""

  InstanceType:
    Type: String
    Description: Instance Type for Compute Node Group

  MaxCount:
    Type: Number
    Description: Maximum number of instance

  MinCount:
    Type: Number
    Description: Minimum number of instance. (it must be 0 if you want to use dynamic scaling)

  SubnetId:
    Type: AWS::EC2::Subnet::Id
    Description: Select the Subnet where the Compute Node will be launched

  AmiId:
    Type: AWS::EC2::Image::Id
    Description: Enter the AMI ID for the Login Node and Compute Node (e.g. ami-0abcdef1234567890)
    ConstraintDescription: Must be a valid AMI ID (ami-xxxxxxxxxxxxxxxxx)

  ClusterSecurityGroupId:
    Type: AWS::EC2::SecurityGroup::Id
    Description: Select SecurityGroup for Compute Node Group for Cluster Communication

  IamProfileArn:
    Type: String
    Description: IAM Instance Profile for Compute Node Group

  FSxLustreFilesystemId:
    Type: String
    Description: Filesystem ID for FSx for Lustre

  FSxLustreFilesystemMountName:
    Type: String
    Description: MountName for FSx for Lustre

  FSxOpenZFSFilesystemId:
    Type: String
    Description: Filesystem ID for FSx for OpenZFS

  DeployMonitoring:
    Type: String
    Description: Deploy monitoring stack (Prometheus/Grafana on Login Node, DCGM exporter on Compute Node with GPU)
    Default: 'false'
    AllowedValues:
      - 'true'
      - 'false'

  MonitoringVersion:
    Type: String
    Description: Monitoring stack version (git tag or 'latest')
    Default: 'latest'

  MonitoringRole:
    Type: String
    Description: Monitoring role for this node (login=head node with Prometheus/Grafana, compute=compute node with exporters, none=no monitoring)
    Default: 'none'
    AllowedValues:
      - 'login'
      - 'compute'
      - 'none'

  InstallEnrootPyxis:
    Type: String
    Description: Install Enroot/Pyxis via UserData (only needed if using base AMI without Enroot/Pyxis pre-installed)
    Default: 'false'
    AllowedValues:
      - 'true'
      - 'false'

Conditions:
  CreateQueue: !Not [!Equals [!Ref QueueName, ""]]
  IsMonitoringLogin: !Equals [!Ref MonitoringRole, 'login']
  InstallEnrootPyxisEnabled: !Equals [!Ref InstallEnrootPyxis, 'true']

Resources:

  # Compute Node groups - Compute Nodes
  PCSNodeGroupCompute:
    Type: AWS::PCS::ComputeNodeGroup
    Properties:
      ClusterId: !Ref ClusterId
      Name: !Ref CngName
      ScalingConfiguration:
        MinInstanceCount: !Ref MinCount
        MaxInstanceCount: !Ref MaxCount
      IamInstanceProfileArn: !Ref IamProfileArn
      CustomLaunchTemplate:
        TemplateId: !Ref PCSLaunchTemplate
        Version: 1
      SubnetIds:
        - !Ref SubnetId
      AmiId: !Ref AmiId
      InstanceConfigs:
        - InstanceType: !Ref InstanceType

  PCSQueueCompute:
    Type: AWS::PCS::Queue
    Condition: CreateQueue
    Properties:
      ClusterId: !Ref ClusterId
      Name: !Ref QueueName
      ComputeNodeGroupConfigurations:
        - ComputeNodeGroupId: !GetAtt [PCSNodeGroupCompute, Id]

  PCSLaunchTemplate:
    Type: AWS::EC2::LaunchTemplate
    Properties:
      LaunchTemplateName: !Sub 'PCS-lt-${AWS::StackName}'

      LaunchTemplateData:
        TagSpecifications:
          - ResourceType: instance
            Tags:
              - Key: HPCRecipes
                Value: "true"
              - Key: Name
                Value: !Sub 'PCS-${CngName}'
              - Key: ClusterName
                Value: !Ref ClusterName
              - Key: pcs-cluster-id
                Value: !Ref ClusterId
              - !If
                - IsMonitoringLogin
                - Key: monitoring-role
                  Value: !Ref MonitoringRole
                - !Ref AWS::NoValue
        MetadataOptions:
          HttpEndpoint: enabled
          HttpPutResponseHopLimit: 4
          HttpTokens: required
          InstanceMetadataTags: enabled
        SecurityGroupIds:
          - !Ref ClusterSecurityGroupId
        UserData:
          Fn::Base64: !Sub |
            MIME-Version: 1.0
            Content-Type: multipart/mixed; boundary="==MYBOUNDARY=="

            --==MYBOUNDARY==
            Content-Type: text/cloud-config; charset="us-ascii"
            MIME-Version: 1.0
            
            runcmd:
            # Enroot/Pyxis Installation (optional)
            - |
              if [ "${InstallEnrootPyxis}" = "true" ]; then
                echo "Installing Enroot/Pyxis via UserData..." | tee /var/log/enroot-pyxis-install.log

                STABLE=1
                ENROOT_RELEASE=3.5.0
                PYXIS_RELEASE=v0.20.0
                SLURM_VERSIONS="25.05 25.11"

                set -exo pipefail

                apt-get update >> /var/log/enroot-pyxis-install.log 2>&1
                apt-get install -y jq squashfs-tools parallel fuse-overlayfs pigz squashfuse zstd git build-essential >> /var/log/enroot-pyxis-install.log 2>&1

                if nvidia-smi 2>/dev/null; then
                  echo "GPU detected, installing nvidia-container-toolkit..." | tee -a /var/log/enroot-pyxis-install.log
                  . /etc/os-release
                  distribution="$$ID$$VERSION_ID"
                  curl -fsSL https://nvidia.github.io/libnvidia-container/gpgkey | gpg --dearmor -o /usr/share/keyrings/nvidia-container-toolkit-keyring.gpg
                  curl -s -L https://nvidia.github.io/libnvidia-container/$$distribution/libnvidia-container.list | \
                    sed 's#deb https://#deb [signed-by=/usr/share/keyrings/nvidia-container-toolkit-keyring.gpg] https://#g' | \
                    tee /etc/apt/sources.list.d/nvidia-container-toolkit.list
                  apt-get update -y >> /var/log/enroot-pyxis-install.log 2>&1
                  apt-get install libnvidia-container-tools -y >> /var/log/enroot-pyxis-install.log 2>&1
                fi

                echo "Installing Enroot $$ENROOT_RELEASE..." | tee -a /var/log/enroot-pyxis-install.log
                arch=`dpkg --print-architecture`
                mkdir -p /tmp/enroot
                cd /tmp/enroot
                curl -fSsL -O https://github.com/NVIDIA/enroot/releases/download/v$$ENROOT_RELEASE/enroot_$$ENROOT_RELEASE-1_$$arch.deb
                curl -fSsL -O https://github.com/NVIDIA/enroot/releases/download/v$$ENROOT_RELEASE/enroot+caps_$$ENROOT_RELEASE-1_$$arch.deb
                apt install -y ./*.deb >> /var/log/enroot-pyxis-install.log 2>&1

                ln -sf /usr/share/enroot/hooks.d/50-slurm-pmi.sh /etc/enroot/hooks.d/
                ln -sf /usr/share/enroot/hooks.d/50-slurm-pytorch.sh /etc/enroot/hooks.d/

                mkdir -p /tmp/enroot /tmp/enroot/data
                chmod 1777 /tmp/enroot /tmp/enroot/data

                wget -O /tmp/enroot.template.conf https://raw.githubusercontent.com/aws-samples/aws-parallelcluster-post-install-scripts/main/pyxis/enroot.template.conf
                ENROOT_CACHE_PATH=/tmp/enroot envsubst < /tmp/enroot.template.conf > /etc/enroot/enroot.conf
                chmod 0644 /etc/enroot/enroot.conf

                echo "Installing Pyxis $$PYXIS_RELEASE..." | tee -a /var/log/enroot-pyxis-install.log
                for SLURM_VERSION in $$$SLURM_VERSIONS; do
                  echo "Installing Pyxis for Slurm $$SLURM_VERSION" | tee -a /var/log/enroot-pyxis-install.log
                  SLURM_PATH="/opt/aws/pcs/scheduler/slurm-$$SLURM_VERSION"
                  SLURM_ETC_PATH="/etc/aws/pcs/scheduler/slurm-$$SLURM_VERSION"

                  if [ ! -d /tmp/pyxis ]; then
                    git clone --depth 1 --branch $$PYXIS_RELEASE https://github.com/NVIDIA/pyxis.git /tmp/pyxis >> /var/log/enroot-pyxis-install.log 2>&1
                  fi

                  cd /tmp/pyxis
                  make clean >> /var/log/enroot-pyxis-install.log 2>&1 || true
                  CPPFLAGS="-I $$SLURM_PATH/include/" make >> /var/log/enroot-pyxis-install.log 2>&1
                  CPPFLAGS="-I $$SLURM_PATH/include/" make install >> /var/log/enroot-pyxis-install.log 2>&1

                  mkdir -p $$SLURM_ETC_PATH/plugstack.conf.d
                  ln -sf /usr/local/share/pyxis/pyxis.conf $$SLURM_ETC_PATH/plugstack.conf.d/pyxis.conf

                  echo "Pyxis installed for Slurm $$SLURM_VERSION" | tee -a /var/log/enroot-pyxis-install.log
                done

                echo "PATH=/opt/aws/pcs/scheduler/slurm-25.11/bin:/usr/lib/ccache/bin:/usr/local/bin:/usr/bin:/bin" >> /etc/default/slurmd

                if nvidia-smi 2>/dev/null; then
                  echo "Loading GPU kernel modules..." | tee -a /var/log/enroot-pyxis-install.log
                  nvidia-container-cli --load-kmods info >> /var/log/enroot-pyxis-install.log 2>&1 || true
                fi

                echo "Enroot/Pyxis installation complete" | tee -a /var/log/enroot-pyxis-install.log
              else
                echo "Skipping Enroot/Pyxis installation (InstallEnrootPyxis=${InstallEnrootPyxis})" | tee /var/log/enroot-pyxis-install.log
              fi
            # FSx Home directories mount
            - mkdir -p /tmp/home
            - rsync -aA /home/ /tmp/home
            - echo "${FSxOpenZFSFilesystemId}.fsx.${AWS::Region}.amazonaws.com:/fsx/ /home nfs noatime,nfsvers=3,sync,nconnect=16,rsize=1048576,wsize=1048576,defaults 0 0" >> /etc/fstab
            - mount -a -t nfs defaults
            - if [ "enabled" = "$(sestatus | awk '/^SELinux status:/{print $3}')" ]; then setsebool -P use_nfs_home_dirs 1; fi
            - rsync -aA --ignore-existing /tmp/home/ /home
            - rm -rf /tmp/home/
            # If provided, mount FSxL filesystem as /fsx
            - if [ ! -z "${FSxLustreFilesystemId}" ]; then mkdir -p /fsx; mount -t lustre ${FSxLustreFilesystemId}.fsx.${AWS::Region}.amazonaws.com@tcp:/${FSxLustreFilesystemMountName} /fsx; chmod 1777 /fsx; fi
            # Monitoring stack installation (optional, enabled on Login Node only)
            - |
              if [ "${DeployMonitoring}" = "true" ]; then
                echo "Installing monitoring stack..."
                # Workaround: Create ec2-user for Ubuntu compatibility
                # aws-parallelcluster-monitoring expects ec2-user but Ubuntu uses ubuntu
                if [ -d /home/ubuntu ] && ! id ec2-user >/dev/null 2>&1; then
                  useradd -m -s /bin/bash -d /home/ubuntu ec2-user
                  usermod -aG docker ec2-user 2>/dev/null || true
                  echo "Created ec2-user pointing to /home/ubuntu"
                fi
                curl -fsSL https://raw.githubusercontent.com/aws-samples/aws-parallelcluster-monitoring/main/post-install.sh -o /tmp/post-install.sh
                # Run post-install.sh but with bug fix applied immediately after tarball extraction
                # Modified version that fixes upstream bug: local variable outside function at line 83
                bash /tmp/post-install.sh ${MonitoringVersion} 2>&1 | tee /tmp/monitoring-install-step1.log || true
                # If installation failed due to the bug, fix it and retry
                if [ -f /home/ec2-user/aws-parallelcluster-monitoring/installer/install.sh ]; then
                  # Fix upstream bug: replace "local login_id" with "login_id=" anywhere in the file
                  # This is more robust than line number since file may change
                  sed -i 's/^\([[:space:]]*\)local login_id$/\1login_id=/g' /home/ec2-user/aws-parallelcluster-monitoring/installer/install.sh
                  bash /home/ec2-user/aws-parallelcluster-monitoring/installer/install.sh 2>&1 | tee /var/log/monitoring-install.log
                fi
                echo "Monitoring installation complete"
              fi

            --==MYBOUNDARY==

Outputs:
  NodeGroupId:
    Description: Compute Node Group ID
    Value: !GetAtt PCSNodeGroupCompute.Id
  QueueId:
    Condition: CreateQueue
    Description: Queue ID
    Value: !GetAtt PCSQueueCompute.Id
