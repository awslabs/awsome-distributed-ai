AWSTemplateFormatVersion: '2010-09-09'
Description: AWS PCS "Getting Started" cluster. 
  This template deploys a small HPC cluster with 1 login node and up to 4 compute nodes. Optionally, Slurm accounting can be enabled.
  It includes an EFS file system for shared storage and an FSx for Lustre file system for high-speed temporary storage.  
  The cluster is deployed in a new VPC with both public and private subnets.  
  It can be accessed via the browser using AWS Systems Manager Session Manager or over the internet via SSH.  
  To access the cluster, check the Outputs tab of this stack for relevant links.  

### Stack metadata
Metadata:
  AWS::CloudFormation::Interface:
    ParameterGroups:
      - Label:
          default: PCS Cluster configuration
        Parameters:
          - ClusterName
          - SlurmVersion
          - ManagedAccounting
          - AccountingPolicyEnforcement
          - DeployMonitoring
      - Label:
          default: PCS Networking configuration
        Parameters:
          - VpcId
          - PublicSubnetId
          - PrivateSubnetId
          - DefaultSecurityGroupId
      - Label:
          default: PCS Storage configuration
        Parameters:
          - FSxLustreFilesystemId
          - FSxLustreFilesystemMountName
          - FSxOpenZFSFilesystemId

Parameters:
  ClusterName:
    Type: String
    Description: Name of the PCS cluster
    Default: "ml-cluster"
    AllowedPattern: '^[a-zA-Z][a-zA-Z0-9-]{0,39}$'
    ConstraintDescription: Must start with a letter, contain only alphanumeric characters and hyphens, and be 1-40 characters long

  VpcId:
    Type: AWS::EC2::VPC::Id
    Description: Select the VPC where the cluster will be launched

  PublicSubnetId:
    Type: AWS::EC2::Subnet::Id
    Description: Select the Subnet where the Login Node will be launched

  PrivateSubnetId:
    Type: AWS::EC2::Subnet::Id
    Description: Select the Subnet where the Compute Node will be launched

  DefaultSecurityGroupId:
    Type: AWS::EC2::SecurityGroup::Id
    Description: Select SecurityGroup for the cluster

  FSxLustreFilesystemId:
    Type: String
    Description: Filesystem ID for FSx for Lustre

  FSxLustreFilesystemMountName:
    Type: String
    Description: MountName for FSx for Lustre

  FSxOpenZFSFilesystemId:
    Type: String
    Description: Filesystem ID for FSx for OpenZFS

  SlurmVersion:
    Type: String
    Default: 25.11
    Description: Version of Slurm to use
    AllowedValues:
         - 25.05
         - 25.11

  ManagedAccounting:
    Type: String
    Default: 'disabled'
    AllowedValues:
      - 'enabled'
      - 'disabled'
    Description: Monitor cluster usage, manage access control, and enforce resource limits with Slurm accounting. Requires Slurm 24.11 or newer.

  AccountingPolicyEnforcement:
    Description: Specify which Slurm accounting policies to enforce
    Type: String
    Default: none
    AllowedValues:
      - none
      - 'associations,limits,safe'

  DeployMonitoring:
    Type: String
    Description: Enable Slurm OpenMetrics for monitoring stack (Prometheus/Grafana)
    Default: 'false'
    AllowedValues:
      - 'true'
      - 'false'

Conditions:
  GovCloud: !Equals [!Ref AWS::Partition, 'aws-us-gov']
  China: !Equals [!Ref AWS::Partition, 'aws-cn']
  # Disabled for older SLurm versions and in GovCloud
  HasAccountingSupport: !Not [!Or [!Equals [!Ref SlurmVersion, "23.11"], !Equals [!Ref SlurmVersion, "24.05"], !Equals [!Ref AWS::Partition, 'aws-us-gov']]]
  IsAccountingEnabled: !Equals [!Ref ManagedAccounting, 'enabled']
  IncludeAccountingConfig: !And [!Condition HasAccountingSupport, !Condition IsAccountingEnabled]
  SetAccountingPolicy: !Not [!Equals [!Ref AccountingPolicyEnforcement, 'none']]
  IsMonitoringEnabled: !Equals [!Ref DeployMonitoring, 'true']
  IncludeSlurmConfig: !Or [!Condition IncludeAccountingConfig, !Condition IsMonitoringEnabled]


Resources:

  # Cluster
  PCSCluster:
    Type: AWS::PCS::Cluster
    Properties:
      Name: !Ref ClusterName
      Size: SMALL
      Scheduler:
        Type: SLURM
        Version: !Ref SlurmVersion
      Networking:
        SubnetIds:
          - !Ref PrivateSubnetId
        SecurityGroupIds:
          - !Ref DefaultSecurityGroupId
      SlurmConfiguration: !If
        - IncludeSlurmConfig
        - Accounting: !If
            - IncludeAccountingConfig
            - Mode: STANDARD
              DefaultPurgeTimeInDays: 30
            - !Ref AWS::NoValue
          SlurmCustomSettings:
            - !If
              - SetAccountingPolicy
              - ParameterName: AccountingStorageEnforce
                ParameterValue: !Ref AccountingPolicyEnforcement
              - !Ref AWS::NoValue
            - !If
              - IsMonitoringEnabled
              - ParameterName: MetricsType
                ParameterValue: metrics/openmetrics
              - !Ref AWS::NoValue
            - !If
              - IsMonitoringEnabled
              - ParameterName: CommunicationParameters
                ParameterValue: enable_http
              - !Ref AWS::NoValue
        - !Ref AWS::NoValue

  # IAM Role for PCS instances
  PcsInstanceIamRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub
        - 'AWSPCS-pcs-${StackHash}-${AWS::Region}-role'
        - StackHash: !Select [0, !Split ['-', !Select [2, !Split ['/', !Ref 'AWS::StackId']]]]
      Description: "AWS IAM role for PCS node group instances"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: ec2.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - !Sub "arn:${AWS::Partition}:iam::aws:policy/AmazonSSMManagedInstanceCore"
        - !Sub "arn:${AWS::Partition}:iam::aws:policy/AmazonS3ReadOnlyAccess"
      Policies:
        - PolicyName: PcsRegisterInstancePolicy
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - pcs:RegisterComputeNodeGroupInstance
                Resource: "*"

  # IAM Instance Profile
  PcsInstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      InstanceProfileName: !Sub
        - 'AWSPCS-pcs-${StackHash}-${AWS::Region}'
        - StackHash: !Select [0, !Split ['-', !Select [2, !Split ['/', !Ref 'AWS::StackId']]]]
      Roles:
        - !Ref PcsInstanceIamRole

  # Monitoring IAM Policy (optional, attached to the instance role)
  MonitoringPolicy:
    Type: AWS::IAM::ManagedPolicy
    Condition: IsMonitoringEnabled
    Properties:
      ManagedPolicyName: !Sub '${PCSCluster.Id}-monitoring-policy'
      Roles:
        - !Ref PcsInstanceIamRole
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: EC2DescribeForPrometheusSdAndCostMetrics
            Effect: Allow
            Action:
              - ec2:DescribeInstances
              - ec2:DescribeVolumes
            Resource: '*'
            Condition:
              StringEquals:
                aws:RequestedRegion: !Ref AWS::Region

          - Sid: CloudFormationDescribeOwnStackOnly
            Effect: Allow
            Action:
              - cloudformation:DescribeStacks
              - cloudformation:DescribeStackResources
            Resource:
              - !Sub 'arn:${AWS::Partition}:cloudformation:${AWS::Region}:${AWS::AccountId}:stack/${AWS::StackName}/*'
              - !Sub 'arn:${AWS::Partition}:cloudformation:${AWS::Region}:${AWS::AccountId}:stack/${AWS::StackName}-*/*'

          - Sid: FSxDescribeForCostMetrics
            Effect: Allow
            Action:
              - fsx:DescribeFileSystems
            Resource: '*'
            Condition:
              StringEquals:
                aws:RequestedRegion: !Ref AWS::Region

          - Sid: PricingReadForCostMetrics
            Effect: Allow
            Action:
              - pricing:GetProducts
              - pricing:DescribeServices
            Resource: '*'

          - Sid: SSMGrafanaPasswordForThisClusterOnly
            Effect: Allow
            Action:
              - ssm:GetParameter
              - ssm:PutParameter
              - ssm:AddTagsToResource
            Resource: !Sub 'arn:${AWS::Partition}:ssm:${AWS::Region}:${AWS::AccountId}:parameter/pcs/${PCSCluster.Id}/grafana/*'

          - Sid: KMSForSSMSecureString
            Effect: Allow
            Action:
              - kms:Decrypt
            Resource: '*'
            Condition:
              StringEquals:
                kms:ViaService: !Sub 'ssm.${AWS::Region}.amazonaws.com'

          - Sid: CloudWatchGetMetricData
            Effect: Allow
            Action:
              - cloudwatch:GetMetricData
              - cloudwatch:GetMetricStatistics
              - cloudwatch:ListMetrics
            Resource: '*'

          - Sid: CloudWatchLogsReadForClusterLogs
            Effect: Allow
            Action:
              - logs:DescribeLogGroups
              - logs:DescribeLogStreams
              - logs:FilterLogEvents
              - logs:GetLogEvents
            Resource:
              - !Sub 'arn:${AWS::Partition}:logs:${AWS::Region}:${AWS::AccountId}:log-group:/aws/pcs/${PCSCluster.Id}*'

          - Sid: PCSGetClusterForMonitoring
            Effect: Allow
            Action:
              - pcs:GetCluster
              - pcs:ListComputeNodeGroups
            Resource: '*'
            Condition:
              StringEquals:
                aws:RequestedRegion: !Ref AWS::Region

Outputs:
  ClusterId:
    Description: The Id of the PCS cluster
    Value: !GetAtt [ PCSCluster, Id ]
  InstanceProfileArn:
    Description: ARN of the IAM instance profile
    Value: !GetAtt [ PcsInstanceProfile, Arn ]
  RoleName:
    Description: IAM Role name for cluster instances
    Value: !Ref PcsInstanceIamRole
  PcsConsoleUrl:
    Description: URL to access the cluster in the PCS console
    Value: !Sub
      - https://${ConsoleDomain}/pcs/home?region=${AWS::Region}#/clusters/${ClusterId}
      - { ConsoleDomain: !If [ GovCloud, 'console.amazonaws-us-gov.com', !If [ China, 'console.amazonaws.cn', !Sub '${AWS::Region}.console.aws.amazon.com']],
          ClusterId: !GetAtt [ PCSCluster, Id ]
        }
    Export:
      Name: !Sub ${AWS::StackName}-PcsConsoleUrl
