AWSTemplateFormatVersion: '2010-09-09'
Description: >
  AWS PCS cluster core (Slurm scheduler only — no compute nodes). Creates the PCS
  cluster, its IAM role/instance profile, and (optionally) the monitoring IAM policy
  and Slurm accounting. It attaches to an existing private subnet and security group
  (from the prerequisites stack); add login/compute nodes separately with add-cng*.yaml.
  Optionally enables Slurm OpenMetrics for the monitoring stack via DeployMonitoring.

### Stack metadata
Metadata:
  AWS::CloudFormation::Interface:
    ParameterGroups:
      - Label:
          default: PCS Cluster configuration
        Parameters:
          - ClusterName
          - SlurmVersion
          - ManagedAccounting
          - AccountingPolicyEnforcement
          - DeployMonitoring
      - Label:
          default: PCS Networking configuration
        Parameters:
          - PrivateSubnetId
          - DefaultSecurityGroupId

Parameters:
  ClusterName:
    Type: String
    Description: Name of the PCS cluster
    Default: "ml-cluster"
    AllowedPattern: '^[a-zA-Z][a-zA-Z0-9-]{0,39}$'
    ConstraintDescription: Must start with a letter, contain only alphanumeric characters and hyphens, and be 1-40 characters long

  PrivateSubnetId:
    Type: AWS::EC2::Subnet::Id
    Description: Select the Subnet where the PCS cluster (Slurm controller) will be placed

  DefaultSecurityGroupId:
    Type: AWS::EC2::SecurityGroup::Id
    Description: Select SecurityGroup for the cluster

  SlurmVersion:
    Type: String
    Default: 25.11
    Description: Version of Slurm to use
    AllowedValues:
         - 25.05
         - 25.11

  ManagedAccounting:
    Type: String
    Default: 'disabled'
    AllowedValues:
      - 'enabled'
      - 'disabled'
    Description: Monitor cluster usage, manage access control, and enforce resource limits with Slurm accounting. Requires Slurm 24.11 or newer.

  AccountingPolicyEnforcement:
    Description: Specify which Slurm accounting policies to enforce
    Type: String
    Default: none
    AllowedValues:
      - none
      - 'associations,limits,safe'

  DeployMonitoring:
    Type: String
    Description: Enable Slurm OpenMetrics for monitoring stack (Prometheus/Grafana)
    Default: 'false'
    AllowedValues:
      - 'true'
      - 'false'

Conditions:
  GovCloud: !Equals [!Ref AWS::Partition, 'aws-us-gov']
  China: !Equals [!Ref AWS::Partition, 'aws-cn']
  # Disabled for older SLurm versions and in GovCloud
  HasAccountingSupport: !Not [!Or [!Equals [!Ref SlurmVersion, "23.11"], !Equals [!Ref SlurmVersion, "24.05"], !Equals [!Ref AWS::Partition, 'aws-us-gov']]]
  IsAccountingEnabled: !Equals [!Ref ManagedAccounting, 'enabled']
  IncludeAccountingConfig: !And [!Condition HasAccountingSupport, !Condition IsAccountingEnabled]
  SetAccountingPolicy: !Not [!Equals [!Ref AccountingPolicyEnforcement, 'none']]
  IsMonitoringEnabled: !Equals [!Ref DeployMonitoring, 'true']
  # The Slurm OpenMetrics endpoint (MetricsType=metrics/openmetrics +
  # CommunicationParameters=enable_http) is only supported on Slurm 25.11+. PCS
  # rejects cluster creation if these are set on an older version (e.g. 25.05),
  # so only emit them when monitoring is enabled AND the version supports it.
  IsSlurm2511OrLater: !Equals [!Ref SlurmVersion, "25.11"]
  IncludeMetricsConfig: !And [!Condition IsMonitoringEnabled, !Condition IsSlurm2511OrLater]
  # Emit SlurmConfiguration only when at least one custom setting / accounting block
  # actually applies. Monitoring alone on Slurm < 25.11 contributes nothing (its
  # metrics settings are gated by IncludeMetricsConfig), so it must NOT force an
  # otherwise-empty SlurmCustomSettings list, which PCS rejects.
  IncludeSlurmConfig: !Or
    - !Condition IncludeAccountingConfig
    - !Condition SetAccountingPolicy
    - !Condition IncludeMetricsConfig


Resources:

  # Cluster
  PCSCluster:
    Type: AWS::PCS::Cluster
    Properties:
      Name: !Ref ClusterName
      Size: SMALL
      Scheduler:
        Type: SLURM
        Version: !Ref SlurmVersion
      Networking:
        SubnetIds:
          - !Ref PrivateSubnetId
        SecurityGroupIds:
          - !Ref DefaultSecurityGroupId
      SlurmConfiguration: !If
        - IncludeSlurmConfig
        - Accounting: !If
            - IncludeAccountingConfig
            - Mode: STANDARD
              DefaultPurgeTimeInDays: 30
            - !Ref AWS::NoValue
          SlurmCustomSettings:
            - !If
              - SetAccountingPolicy
              - ParameterName: AccountingStorageEnforce
                ParameterValue: !Ref AccountingPolicyEnforcement
              - !Ref AWS::NoValue
            - !If
              - IncludeMetricsConfig
              - ParameterName: MetricsType
                ParameterValue: metrics/openmetrics
              - !Ref AWS::NoValue
            - !If
              - IncludeMetricsConfig
              - ParameterName: CommunicationParameters
                ParameterValue: enable_http
              - !Ref AWS::NoValue
        - !Ref AWS::NoValue

  # IAM Role for PCS instances
  PcsInstanceIamRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub
        - 'AWSPCS-pcs-${StackHash}-${AWS::Region}-role'
        - StackHash: !Select [0, !Split ['-', !Select [2, !Split ['/', !Ref 'AWS::StackId']]]]
      Description: "AWS IAM role for PCS node group instances"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: ec2.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - !Sub "arn:${AWS::Partition}:iam::aws:policy/AmazonSSMManagedInstanceCore"
        - !Sub "arn:${AWS::Partition}:iam::aws:policy/AmazonS3ReadOnlyAccess"
      # Instance-role permissions are inline (PutRolePolicy), NOT a separate
      # AWS::IAM::ManagedPolicy — so deploying this stack needs only
      # iam:CreateRole + iam:PutRolePolicy (which the cluster-admin policy
      # grants), never iam:CreatePolicy. Split by feature so monitoring and
      # multi-user don't depend on each other:
      Policies:
        # Always present (every cluster): register with PCS + read boot scripts
        # from S3 + read this cluster's own SSM parameters (grafana password,
        # ldap admin password) + decrypt SSM SecureStrings. None of this is
        # monitoring- or directory-specific; it is the baseline an instance
        # needs to register, fetch its post-install/directory scripts, and
        # store/read the per-cluster secrets it generates.
        - PolicyName: PcsInstanceBasePolicy
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Sid: PcsRegisterInstance
                Effect: Allow
                Action:
                  - pcs:RegisterComputeNodeGroupInstance
                Resource: "*"

              # (Boot-script reads from S3 are already covered by the attached
              # AmazonS3ReadOnlyAccess managed policy, so no inline s3:GetObject
              # statement is needed here. See note on AmazonS3ReadOnlyAccess above.)

              # Compute nodes run untrusted user jobs and must NOT be able to read
              # the OpenLDAP admin password, so the base policy grants the grafana
              # parameter only. The ldap/* SSM read/write + KMS decrypt live on a
              # separate login-only role (PcsLoginInstanceIamRole) below — see the
              # security review on the multi-user PR. SSSD on compute uses an
              # anonymous bind, so compute never needs the ldap secret.
              - Sid: SSMGrafanaParameterForThisClusterOnly
                Effect: Allow
                Action:
                  - ssm:GetParameter
                  - ssm:PutParameter
                  - ssm:AddTagsToResource
                Resource:
                  - !Sub 'arn:${AWS::Partition}:ssm:${AWS::Region}:${AWS::AccountId}:parameter/pcs/${PCSCluster.Id}/grafana/*'

              # Hard-deny the OpenLDAP admin password on the shared/compute role.
              # AmazonSSMManagedInstanceCore (attached for SSM agent) grants
              # ssm:GetParameter on "*", and the SecureString is encrypted with the
              # AWS-managed key alias/aws/ssm — whose key policy lets any in-account
              # principal decrypt via SSM. So WITHOUT this explicit Deny a user job on
              # a compute node could `get-parameter --with-decryption` the directory
              # admin password (directory takeover). An explicit Deny overrides the
              # managed-policy Allow. The login-only role does NOT carry this Deny.
              - Sid: DenyLdapAdminPasswordOnComputeNodes
                Effect: Deny
                Action:
                  - ssm:GetParameter
                  - ssm:GetParameters
                  - ssm:GetParametersByPath
                Resource:
                  - !Sub 'arn:${AWS::Partition}:ssm:${AWS::Region}:${AWS::AccountId}:parameter/pcs/${PCSCluster.Id}/ldap/*'

  # IAM Instance Profile (compute + login share this base profile)
  PcsInstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      InstanceProfileName: !Sub
        - 'AWSPCS-pcs-${StackHash}-${AWS::Region}'
        - StackHash: !Select [0, !Split ['-', !Select [2, !Split ['/', !Ref 'AWS::StackId']]]]
      Roles:
        - !Ref PcsInstanceIamRole

  # Login-node-only role: the base role plus the OpenLDAP admin password
  # (ssm /pcs/<id>/ldap/*) read/write and KMS decrypt. Only the login node runs
  # the OpenLDAP server and needs this secret; keeping it off the compute role
  # prevents a user job on a compute node from reading the directory admin
  # password via IMDS (directory-takeover). deploy-all passes this profile to the
  # LoginNodeGroupStack only; every other CNG gets PcsInstanceProfile.
  PcsLoginInstanceIamRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub
        - 'AWSPCS-pcs-login-${StackHash}-${AWS::Region}-role'
        - StackHash: !Select [0, !Split ['-', !Select [2, !Split ['/', !Ref 'AWS::StackId']]]]
      Description: "AWS IAM role for the PCS login node (adds OpenLDAP admin secret access)"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: ec2.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - !Sub "arn:${AWS::Partition}:iam::aws:policy/AmazonSSMManagedInstanceCore"
        - !Sub "arn:${AWS::Partition}:iam::aws:policy/AmazonS3ReadOnlyAccess"
      Policies:
        - PolicyName: PcsLoginInstancePolicy
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Sid: PcsRegisterInstance
                Effect: Allow
                Action:
                  - pcs:RegisterComputeNodeGroupInstance
                Resource: "*"

              # (Boot-script reads from S3 are covered by AmazonS3ReadOnlyAccess;
              # no inline s3:GetObject needed — same as the base role.)

              - Sid: SSMClusterParametersForThisClusterOnly
                Effect: Allow
                Action:
                  - ssm:GetParameter
                  - ssm:PutParameter
                  - ssm:AddTagsToResource
                Resource:
                  - !Sub 'arn:${AWS::Partition}:ssm:${AWS::Region}:${AWS::AccountId}:parameter/pcs/${PCSCluster.Id}/grafana/*'
                  - !Sub 'arn:${AWS::Partition}:ssm:${AWS::Region}:${AWS::AccountId}:parameter/pcs/${PCSCluster.Id}/ldap/*'

              - Sid: KMSForSSMSecureString
                Effect: Allow
                Action:
                  - kms:Decrypt
                Resource: '*'
                Condition:
                  StringEquals:
                    kms:ViaService: !Sub 'ssm.${AWS::Region}.amazonaws.com'

  PcsLoginInstanceProfile:
    Type: AWS::IAM::InstanceProfile
    DependsOn: PcsLoginInstanceIamRole
    Properties:
      InstanceProfileName: !Sub
        - 'AWSPCS-pcs-login-${StackHash}-${AWS::Region}'
        - StackHash: !Select [0, !Split ['-', !Select [2, !Split ['/', !Ref 'AWS::StackId']]]]
      Roles:
        - !Ref PcsLoginInstanceIamRole

  # Monitoring instance permissions — inline policy added to the instance role
  # only when monitoring is enabled. Inline (RoleName + PutRolePolicy via an
  # AWS::IAM::Policy) instead of a ManagedPolicy, so the deployer never needs
  # iam:CreatePolicy. Holds ONLY monitoring-specific reads (Prometheus service
  # discovery + cost/CloudWatch metrics); multi-user/SSM/S3 perms live in the
  # always-on base policy above.
  MonitoringInstancePolicy:
    Type: AWS::IAM::Policy
    Condition: IsMonitoringEnabled
    Properties:
      PolicyName: !Sub '${PCSCluster.Id}-monitoring'
      Roles:
        - !Ref PcsInstanceIamRole
        - !Ref PcsLoginInstanceIamRole
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: EC2DescribeForPrometheusSdAndCostMetrics
            Effect: Allow
            Action:
              - ec2:DescribeInstances
              - ec2:DescribeVolumes
            Resource: '*'
            Condition:
              StringEquals:
                aws:RequestedRegion: !Ref AWS::Region

          - Sid: CloudFormationDescribeOwnStackOnly
            Effect: Allow
            Action:
              - cloudformation:DescribeStacks
              - cloudformation:DescribeStackResources
            Resource:
              - !Sub 'arn:${AWS::Partition}:cloudformation:${AWS::Region}:${AWS::AccountId}:stack/${AWS::StackName}/*'
              - !Sub 'arn:${AWS::Partition}:cloudformation:${AWS::Region}:${AWS::AccountId}:stack/${AWS::StackName}-*/*'

          - Sid: FSxDescribeForCostMetrics
            Effect: Allow
            Action:
              - fsx:DescribeFileSystems
            Resource: '*'
            Condition:
              StringEquals:
                aws:RequestedRegion: !Ref AWS::Region

          - Sid: PricingReadForCostMetrics
            Effect: Allow
            Action:
              - pricing:GetProducts
              - pricing:DescribeServices
            Resource: '*'

          - Sid: CloudWatchGetMetricData
            Effect: Allow
            Action:
              - cloudwatch:GetMetricData
              - cloudwatch:GetMetricStatistics
              - cloudwatch:ListMetrics
            Resource: '*'

          - Sid: CloudWatchLogsReadForClusterLogs
            Effect: Allow
            Action:
              - logs:DescribeLogGroups
              - logs:DescribeLogStreams
              - logs:FilterLogEvents
              - logs:GetLogEvents
            Resource:
              - !Sub 'arn:${AWS::Partition}:logs:${AWS::Region}:${AWS::AccountId}:log-group:/aws/pcs/${PCSCluster.Id}*'

          - Sid: PCSGetClusterForMonitoring
            Effect: Allow
            Action:
              - pcs:GetCluster
              - pcs:ListComputeNodeGroups
            Resource: '*'
            Condition:
              StringEquals:
                aws:RequestedRegion: !Ref AWS::Region

Outputs:
  ClusterId:
    Description: The Id of the PCS cluster
    Value: !GetAtt [ PCSCluster, Id ]
  InstanceProfileArn:
    Description: ARN of the IAM instance profile (compute node groups)
    Value: !GetAtt [ PcsInstanceProfile, Arn ]
  LoginInstanceProfileArn:
    Description: ARN of the login-node IAM instance profile (adds ldap/* SSM + KMS decrypt)
    Value: !GetAtt [ PcsLoginInstanceProfile, Arn ]
  RoleName:
    Description: IAM Role name for cluster instances
    Value: !Ref PcsInstanceIamRole
  PcsConsoleUrl:
    Description: URL to access the cluster in the PCS console
    Value: !Sub
      - https://${ConsoleDomain}/pcs/home?region=${AWS::Region}#/clusters/${ClusterId}
      - { ConsoleDomain: !If [ GovCloud, 'console.amazonaws-us-gov.com', !If [ China, 'console.amazonaws.cn', !Sub '${AWS::Region}.console.aws.amazon.com']],
          ClusterId: !GetAtt [ PCSCluster, Id ]
        }
    Export:
      Name: !Sub ${AWS::StackName}-PcsConsoleUrl
