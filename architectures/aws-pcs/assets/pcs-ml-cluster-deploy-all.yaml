AWSTemplateFormatVersion: '2010-09-09'
Description: >
  Complete AWS PCS ML Cluster deployment with nested stacks.
  This template orchestrates: Prerequisites (VPC, FSx), optional custom AMI building,
  and PCS cluster with compute node groups.

Metadata:
  AWS::CloudFormation::Interface:
    ParameterGroups:
      - Label:
          default: "1. Network Configuration"
        Parameters:
          - PrimarySubnetAZ
          - VPCName
          - CreateS3Endpoint
      - Label:
          default: "2. PCS Cluster Configuration"
        Parameters:
          - LoginNodeInstanceType
          - SlurmVersion
          - DeployMonitoring
          - MonitoringVersion
          - ManagedAccounting
          - AccountingPolicyEnforcement
      - Label:
          default: "3. Custom AMI / Post-install Script (container support)"
        Parameters:
          - BuildAMI
          - BaseAmiId
          - SemanticVersion
          - BuildSchedule
          - PostInstallScriptUrl
          - PostInstallScriptArgs
      - Label:
          default: "4. On-Demand Compute Node Group"
        Parameters:
          - DeployOnDemandCNG
          - OnDemandInstanceType
          - OnDemandMinCount
          - OnDemandMaxCount
          - OnDemandCngName
          - OnDemandQueueName
      - Label:
          default: "5. GPU Compute Node Group - P5/P6 Series (Optional)"
        Parameters:
          - DeployPseriesCNG
          - PseriesInstanceType
          - PseriesMinCount
          - PseriesMaxCount
          - NetworkInterfaceCount
          - CapacityReservationId
          - PseriesCngName
          - PseriesQueueName
      - Label:
          default: "6. FSx Storage Configuration (Advanced)"
        Parameters:
          - Capacity
          - PerUnitStorageThroughput
          - Compression
          - LustreVersion
          - HomeCapacity
          - HomeThroughput
      - Label:
          default: "7. S3 Configuration for Nested Templates (Developer)"
        Parameters:
          - S3BucketName
          - S3KeyPrefix

Parameters:
  # S3 Configuration
  S3BucketName:
    Type: String
    Description: S3 bucket name where nested CloudFormation templates are stored
    Default: "awsome-distributed-ai"

  S3KeyPrefix:
    Type: String
    Description: S3 key prefix for nested templates (e.g., templates/)
    Default: "templates/"

  # Network Configuration
  VPCName:
    Description: Name of your VPC
    Default: 'ML-Cluster-VPC'
    Type: String

  PrimarySubnetAZ:
    Description: Availability zone id in which the public subnet and primary private subnet will be created.
    Type: AWS::EC2::AvailabilityZone::Name

  CreateS3Endpoint:
    AllowedValues:
      - 'true'
      - 'false'
    Default: 'true'
    Description: Set to false to avoid creating an S3 endpoint on your VPC.
    Type: String

  # FSx Storage Configuration
  Capacity:
    Description: Storage capacity in GiB (1200 or increments of 2400)
    Type: Number
    Default: 1200

  PerUnitStorageThroughput:
    Description: Provisioned Read/Write (MB/s/TiB)
    Type: Number
    Default: 250
    AllowedValues:
      - 125
      - 250
      - 500
      - 1000

  Compression:
    Description: Data compression type
    Type: String
    AllowedValues:
      - "LZ4"
      - "NONE"
    Default: "LZ4"

  LustreVersion:
    Description: Lustre software version
    Type: String
    AllowedValues:
      - "2.15"
      - "2.12"
    Default: "2.15"

  HomeCapacity:
    Description: "Home directories storage capacity in GiB"
    Type: Number
    Default: 512

  HomeThroughput:
    Description: "Home directories storage throughput MB/s"
    Type: Number
    Default: 320

  # AMI Building Configuration
  BuildAMI:
    Type: String
    Description: Whether to build custom DLAMI for PCS. Default false; container support is installed at first boot via PostInstallScriptUrl instead.
    Default: 'false'
    AllowedValues:
      - 'true'
      - 'false'

  BaseAmiId:
    Type: String
    Description: (Optional) Base AMI ID to use for custom DLAMI build. Leave empty to auto-resolve from SSM parameter store.
    Default: ''

  SemanticVersion:
    Type: String
    Description: Semantic version for ImageBuilder recipes (format X.Y.Z)
    Default: '1.0.0'
    AllowedPattern: '^[0-9]+\.[0-9]+\.[0-9]+$'
    ConstraintDescription: Must be a valid semantic version (e.g., 1.0.0)

  BuildSchedule:
    Type: String
    Description: How often to build new AMIs. Manual requires triggering via console or CLI.
    Default: Manual
    AllowedValues:
      - Manual
      - Weekly
      - Monthly

  PostInstallScriptUrl:
    Type: String
    Description: >-
      URL of a post-install script run on every node at first boot (PCS
      equivalent of ParallelCluster OnNodeConfigured). Defaults to the
      Enroot/Pyxis installer, which is the most common configuration. Set to an
      empty string to skip, or to another HTTP(S) URL to run a custom script.
      For testing the fork, override with the DaisukeMiyamoto/awsome-distributed-ai
      raw URL. S3 public hosting is not allowed.
    Default: 'https://raw.githubusercontent.com/aws-samples/awsome-distributed-ai/main/architectures/aws-pcs/scripts/install-enroot-pyxis.sh'

  PostInstallScriptArgs:
    Type: String
    Description: Space-separated arguments passed to the post-install script.
    Default: ''

  # PCS Cluster Configuration
  SlurmVersion:
    Type: String
    Default: "25.11"
    Description: Version of Slurm to use
    AllowedValues:
      - "25.05"
      - "25.11"

  ManagedAccounting:
    Type: String
    Default: 'disabled'
    AllowedValues:
      - 'enabled'
      - 'disabled'
    Description: Monitor cluster usage, manage access control, and enforce resource limits with Slurm accounting.

  AccountingPolicyEnforcement:
    Description: Specify which Slurm accounting policies to enforce
    Type: String
    Default: none
    AllowedValues:
      - none
      - 'associations,limits,safe'

  LoginNodeInstanceType:
    Type: String
    Description: Instance Type for Login Node Group
    Default: "m6i.4xlarge"

  # Monitoring Configuration
  DeployMonitoring:
    Type: String
    Description: Deploy monitoring stack (Prometheus, Grafana, DCGM) on Login Node
    Default: 'true'
    AllowedValues:
      - 'true'
      - 'false'

  MonitoringVersion:
    Type: String
    Description: >-
      aws-parallelcluster-monitoring version to install, pinned to a release tag
      for upstream stability. Passed down to the CNG stacks, which fetch
      post-install.sh from this tag and pass it as the version argument. Avoid
      'latest'/'main' in production as upstream changes can break deployments.
    Default: 'v2.6.3'

  # On-Demand Compute Node Group
  DeployOnDemandCNG:
    Type: String
    Description: Deploy on-demand compute node group
    Default: 'true'
    AllowedValues:
      - 'true'
      - 'false'

  OnDemandCngName:
    Type: String
    Description: Name for on-demand compute node group
    Default: "cpu1"

  OnDemandQueueName:
    Type: String
    Description: Queue name for on-demand compute node group
    Default: "cpu1"

  OnDemandInstanceType:
    Type: String
    Description: Instance type for on-demand compute node group
    Default: "c6i.4xlarge"

  OnDemandMaxCount:
    Type: Number
    Description: Maximum number of instances for on-demand compute node group
    Default: 4
    MinValue: 0

  OnDemandMinCount:
    Type: Number
    Description: Minimum number of instances for on-demand compute node group (must be 0 for dynamic scaling)
    Default: 0
    MinValue: 0

  # P-series Compute Node Group
  DeployPseriesCNG:
    Type: String
    Description: Deploy P-series (P5/P6) compute node group
    Default: 'false'
    AllowedValues:
      - 'true'
      - 'false'

  PseriesCngName:
    Type: String
    Description: Name for P-series compute node group
    Default: "gpu-p5"

  PseriesQueueName:
    Type: String
    Description: Queue name for P-series compute node group
    Default: "gpu-p5"

  PseriesInstanceType:
    Type: String
    Description: Instance type for P-series compute node group
    Default: "p5.48xlarge"
    AllowedValues:
      - p5.48xlarge
      - p5e.48xlarge
      - p5en.48xlarge

  PseriesMaxCount:
    Type: Number
    Description: Maximum number of instances for P-series compute node group
    Default: 4
    MinValue: 0

  PseriesMinCount:
    Type: Number
    Description: Minimum number of instances for P-series compute node group (must be 0 for testing without Capacity Reservation)
    Default: 0
    MinValue: 0

  NetworkInterfaceCount:
    Type: Number
    Description: Number of network interfaces for P-series instances (16 or 32 EFA adapters)
    Default: 32
    AllowedValues:
      - 16
      - 32

  CapacityReservationId:
    Type: String
    Default: ""
    Description: Optional Capacity Reservation ID for P-series instances

  RootVolumeSize:
    Type: Number
    Description: >-
      Root EBS volume size (GiB) for all node groups. The PCS DLAMI default
      (~75 GiB) is too small for pulling/importing large container images; 300
      GiB gives ample headroom. Passed down to every compute node group stack.
    Default: 300
    MinValue: 75

Conditions:
  UseLocalTemplates: !Equals [!Ref S3BucketName, 'local']
  BuildAMIEnabled: !Equals [!Ref BuildAMI, 'true']
  DeployOnDemandCNGEnabled: !Equals [!Ref DeployOnDemandCNG, 'true']
  DeployPseriesCNGEnabled: !Equals [!Ref DeployPseriesCNG, 'true']

Resources:
  #############################################################################
  # 1. Prerequisites Stack (VPC, FSx)
  #############################################################################
  PrerequisitesStack:
    Type: AWS::CloudFormation::Stack
    Properties:
      TemplateURL: !If
        - UseLocalTemplates
        - ml-cluster-prerequisites.yaml
        - !Sub 'https://${S3BucketName}.s3.amazonaws.com/${S3KeyPrefix}ml-cluster-prerequisites.yaml'
      Parameters:
        VPCName: !Ref VPCName
        PrimarySubnetAZ: !Ref PrimarySubnetAZ
        CreateS3Endpoint: !Ref CreateS3Endpoint
        Capacity: !Ref Capacity
        PerUnitStorageThroughput: !Ref PerUnitStorageThroughput
        Compression: !Ref Compression
        LustreVersion: !Ref LustreVersion
        HomeCapacity: !Ref HomeCapacity
        HomeThroughput: !Ref HomeThroughput
      Tags:
        - Key: Name
          Value: !Sub '${AWS::StackName}-Prerequisites'

  #############################################################################
  # 2. Custom AMI Stack (ImageBuilder) - Optional
  #############################################################################
  DLAMIStack:
    Type: AWS::CloudFormation::Stack
    Condition: BuildAMIEnabled
    Properties:
      TemplateURL: !If
        - UseLocalTemplates
        - pcs-ready-dlami-with-enroot-pyxis.yaml
        - !Sub 'https://${S3BucketName}.s3.amazonaws.com/${S3KeyPrefix}pcs-ready-dlami-with-enroot-pyxis.yaml'
      Parameters:
        BaseAmiId: !Ref BaseAmiId
        SemanticVersion: !Ref SemanticVersion
        BuildSchedule: !Ref BuildSchedule
        PublishToSsm: 'false'
        EnableLifecyclePolicy: 'false'
      Tags:
        - Key: Name
          Value: !Sub '${AWS::StackName}-PCS-DLAMI'

  #############################################################################
  # 3. PCS Cluster Stack (Scheduler only, no compute nodes)
  #############################################################################
  ClusterStack:
    Type: AWS::CloudFormation::Stack
    Properties:
      TemplateURL: !If
        - UseLocalTemplates
        - cluster.yaml
        - !Sub 'https://${S3BucketName}.s3.amazonaws.com/${S3KeyPrefix}cluster.yaml'
      Parameters:
        ClusterName: !Sub '${AWS::StackName}'
        VpcId: !GetAtt PrerequisitesStack.Outputs.VPC
        PublicSubnetId: !GetAtt PrerequisitesStack.Outputs.PublicSubnet
        PrivateSubnetId: !GetAtt PrerequisitesStack.Outputs.PrimaryPrivateSubnet
        DefaultSecurityGroupId: !GetAtt PrerequisitesStack.Outputs.SecurityGroup
        FSxLustreFilesystemId: !GetAtt PrerequisitesStack.Outputs.FSxLustreFilesystemId
        FSxLustreFilesystemMountName: !GetAtt PrerequisitesStack.Outputs.FSxLustreFilesystemMountname
        FSxOpenZFSFilesystemId: !GetAtt PrerequisitesStack.Outputs.FSxOFilesystemId
        SlurmVersion: !Ref SlurmVersion
        ManagedAccounting: !Ref ManagedAccounting
        AccountingPolicyEnforcement: !Ref AccountingPolicyEnforcement
        DeployMonitoring: !Ref DeployMonitoring
      Tags:
        - Key: Name
          Value: !Sub '${AWS::StackName}-Cluster'

  #############################################################################
  # 4. Login Node Group Stack
  #############################################################################
  LoginNodeGroupStack:
    Type: AWS::CloudFormation::Stack
    DependsOn: ClusterStack
    Properties:
      TemplateURL: !If
        - UseLocalTemplates
        - add-cng.yaml
        - !Sub 'https://${S3BucketName}.s3.amazonaws.com/${S3KeyPrefix}add-cng.yaml'
      Parameters:
        ClusterId: !GetAtt ClusterStack.Outputs.ClusterId
        ClusterName: !Sub '${AWS::StackName}'
        CngName: login
        QueueName: ""
        InstanceType: !Ref LoginNodeInstanceType
        RootVolumeSize: !Ref RootVolumeSize
        MaxCount: 1
        MinCount: 1
        SubnetId: !GetAtt PrerequisitesStack.Outputs.PublicSubnet
        AmiId: !If
          - BuildAMIEnabled
          - !GetAtt DLAMIStack.Outputs.DLAMIforPCSAmiId
          - !Sub '{{resolve:ssm:/aws/service/pcs/ami/dlami-base-ubuntu2404/x86_64/latest/ami-id}}'
        ClusterSecurityGroupId: !GetAtt PrerequisitesStack.Outputs.SecurityGroup
        IamProfileArn: !GetAtt ClusterStack.Outputs.InstanceProfileArn
        FSxLustreFilesystemId: !GetAtt PrerequisitesStack.Outputs.FSxLustreFilesystemId
        FSxLustreFilesystemMountName: !GetAtt PrerequisitesStack.Outputs.FSxLustreFilesystemMountname
        FSxOpenZFSFilesystemId: !GetAtt PrerequisitesStack.Outputs.FSxOFilesystemId
        DeployMonitoring: !Ref DeployMonitoring
        MonitoringVersion: !Ref MonitoringVersion
        MonitoringRole: login
        PostInstallScriptUrl: !Ref PostInstallScriptUrl
        PostInstallScriptArgs: !Ref PostInstallScriptArgs
      Tags:
        - Key: Name
          Value: !Sub '${AWS::StackName}-LoginNodeGroup'

  #############################################################################
  # 5. On-Demand Compute Node Group Stack
  #############################################################################
  OnDemandCNGStack:
    Type: AWS::CloudFormation::Stack
    Condition: DeployOnDemandCNGEnabled
    DependsOn: ClusterStack
    Properties:
      TemplateURL: !If
        - UseLocalTemplates
        - add-cng.yaml
        - !Sub 'https://${S3BucketName}.s3.amazonaws.com/${S3KeyPrefix}add-cng.yaml'
      Parameters:
        ClusterId: !GetAtt ClusterStack.Outputs.ClusterId
        ClusterName: !Sub '${AWS::StackName}'
        CngName: !Ref OnDemandCngName
        QueueName: !Ref OnDemandQueueName
        InstanceType: !Ref OnDemandInstanceType
        RootVolumeSize: !Ref RootVolumeSize
        MaxCount: !Ref OnDemandMaxCount
        MinCount: !Ref OnDemandMinCount
        SubnetId: !GetAtt PrerequisitesStack.Outputs.PrimaryPrivateSubnet
        AmiId: !If
          - BuildAMIEnabled
          - !GetAtt DLAMIStack.Outputs.DLAMIforPCSAmiId
          - !Sub '{{resolve:ssm:/aws/service/pcs/ami/dlami-base-ubuntu2404/x86_64/latest/ami-id}}'
        ClusterSecurityGroupId: !GetAtt PrerequisitesStack.Outputs.SecurityGroup
        IamProfileArn: !GetAtt ClusterStack.Outputs.InstanceProfileArn
        FSxLustreFilesystemId: !GetAtt PrerequisitesStack.Outputs.FSxLustreFilesystemId
        FSxLustreFilesystemMountName: !GetAtt PrerequisitesStack.Outputs.FSxLustreFilesystemMountname
        FSxOpenZFSFilesystemId: !GetAtt PrerequisitesStack.Outputs.FSxOFilesystemId
        DeployMonitoring: !Ref DeployMonitoring
        MonitoringVersion: !Ref MonitoringVersion
        MonitoringRole: none
        PostInstallScriptUrl: !Ref PostInstallScriptUrl
        PostInstallScriptArgs: !Ref PostInstallScriptArgs
      Tags:
        - Key: Name
          Value: !Sub '${AWS::StackName}-OnDemandCNG'

  #############################################################################
  # 6. P-series Compute Node Group Stack
  #############################################################################
  PseriesCNGStack:
    Type: AWS::CloudFormation::Stack
    Condition: DeployPseriesCNGEnabled
    DependsOn: ClusterStack
    Properties:
      TemplateURL: !If
        - UseLocalTemplates
        - add-cng-p5.yaml
        - !Sub 'https://${S3BucketName}.s3.amazonaws.com/${S3KeyPrefix}add-cng-p5.yaml'
      Parameters:
        ClusterId: !GetAtt ClusterStack.Outputs.ClusterId
        ClusterName: !Sub '${AWS::StackName}'
        CngName: !Ref PseriesCngName
        QueueName: !Ref PseriesQueueName
        InstanceType: !Ref PseriesInstanceType
        RootVolumeSize: !Ref RootVolumeSize
        MaxCount: !Ref PseriesMaxCount
        MinCount: !Ref PseriesMinCount
        SubnetId: !GetAtt PrerequisitesStack.Outputs.PrimaryPrivateSubnet
        AmiId: !If
          - BuildAMIEnabled
          - !GetAtt DLAMIStack.Outputs.DLAMIforPCSAmiId
          - !Sub '{{resolve:ssm:/aws/service/pcs/ami/dlami-base-ubuntu2404/x86_64/latest/ami-id}}'
        ClusterSecurityGroupId: !GetAtt PrerequisitesStack.Outputs.SecurityGroup
        IamProfileArn: !GetAtt ClusterStack.Outputs.InstanceProfileArn
        FSxLustreFilesystemId: !GetAtt PrerequisitesStack.Outputs.FSxLustreFilesystemId
        FSxLustreFilesystemMountName: !GetAtt PrerequisitesStack.Outputs.FSxLustreFilesystemMountname
        FSxOpenZFSFilesystemId: !GetAtt PrerequisitesStack.Outputs.FSxOFilesystemId
        NetworkInterfaceCount: !Ref NetworkInterfaceCount
        CapacityReservationId: !Ref CapacityReservationId
        DeployMonitoring: !Ref DeployMonitoring
        MonitoringVersion: !Ref MonitoringVersion
        MonitoringRole: none
        PostInstallScriptUrl: !Ref PostInstallScriptUrl
        PostInstallScriptArgs: !Ref PostInstallScriptArgs
      Tags:
        - Key: Name
          Value: !Sub '${AWS::StackName}-PseriesCNG'

Outputs:
  ClusterId:
    Description: PCS Cluster ID
    Value: !GetAtt ClusterStack.Outputs.ClusterId

  InstanceProfileArn:
    Description: IAM Instance Profile ARN
    Value: !GetAtt ClusterStack.Outputs.InstanceProfileArn

  VPCId:
    Description: VPC ID
    Value: !GetAtt PrerequisitesStack.Outputs.VPC

  FSxLustreId:
    Description: FSx for Lustre filesystem ID
    Value: !GetAtt PrerequisitesStack.Outputs.FSxLustreFilesystemId

  FSxOpenZFSId:
    Description: FSx for OpenZFS filesystem ID
    Value: !GetAtt PrerequisitesStack.Outputs.FSxOFilesystemId
