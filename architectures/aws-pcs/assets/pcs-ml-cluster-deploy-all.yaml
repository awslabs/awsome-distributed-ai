AWSTemplateFormatVersion: '2010-09-09'
Description: >
  Complete AWS PCS ML Cluster deployment with nested stacks.
  This template orchestrates the deployment of VPC infrastructure, FSx filesystems,
  custom AMI building, and PCS cluster with compute node groups.

Metadata:
  AWS::CloudFormation::Interface:
    ParameterGroups:
      - Label:
          default: "1. Network Configuration"
        Parameters:
          - PrimarySubnetAZ
          - VPCName
          - CreateS3Endpoint
      - Label:
          default: "2. PCS Cluster Configuration"
        Parameters:
          - LoginNodeInstanceType
          - SlurmVersion
          - DeployMonitoring
          - MonitoringVersion
          - ManagedAccounting
          - AccountingPolicyEnforcement
      - Label:
          default: "3. Enroot/Pyxis Deployment Mode"
        Parameters:
          - BuildAMI
          - InstallEnrootPyxis
          - BaseAmiId
          - SemanticVersion
          - BuildSchedule
      - Label:
          default: "4. On-Demand Compute Node Group"
        Parameters:
          - DeployOnDemandCNG
          - OnDemandInstanceType
          - OnDemandMinCount
          - OnDemandMaxCount
          - OnDemandCngName
          - OnDemandQueueName
      - Label:
          default: "5. GPU Compute Node Group - P5/P6 Series (Optional)"
        Parameters:
          - DeployPseriesCNG
          - PseriesInstanceType
          - PseriesMinCount
          - PseriesMaxCount
          - NetworkInterfaceCount
          - CapacityReservationId
          - PseriesCngName
          - PseriesQueueName
      - Label:
          default: "6. FSx Storage Configuration (Advanced)"
        Parameters:
          - Capacity
          - PerUnitStorageThroughput
          - Compression
          - LustreVersion
          - HomeCapacity
          - HomeThroughput
      - Label:
          default: "7. Reuse Existing Prerequisites Stack (Advanced)"
        Parameters:
          - PrerequisitesStackName
      - Label:
          default: "8. S3 Configuration for Nested Templates (Developer)"
        Parameters:
          - S3BucketName
          - S3KeyPrefix

Parameters:
  # Prerequisites Stack Reference (Optional)
  PrerequisitesStackName:
    Type: String
    Default: ""
    Description: "[OPTIONAL] Name of existing Prerequisites stack (e.g., pcs-shared-infra) to reuse VPC and FSx resources. Leave empty to create new Prerequisites. Recommended for deploying multiple clusters quickly."

  # S3 Configuration
  S3BucketName:
    Type: String
    Description: S3 bucket name where nested CloudFormation templates are stored
    Default: "awsome-distributed-ai"

  S3KeyPrefix:
    Type: String
    Description: S3 key prefix for nested templates (e.g., templates/)
    Default: "templates/"

  # Network Configuration
  VPCName:
    Description: Name of your VPC
    Default: 'ML-Cluster-VPC'
    Type: String

  PrimarySubnetAZ:
    Description: Availability zone id in which the public subnet and primary private subnet will be created.
    Type: AWS::EC2::AvailabilityZone::Name

  CreateS3Endpoint:
    AllowedValues:
      - 'true'
      - 'false'
    Default: 'true'
    Description: Set to false to avoid creating an S3 endpoint on your VPC.
    Type: String

  # FSx Storage Configuration
  Capacity:
    Description: Storage capacity in GiB (1200 or increments of 2400)
    Type: Number
    Default: 1200

  PerUnitStorageThroughput:
    Description: Provisioned Read/Write (MB/s/TiB)
    Type: Number
    Default: 250
    AllowedValues:
      - 125
      - 250
      - 500
      - 1000

  Compression:
    Description: Data compression type
    Type: String
    AllowedValues:
      - "LZ4"
      - "NONE"
    Default: "LZ4"

  LustreVersion:
    Description: Lustre software version
    Type: String
    AllowedValues:
      - "2.15"
      - "2.12"
    Default: "2.15"

  HomeCapacity:
    Description: "Home directories storage capacity in GiB"
    Type: Number
    Default: 512

  HomeThroughput:
    Description: "Home directories storage throughput MB/s"
    Type: Number
    Default: 320

  # AMI Building Configuration
  BuildAMI:
    Type: String
    Description: Whether to build custom DLAMI for PCS
    Default: 'true'
    AllowedValues:
      - 'true'
      - 'false'

  BaseAmiId:
    Type: String
    Description: (Optional) Base AMI ID to use for custom DLAMI build. Leave empty to auto-resolve from SSM parameter store.
    Default: ''

  SemanticVersion:
    Type: String
    Description: Semantic version for ImageBuilder recipes (format X.Y.Z)
    Default: '1.0.0'
    AllowedPattern: '^[0-9]+\.[0-9]+\.[0-9]+$'
    ConstraintDescription: Must be a valid semantic version (e.g., 1.0.0)

  BuildSchedule:
    Type: String
    Description: How often to build new AMIs. Manual requires triggering via console or CLI.
    Default: Manual
    AllowedValues:
      - Manual
      - Weekly
      - Monthly

  InstallEnrootPyxis:
    Type: String
    Description: Install Enroot/Pyxis via UserData (only needed if BuildAMI=false and you need container support). Set to false for fastest boot time.
    Default: 'false'
    AllowedValues:
      - 'true'
      - 'false'

  # PCS Cluster Configuration
  SlurmVersion:
    Type: String
    Default: 25.11
    Description: Version of Slurm to use
    AllowedValues:
      - 25.05
      - 25.11

  ManagedAccounting:
    Type: String
    Default: 'disabled'
    AllowedValues:
      - 'enabled'
      - 'disabled'
    Description: Monitor cluster usage, manage access control, and enforce resource limits with Slurm accounting.

  AccountingPolicyEnforcement:
    Description: Specify which Slurm accounting policies to enforce
    Type: String
    Default: none
    AllowedValues:
      - none
      - 'associations,limits,safe'

  LoginNodeInstanceType:
    Type: String
    Description: Instance Type for Login Node Group
    Default: "m6i.4xlarge"

  # Monitoring Configuration
  DeployMonitoring:
    Type: String
    Description: Deploy monitoring stack (Prometheus, Grafana, DCGM) on Login Node
    Default: 'true'
    AllowedValues:
      - 'true'
      - 'false'

  MonitoringVersion:
    Type: String
    Description: Monitoring stack version (git tag or 'latest')
    Default: 'latest'

  # On-Demand Compute Node Group
  DeployOnDemandCNG:
    Type: String
    Description: Deploy on-demand compute node group
    Default: 'true'
    AllowedValues:
      - 'true'
      - 'false'

  OnDemandCngName:
    Type: String
    Description: Name for on-demand compute node group
    Default: "cpu1"

  OnDemandQueueName:
    Type: String
    Description: Queue name for on-demand compute node group
    Default: "cpu1"

  OnDemandInstanceType:
    Type: String
    Description: Instance type for on-demand compute node group
    Default: "c6i.4xlarge"

  OnDemandMaxCount:
    Type: Number
    Description: Maximum number of instances for on-demand compute node group
    Default: 4
    MinValue: 0

  OnDemandMinCount:
    Type: Number
    Description: Minimum number of instances for on-demand compute node group (must be 0 for dynamic scaling)
    Default: 0
    MinValue: 0

  # Additional Multi-NIC Compute Node Group for P5/P6 (Optional)
  DeployPseriesCNG:
    Type: String
    Description: Deploy an additional multi-NIC compute node group for P5/P6 instances (On-Demand or Capacity Block)
    Default: 'false'
    AllowedValues:
      - 'true'
      - 'false'

  CapacityReservationId:
    Type: String
    Description: (Optional) Capacity Reservation ID for Capacity Blocks. Leave empty for On-Demand instances.
    Default: ""

  PseriesCngName:
    Type: String
    Description: Name for multi-NIC compute node group
    Default: "gpu-p5"

  PseriesQueueName:
    Type: String
    Description: Queue name for multi-NIC compute node group
    Default: "gpu-p5"

  PseriesInstanceType:
    Type: String
    Description: Instance type for multi-NIC compute node group (P5/P6 series with 16 or 32 network interfaces)
    Default: "p5.48xlarge"

  NetworkInterfaceCount:
    Type: String
    Description: Number of network interfaces (16 for p5en.48xlarge, 32 for p5.48xlarge/p5e.48xlarge/p6-b200.48xlarge)
    Default: "32"
    AllowedValues:
      - "16"
      - "32"

  PseriesMaxCount:
    Type: Number
    Description: Maximum number of instances for multi-NIC compute node group
    Default: 4
    MinValue: 0

  PseriesMinCount:
    Type: Number
    Description: Minimum number of instances for multi-NIC compute node group (must be 0 for dynamic scaling)
    Default: 4
    MinValue: 0

Conditions:
  BuildAMIEnabled: !Equals [!Ref BuildAMI, 'true']
  UseLocalTemplates: !Equals [!Ref S3BucketName, '']
  DeployOnDemandCNGEnabled: !Equals [!Ref DeployOnDemandCNG, 'true']
  DeployPseriesCNGEnabled: !Equals [!Ref DeployPseriesCNG, 'true']
  DeployMonitoringEnabled: !Equals [!Ref DeployMonitoring, 'true']
  UsePrerequisitesStack: !Not [!Equals [!Ref PrerequisitesStackName, '']]
  CreatePrerequisites: !Equals [!Ref PrerequisitesStackName, '']

Resources:
  #############################################################################
  # 1. Network and Storage Prerequisites Stack (Conditional)
  #############################################################################
  PrerequisitesStack:
    Type: AWS::CloudFormation::Stack
    Condition: CreatePrerequisites
    Properties:
      TemplateURL: !If
        - UseLocalTemplates
        - ml-cluster-prerequisites.yaml
        - !Sub 'https://${S3BucketName}.s3.amazonaws.com/${S3KeyPrefix}ml-cluster-prerequisites.yaml'
      Parameters:
        VPCName: !Ref VPCName
        PrimarySubnetAZ: !Ref PrimarySubnetAZ
        CreateS3Endpoint: !Ref CreateS3Endpoint
        Capacity: !Ref Capacity
        PerUnitStorageThroughput: !Ref PerUnitStorageThroughput
        Compression: !Ref Compression
        LustreVersion: !Ref LustreVersion
        HomeCapacity: !Ref HomeCapacity
        HomeThroughput: !Ref HomeThroughput
      Tags:
        - Key: Name
          Value: !Sub '${AWS::StackName}-Prerequisites'

  #############################################################################
  # 2. PCS-ready DLAMI with Enroot/Pyxis Stack (Optional)
  #############################################################################
  DLAMIStack:
    Type: AWS::CloudFormation::Stack
    Condition: BuildAMIEnabled
    Properties:
      TemplateURL: !If
        - UseLocalTemplates
        - pcs-ready-dlami-with-enroot-pyxis.yaml
        - !Sub 'https://${S3BucketName}.s3.amazonaws.com/${S3KeyPrefix}pcs-ready-dlami-with-enroot-pyxis.yaml'
      Parameters:
        BaseAmiId: !Ref BaseAmiId
        SemanticVersion: !Ref SemanticVersion
        BuildSchedule: !Ref BuildSchedule
        PublishToSsm: 'false'
        EnableLifecyclePolicy: 'false'
      Tags:
        - Key: Name
          Value: !Sub '${AWS::StackName}-PCS-DLAMI'

  #############################################################################
  # 3. PCS Cluster Stack
  #############################################################################
  ClusterStack:
    Type: AWS::CloudFormation::Stack
    Properties:
      TemplateURL: !If
        - UseLocalTemplates
        - cluster.yaml
        - !Sub 'https://${S3BucketName}.s3.amazonaws.com/${S3KeyPrefix}cluster.yaml'
      Parameters:
        ClusterName: !Sub '${AWS::StackName}'
        VpcId: !If
          - UsePrerequisitesStack
          - Fn::ImportValue: !Sub '${PrerequisitesStackName}-VPC'
          - !GetAtt PrerequisitesStack.Outputs.VPC
        PublicSubnetId: !If
          - UsePrerequisitesStack
          - Fn::ImportValue: !Sub '${PrerequisitesStackName}-PublicSubnet'
          - !GetAtt PrerequisitesStack.Outputs.PublicSubnet
        PrivateSubnetId: !If
          - UsePrerequisitesStack
          - Fn::ImportValue: !Sub '${PrerequisitesStackName}-PrivateSubnet'
          - !GetAtt PrerequisitesStack.Outputs.PrimaryPrivateSubnet
        DefaultSecurityGroupId: !If
          - UsePrerequisitesStack
          - Fn::ImportValue: !Sub '${PrerequisitesStackName}-SecurityGroup'
          - !GetAtt PrerequisitesStack.Outputs.SecurityGroup
        FSxLustreFilesystemId: !If
          - UsePrerequisitesStack
          - Fn::ImportValue: !Sub '${PrerequisitesStackName}-FSxLustreFilesystemId'
          - !GetAtt PrerequisitesStack.Outputs.FSxLustreFilesystemId
        FSxLustreFilesystemMountName: !If
          - UsePrerequisitesStack
          - Fn::ImportValue: !Sub '${PrerequisitesStackName}-FSxLustreFilesystemMountname'
          - !GetAtt PrerequisitesStack.Outputs.FSxLustreFilesystemMountname
        FSxOpenZFSFilesystemId: !If
          - UsePrerequisitesStack
          - Fn::ImportValue: !Sub '${PrerequisitesStackName}-FSxOpenZFSFilesystemId'
          - !GetAtt PrerequisitesStack.Outputs.FSxOFilesystemId
        SlurmVersion: !Ref SlurmVersion
        ManagedAccounting: !Ref ManagedAccounting
        AccountingPolicyEnforcement: !Ref AccountingPolicyEnforcement
        DeployMonitoring: !Ref DeployMonitoring
      Tags:
        - Key: Name
          Value: !Sub '${AWS::StackName}-Cluster'

  #############################################################################
  # 4. Login Node Group Stack
  #############################################################################
  LoginNodeGroupStack:
    Type: AWS::CloudFormation::Stack
    DependsOn:
      - ClusterStack
    Properties:
      TemplateURL: !If
        - UseLocalTemplates
        - add-cng.yaml
        - !Sub 'https://${S3BucketName}.s3.amazonaws.com/${S3KeyPrefix}add-cng.yaml'
      Parameters:
        ClusterId: !GetAtt ClusterStack.Outputs.ClusterId
        ClusterName: !Sub '${AWS::StackName}'
        CngName: login
        QueueName: ""
        InstanceType: !Ref LoginNodeInstanceType
        MaxCount: 1
        MinCount: 1
        SubnetId: !If
          - UsePrerequisitesStack
          - !Ref PrerequisitesStackName-PublicSubnet
          - !GetAtt PrerequisitesStack.Outputs.PublicSubnet
        AmiId: !If
          - BuildAMIEnabled
          - !GetAtt DLAMIStack.Outputs.DLAMIforPCSAmiId
          - !Sub '{{resolve:ssm:/aws/service/pcs/ami/dlami-base-ubuntu2404/x86_64/latest/ami-id}}'
        ClusterSecurityGroupId: !If
          - UsePrerequisitesStack
          - !Ref PrerequisitesStackName-SecurityGroup
          - !GetAtt PrerequisitesStack.Outputs.SecurityGroup
        IamProfileArn: !GetAtt ClusterStack.Outputs.InstanceProfileArn
        FSxLustreFilesystemId: !If
          - UsePrerequisitesStack
          - !Ref PrerequisitesStackName-FSxLustreFilesystemId
          - !GetAtt PrerequisitesStack.Outputs.FSxLustreFilesystemId
        FSxLustreFilesystemMountName: !If
          - UsePrerequisitesStack
          - !Ref PrerequisitesStackName-FSxLustreFilesystemMountname
          - !GetAtt PrerequisitesStack.Outputs.FSxLustreFilesystemMountname
        FSxOpenZFSFilesystemId: !If
          - UsePrerequisitesStack
          - !Ref PrerequisitesStackName-FSxOpenZFSFilesystemId
          - !GetAtt PrerequisitesStack.Outputs.FSxOFilesystemId
        DeployMonitoring: !Ref DeployMonitoring
        MonitoringVersion: !Ref MonitoringVersion
        MonitoringRole: !If [DeployMonitoringEnabled, 'login', 'none']
        InstallEnrootPyxis: !Ref InstallEnrootPyxis
      Tags:
        - Key: Name
          Value: !Sub '${AWS::StackName}-LoginNodeGroup'

  #############################################################################
  # 6. On-Demand Compute Node Group Stack
  #############################################################################
  OnDemandCNGStack:
    Type: AWS::CloudFormation::Stack
    Condition: DeployOnDemandCNGEnabled
    DependsOn:
      - ClusterStack
    Properties:
      TemplateURL: !If
        - UseLocalTemplates
        - add-cng.yaml
        - !Sub 'https://${S3BucketName}.s3.amazonaws.com/${S3KeyPrefix}add-cng.yaml'
      Parameters:
        ClusterId: !GetAtt ClusterStack.Outputs.ClusterId
        ClusterName: !Sub '${AWS::StackName}'
        CngName: !Ref OnDemandCngName
        QueueName: !Ref OnDemandQueueName
        InstanceType: !Ref OnDemandInstanceType
        MaxCount: !Ref OnDemandMaxCount
        MinCount: !Ref OnDemandMinCount
        SubnetId: !If
          - UsePrerequisitesStack
          - !Ref PrerequisitesStackName-PrivateSubnet
          - !GetAtt PrerequisitesStack.Outputs.PrimaryPrivateSubnet
        AmiId: !If
          - BuildAMIEnabled
          - !GetAtt DLAMIStack.Outputs.DLAMIforPCSAmiId
          - !Sub '{{resolve:ssm:/aws/service/pcs/ami/dlami-base-ubuntu2404/x86_64/latest/ami-id}}'
        ClusterSecurityGroupId: !If
          - UsePrerequisitesStack
          - !Ref PrerequisitesStackName-SecurityGroup
          - !GetAtt PrerequisitesStack.Outputs.SecurityGroup
        IamProfileArn: !GetAtt ClusterStack.Outputs.InstanceProfileArn
        FSxLustreFilesystemId: !If
          - UsePrerequisitesStack
          - !Ref PrerequisitesStackName-FSxLustreFilesystemId
          - !GetAtt PrerequisitesStack.Outputs.FSxLustreFilesystemId
        FSxLustreFilesystemMountName: !If
          - UsePrerequisitesStack
          - !Ref PrerequisitesStackName-FSxLustreFilesystemMountname
          - !GetAtt PrerequisitesStack.Outputs.FSxLustreFilesystemMountname
        FSxOpenZFSFilesystemId: !If
          - UsePrerequisitesStack
          - !Ref PrerequisitesStackName-FSxOpenZFSFilesystemId
          - !GetAtt PrerequisitesStack.Outputs.FSxOFilesystemId
        DeployMonitoring: !Ref DeployMonitoring
        MonitoringVersion: !Ref MonitoringVersion
        MonitoringRole: !If [DeployMonitoringEnabled, 'compute', 'none']
        InstallEnrootPyxis: !Ref InstallEnrootPyxis
      Tags:
        - Key: Name
          Value: !Sub '${AWS::StackName}-OnDemandCNG'

  #############################################################################
  # 7. Additional Multi-NIC Compute Node Group Stack for P5/P6 (Optional)
  #############################################################################
  PseriesCNGStack:
    Type: AWS::CloudFormation::Stack
    Condition: DeployPseriesCNGEnabled
    DependsOn:
      - ClusterStack
    Properties:
      TemplateURL: !If
        - UseLocalTemplates
        - add-cng-p5.yaml
        - !Sub 'https://${S3BucketName}.s3.amazonaws.com/${S3KeyPrefix}add-cng-p5.yaml'
      Parameters:
        CapacityReservationId: !Ref CapacityReservationId
        ClusterId: !GetAtt ClusterStack.Outputs.ClusterId
        ClusterName: !Sub '${AWS::StackName}'
        CngName: !Ref PseriesCngName
        QueueName: !Ref PseriesQueueName
        InstanceType: !Ref PseriesInstanceType
        NetworkInterfaceCount: !Ref NetworkInterfaceCount
        MaxCount: !Ref PseriesMaxCount
        MinCount: !Ref PseriesMinCount
        SubnetId: !If
          - UsePrerequisitesStack
          - !Ref PrerequisitesStackName-PrivateSubnet
          - !GetAtt PrerequisitesStack.Outputs.PrimaryPrivateSubnet
        AmiId: !If
          - BuildAMIEnabled
          - !GetAtt DLAMIStack.Outputs.DLAMIforPCSAmiId
          - !Sub '{{resolve:ssm:/aws/service/pcs/ami/dlami-base-ubuntu2404/x86_64/latest/ami-id}}'
        ClusterSecurityGroupId: !If
          - UsePrerequisitesStack
          - !Ref PrerequisitesStackName-SecurityGroup
          - !GetAtt PrerequisitesStack.Outputs.SecurityGroup
        IamProfileArn: !GetAtt ClusterStack.Outputs.InstanceProfileArn
        FSxLustreFilesystemId: !If
          - UsePrerequisitesStack
          - !Ref PrerequisitesStackName-FSxLustreFilesystemId
          - !GetAtt PrerequisitesStack.Outputs.FSxLustreFilesystemId
        FSxLustreFilesystemMountName: !If
          - UsePrerequisitesStack
          - !Ref PrerequisitesStackName-FSxLustreFilesystemMountname
          - !GetAtt PrerequisitesStack.Outputs.FSxLustreFilesystemMountname
        FSxOpenZFSFilesystemId: !If
          - UsePrerequisitesStack
          - !Ref PrerequisitesStackName-FSxOpenZFSFilesystemId
          - !GetAtt PrerequisitesStack.Outputs.FSxOFilesystemId
        DeployMonitoring: !Ref DeployMonitoring
        MonitoringVersion: !Ref MonitoringVersion
        MonitoringRole: !If [DeployMonitoringEnabled, 'compute', 'none']
        InstallEnrootPyxis: !Ref InstallEnrootPyxis
      Tags:
        - Key: Name
          Value: !Sub '${AWS::StackName}-PseriesCNG'

Outputs:

  #############################################################################
  # DLAMI Stack Outputs (Optional)
  #############################################################################
  DLAMIforPCSAmiId:
    Condition: BuildAMIEnabled
    Description: Built DLAMI for PCS AMI ID (Ubuntu 24.04 x86_64)
    Value: !GetAtt DLAMIStack.Outputs.DLAMIforPCSAmiId
    Export:
      Name: !Sub '${AWS::StackName}-DLAMIforPCSAmiId'

  #############################################################################
  # Cluster Stack Outputs
  #############################################################################
  ClusterId:
    Description: PCS Cluster ID
    Value: !GetAtt ClusterStack.Outputs.ClusterId
    Export:
      Name: !Sub '${AWS::StackName}-ClusterId'

  InstanceProfileArn:
    Description: IAM Instance Profile ARN for PCS nodes
    Value: !GetAtt ClusterStack.Outputs.InstanceProfileArn
    Export:
      Name: !Sub '${AWS::StackName}-InstanceProfileArn'

  PcsConsoleUrl:
    Description: URL to access the cluster in the PCS console
    Value: !GetAtt ClusterStack.Outputs.PcsConsoleUrl

  LoginNodeGroupId:
    Description: Login Node Group ID
    Value: !GetAtt LoginNodeGroupStack.Outputs.NodeGroupId
    Export:
      Name: !Sub '${AWS::StackName}-LoginNodeGroupId'

  OnDemandComputeNodeGroupId:
    Condition: DeployOnDemandCNGEnabled
    Description: On-Demand Compute Node Group ID
    Value: !GetAtt OnDemandCNGStack.Outputs.NodeGroupId
    Export:
      Name: !Sub '${AWS::StackName}-OnDemandComputeNodeGroupId'

  #############################################################################
  # Compute Node Group Outputs
  #############################################################################
  OnDemandCNGDeployed:
    Condition: DeployOnDemandCNGEnabled
    Description: On-demand compute node group deployed (single NIC)
    Value: !Sub '${OnDemandCngName} (${OnDemandInstanceType}, ${OnDemandMinCount}-${OnDemandMaxCount} instances)'

  PseriesCNGDeployed:
    Condition: DeployPseriesCNGEnabled
    Description: Multi-NIC compute node group deployed (P5/P6 series)
    Value: !Sub '${PseriesCngName} (${PseriesInstanceType}, ${NetworkInterfaceCount} NICs)'

  #############################################################################
  # Additional Information for Manual Add-on Stacks
  #############################################################################
  AddComputeNodeGroupCommand:
    Description: Command to manually add additional compute node groups
    Value: !If
      - CreatePrerequisites
      - !Sub |
        For single NIC instances (CPU/GPU), use add-cng.yaml:
        For multi-NIC instances (P5/P6 series), use add-cng-p5.yaml:

        Common parameters:
        ClusterId: ${ClusterStack.Outputs.ClusterId}
        SubnetId: ${PrerequisitesStack.Outputs.PrimaryPrivateSubnet}
        ClusterSecurityGroupId: ${PrerequisitesStack.Outputs.SecurityGroup}
        IamProfileArn: ${ClusterStack.Outputs.InstanceProfileArn}
        FSxLustreFilesystemId: ${PrerequisitesStack.Outputs.FSxLustreFilesystemId}
        FSxLustreFilesystemMountName: ${PrerequisitesStack.Outputs.FSxLustreFilesystemMountname}
        FSxOpenZFSFilesystemId: ${PrerequisitesStack.Outputs.FSxOFilesystemId}

        For add-cng-p5.yaml, also specify:
        NetworkInterfaceCount: 16 or 32
        CapacityReservationId: (optional, for Capacity Blocks)
      - !Sub
        - |
          For single NIC instances (CPU/GPU), use add-cng.yaml:
          For multi-NIC instances (P5/P6 series), use add-cng-p5.yaml:

          Common parameters:
          ClusterId: ${ClusterId}
          SubnetId: ${PrivateSubnet}
          ClusterSecurityGroupId: ${SecurityGroup}
          IamProfileArn: ${InstanceProfile}
          FSxLustreFilesystemId: ${FSxLustre}
          FSxLustreFilesystemMountName: ${FSxLustreMount}
          FSxOpenZFSFilesystemId: ${FSxOpenZFS}

          For add-cng-p5.yaml, also specify:
          NetworkInterfaceCount: 16 or 32
          CapacityReservationId: (optional, for Capacity Blocks)
        - ClusterId: !GetAtt ClusterStack.Outputs.ClusterId
          InstanceProfile: !GetAtt ClusterStack.Outputs.InstanceProfileArn
          PrivateSubnet:
            Fn::ImportValue: !Sub '${PrerequisitesStackName}-PrivateSubnet'
          SecurityGroup:
            Fn::ImportValue: !Sub '${PrerequisitesStackName}-SecurityGroup'
          FSxLustre:
            Fn::ImportValue: !Sub '${PrerequisitesStackName}-FSxLustreFilesystemId'
          FSxLustreMount:
            Fn::ImportValue: !Sub '${PrerequisitesStackName}-FSxLustreFilesystemMountname'
          FSxOpenZFS:
            Fn::ImportValue: !Sub '${PrerequisitesStackName}-FSxOpenZFSFilesystemId'
