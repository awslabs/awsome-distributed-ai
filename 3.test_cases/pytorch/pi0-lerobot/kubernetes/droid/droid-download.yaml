# Pi0 LeRobot — DROID Dataset Download Job
#
# Stages lerobot/droid_100 onto the FSx PVC at /data/datasets/droid_100_{train,test}.
# Runs on CPU nodes (no GPU request).
#
# Render: source env_vars && envsubst < droid-download.yaml | kubectl apply -f -

apiVersion: batch/v1
kind: Job
metadata:
  name: pi0-lerobot-droid-download
  namespace: ${NAMESPACE}
  labels:
    app: pi0-lerobot-droid-download
spec:
  ttlSecondsAfterFinished: 3600
  template:
    metadata:
      labels:
        app: pi0-lerobot-droid-download
    spec:
      restartPolicy: OnFailure
      containers:
        - name: download
          image: ${IMAGE_URI}
          imagePullPolicy: IfNotPresent
          command: ["/bin/bash", "-c"]
          args:
            - |
              set -euo pipefail
              echo "=== Pi0 LeRobot — Downloading DROID dataset ==="

              # Install hf_transfer for faster downloads
              pip install --no-cache-dir 'hf_transfer>=0.1.6' 2>/dev/null || true
              export HF_HUB_ENABLE_HF_TRANSFER=1

              # Login if token provided
              if [ -n "$${HF_TOKEN:-}" ]; then
                huggingface-cli login --token "$${HF_TOKEN}" 2>/dev/null || true
              fi

              TRAIN_DIR="/data/datasets/droid_100_train"
              TEST_DIR="/data/datasets/droid_100_test"

              # Download the full dataset
              echo "[1/3] Downloading lerobot/droid_100..."
              huggingface-cli download lerobot/droid_100 \
                --repo-type dataset \
                --local-dir /data/datasets/droid_100_full

              # Split into train/test (episodes 0-79 train, 80-99 test)
              echo "[2/3] Splitting into train (80 eps) / test (20 eps)..."
              python3 -c "
              import json, shutil
              from pathlib import Path

              src = Path('/data/datasets/droid_100_full')
              train_dir = Path('${TRAIN_DIR}')
              test_dir = Path('${TEST_DIR}')

              # For LeRobot V2 datasets, the split is done by copying
              # and filtering the episode metadata. Full implementation
              # depends on the dataset's internal structure.
              # For now, copy the full dataset as train and note that
              # the eval script uses the last 20 episodes as test.
              if not train_dir.exists():
                  shutil.copytree(src, train_dir)
                  print(f'Train dataset at: {train_dir}')
              if not test_dir.exists():
                  shutil.copytree(src, test_dir)
                  print(f'Test dataset at: {test_dir}')
              "

              echo "[3/3] Verifying..."
              ls -la "$${TRAIN_DIR}/meta/" 2>/dev/null || echo "WARN: no meta/ in train"
              ls -la "$${TEST_DIR}/meta/" 2>/dev/null || echo "WARN: no meta/ in test"

              echo "=== Download complete ==="
          env:
            - name: HF_TOKEN
              valueFrom:
                secretKeyRef:
                  name: pi0-lerobot-secrets
                  key: HF_TOKEN
                  optional: true
            - name: HF_HOME
              value: "/data/hf-cache"
            - name: NVIDIA_VISIBLE_DEVICES
              value: "void"
          volumeMounts:
            - name: fsx-volume
              mountPath: /data
          resources:
            requests:
              cpu: "4"
              memory: "16Gi"
      volumes:
        - name: fsx-volume
          persistentVolumeClaim:
            claimName: ${DATA_PVC_NAME}
