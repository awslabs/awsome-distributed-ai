# Pi0 LeRobot — DROID Evaluation Job
#
# Prerequisites:
#   1. Training completed (checkpoint exists at /fsx/runs/pi0-droid/training/checkpoints/)
#   2. evaluate_pi0.py staged on FSx:
#      kubectl cp src/evaluate_pi0.py <any-pod>:/fsx/pi0-lerobot/evaluate_pi0.py
#      (or: git clone the repo on a shell pod and copy src/ to /fsx/pi0-lerobot/)

apiVersion: batch/v1
kind: Job
metadata:
  name: pi0-lerobot-droid-eval
  namespace: default
spec:
  ttlSecondsAfterFinished: 86400
  backoffLimit: 1
  template:
    metadata:
      labels:
        app: pi0-lerobot-droid-eval
    spec:
      restartPolicy: Never
      nodeSelector:
        # HyperPod EKS labels instances with "ml." prefix (ml.p5.48xlarge).
        # On plain EKS (managed node groups / Karpenter), use "p5.48xlarge" instead.
        node.kubernetes.io/instance-type: ml.p5.48xlarge
      tolerations:
        - key: nvidia.com/gpu
          operator: Exists
          effect: NoSchedule
      containers:
        - name: eval
          image: 763104351884.dkr.ecr.us-east-2.amazonaws.com/pytorch-training:2.9.0-gpu-py312-cu130-ubuntu22.04-sagemaker-v1.9
          imagePullPolicy: IfNotPresent
          command: ["/bin/bash", "-c"]
          args:
            - |
              set -e
              echo "============================================================"
              echo "  Pi0 Evaluation — DROID (held-out episodes 80-99)"
              echo "============================================================"

              # [1/3] Install LeRobot (pinned v0.5.0)
              echo "[1/3] Installing LeRobot..."
              export GIT_LFS_SKIP_SMUDGE=1
              git config --global filter.lfs.required false
              pip install --quiet "lerobot[pi,dataset]@git+https://github.com/huggingface/lerobot.git@v0.5.0"
              pip uninstall -y flash-attn 2>/dev/null || true

              # [2/3] HF Login (required for PaliGemma tokenizer — Gemma license)
              echo "[2/3] HuggingFace login..."
              python -c "from huggingface_hub import login; import os; login(token=os.environ['HF_TOKEN'])"

              # [3/3] Run evaluation
              echo "[3/3] Running evaluation on held-out episodes 80-99..."
              export HF_HOME="/fsx/hf-cache"

              EVAL_SCRIPT="/fsx/pi0-lerobot/evaluate_pi0.py"
              if [ ! -f "$EVAL_SCRIPT" ]; then
                echo "ERROR: $EVAL_SCRIPT not found on FSx."
                echo "Stage it first: copy src/evaluate_pi0.py to /fsx/pi0-lerobot/ on the PVC."
                exit 1
              fi

              python "$EVAL_SCRIPT" \
                --dataset droid \
                --finetuned-path /fsx/runs/pi0-droid/training/checkpoints/020000/pretrained_model \
                --test-dataset-local /fsx/datasets/droid_100 \
                --eval-episodes 80 81 82 83 84 85 86 87 88 89 90 91 92 93 94 95 96 97 98 99 \
                --results-out /fsx/runs/pi0-droid/eval_results_droid.json \
                --num-trajectories 5 \
                --num-inference-steps 10 5 3 1

              echo "============================================================"
              echo "  Done. Results: /fsx/runs/pi0-droid/eval_results_droid.json"
              echo "============================================================"
          env:
            - name: HF_TOKEN
              valueFrom:
                secretKeyRef:
                  name: pi0-lerobot-secrets
                  key: HF_TOKEN
          resources:
            limits:
              nvidia.com/gpu: 1
            requests:
              nvidia.com/gpu: 1
              cpu: "8"
              memory: "64Gi"
          volumeMounts:
            - name: fsx-volume
              mountPath: /fsx
            - name: dshm
              mountPath: /dev/shm
      volumes:
        - name: fsx-volume
          persistentVolumeClaim:
            claimName: fsx-claim
        - name: dshm
          emptyDir:
            medium: Memory
            sizeLimit: "32Gi"
