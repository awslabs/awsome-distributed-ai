# Pi0 LeRobot — DROID Fine-tuning PyTorchJob
# Trains π0 on DROID-100 with FSDP on 8× GPU via accelerate + lerobot-train.

apiVersion: "kubeflow.org/v1"
kind: PyTorchJob
metadata:
  name: pi0-lerobot-droid-finetune
  namespace: default
spec:
  runPolicy:
    ttlSecondsAfterFinished: 86400
    cleanPodPolicy: None
  pytorchReplicaSpecs:
    Worker:
      replicas: 1
      restartPolicy: Never
      template:
        metadata:
          labels:
            app: pi0-lerobot-droid-finetune
        spec:
          nodeSelector:
            # HyperPod EKS labels instances with "ml." prefix (ml.p5.48xlarge).
            # On plain EKS (managed node groups / Karpenter), use "p5.48xlarge" instead.
            node.kubernetes.io/instance-type: ml.p5.48xlarge
          tolerations:
            - key: nvidia.com/gpu
              operator: Exists
              effect: NoSchedule
          containers:
            - name: pytorch
              image: 763104351884.dkr.ecr.us-east-2.amazonaws.com/pytorch-training:2.9.0-gpu-py312-cu130-ubuntu22.04-sagemaker-v1.9
              imagePullPolicy: IfNotPresent
              command: ["/bin/bash", "-c"]
              args:
                - |
                  set -e
                  echo "============================================================"
                  echo "  Pi0 Fine-Tuning on HyperPod EKS (LeRobot PyTorch)"
                  echo "============================================================"

                  # --- Configuration ---
                  MAX_STEPS="${MAX_STEPS:-20000}"
                  BATCH_SIZE="${BATCH_SIZE:-4}"
                  SAVE_INTERVAL="${SAVE_INTERVAL:-2000}"
                  LEARNING_RATE="${LEARNING_RATE:-2.5e-5}"
                  ACTION_HORIZON="${ACTION_HORIZON:-50}"
                  DATASET_PATH="/fsx/datasets/droid_100"
                  OUTPUT_DIR="/fsx/runs/pi0-droid"
                  LOCAL_DATASET_NAME="droid_local"
                  RENAME_MAP='{"observation.images.exterior_image_1_left":"observation.images.base_0_rgb","observation.images.wrist_image_left":"observation.images.left_wrist_0_rgb"}'
                  EMPTY_CAMERAS=1

                  mkdir -p "$OUTPUT_DIR"
                  echo "  MAX_STEPS=$MAX_STEPS, BATCH_SIZE=$BATCH_SIZE, LR=$LEARNING_RATE"
                  echo "  DATASET=$DATASET_PATH, OUTPUT=$OUTPUT_DIR"

                  # --- Step 1: System deps ---
                  echo "[1/5] System deps..."
                  apt-get update -qq 2>/dev/null || true
                  apt-get install -y -qq git git-lfs ffmpeg libgl1-mesa-glx libglib2.0-0 2>/dev/null || true
                  export GIT_LFS_SKIP_SMUDGE=1
                  git config --global filter.lfs.clean cat
                  git config --global filter.lfs.smudge cat
                  git config --global filter.lfs.process ""
                  git config --global filter.lfs.required false

                  # --- Step 2: Install lerobot ---
                  echo "[2/5] Installing lerobot[pi,dataset]..."
                  pip install --quiet --upgrade pip
                  pip install --quiet "lerobot[pi,dataset]@git+https://github.com/huggingface/lerobot.git@v0.5.0"
                  # Remove flash_attn (CUDA 13 image, flash_attn needs CUDA 12)
                  pip uninstall -y flash-attn 2>/dev/null || true

                  python -c "
                  import torch
                  from lerobot.policies.pi0 import PI0Policy
                  print(f'PyTorch: {torch.__version__}, CUDA: {torch.cuda.is_available()}, GPUs: {torch.cuda.device_count()}')
                  "

                  # --- Install local-dataset patch (same as SageMaker version) ---
                  echo "  Installing lerobot local-dataset patch..."
                  USER_SITE=$(python -c "import site; print(site.getusersitepackages())")
                  mkdir -p "$USER_SITE"
                  cat > "$USER_SITE/lerobot_local_patch.py" <<'PATCHEOF'
                  import os
                  try:
                      from lerobot.datasets import utils as lr_utils
                      _orig_safe = lr_utils.get_safe_version
                      _orig_repo = lr_utils.get_repo_versions
                      def _is_local(repo_id):
                          return os.environ.get("HF_HUB_OFFLINE","0") in ("1","true","True") or "/" not in repo_id
                      def patched_get_safe_version(repo_id, version):
                          if _is_local(repo_id):
                              v = str(version)
                              return v if v.startswith("v") else f"v{v}"
                          return _orig_safe(repo_id, version)
                      def patched_get_repo_versions(repo_id):
                          return [] if _is_local(repo_id) else _orig_repo(repo_id)
                      lr_utils.get_safe_version = patched_get_safe_version
                      lr_utils.get_repo_versions = patched_get_repo_versions
                      try:
                          from lerobot.datasets import dataset_metadata as lr_meta
                          if hasattr(lr_meta, "get_safe_version"):
                              lr_meta.get_safe_version = patched_get_safe_version
                      except: pass
                      try:
                          import lerobot.datasets.lerobot_dataset as _lr_ds
                          if hasattr(_lr_ds, "get_safe_version"):
                              _lr_ds.get_safe_version = patched_get_safe_version
                          if hasattr(_lr_ds, "get_repo_versions"):
                              _lr_ds.get_repo_versions = patched_get_repo_versions
                      except: pass
                  except: pass
                  PATCHEOF
                  cat > "$USER_SITE/usercustomize.py" <<'PYEOF'
                  try:
                      import lerobot_local_patch
                  except Exception:
                      pass
                  PYEOF

                  # --- Step 3: HF Login ---
                  echo "[3/5] HuggingFace login..."
                  if [ -n "${HF_TOKEN:-}" ]; then
                    python -c "from huggingface_hub import login; import os; login(token=os.environ['HF_TOKEN'])"
                  fi

                  # --- Step 4: Setup dataset ---
                  echo "[4/5] Setting up dataset..."
                  export HF_HOME="/fsx/hf-cache"
                  export HF_LEROBOT_HOME="/fsx/lerobot-cache"
                  mkdir -p "$HF_HOME" "$HF_LEROBOT_HOME"

                  # Download DROID if not already on FSx
                  if [ ! -f "$DATASET_PATH/meta/info.json" ]; then
                    echo "  Downloading lerobot/droid_100..."
                    pip install --quiet --upgrade huggingface-hub
                    hf download lerobot/droid_100 --repo-type dataset --local-dir "$DATASET_PATH"
                  fi

                  ln -snf "$DATASET_PATH" "$HF_LEROBOT_HOME/$LOCAL_DATASET_NAME"
                  echo "  Dataset linked: $HF_LEROBOT_HOME/$LOCAL_DATASET_NAME -> $DATASET_PATH"

                  # --- Step 5: Launch training ---
                  echo "[5/5] Launching training..."
                  NUM_GPUS=$(python -c "import torch; print(torch.cuda.device_count())")
                  echo "  Using $NUM_GPUS GPUs"

                  export TORCHELASTIC_ERROR_FILE=/tmp/torch_error.json
                  export PYTHONUNBUFFERED=1

                  # Resume from existing checkpoint if available, otherwise start fresh
                  if [ -d "$OUTPUT_DIR/training/checkpoints" ] && ls "$OUTPUT_DIR/training/checkpoints"/*/pretrained_model/config.json 1>/dev/null 2>&1; then
                    echo "  Found existing checkpoints — training will resume from latest."
                  fi

                  pip install --quiet accelerate

                  accelerate launch \
                      --num_processes=$NUM_GPUS \
                      --num_machines=1 \
                      --use_fsdp \
                      --mixed_precision=bf16 \
                      --fsdp_sharding_strategy=FULL_SHARD \
                      --fsdp_auto_wrap_policy=TRANSFORMER_BASED_WRAP \
                      --fsdp_state_dict_type=SHARDED_STATE_DICT \
                      --fsdp_use_orig_params=true \
                      --fsdp_cpu_ram_efficient_loading=false \
                      --fsdp_sync_module_states=true \
                      --fsdp_offload_params=false \
                      $(which lerobot-train) \
                      --dataset.repo_id=$LOCAL_DATASET_NAME \
                      --dataset.root=$DATASET_PATH \
                      --dataset.video_backend=pyav \
                      --policy.path=lerobot/pi0_base \
                      --policy.repo_id=local/pi0_droid_finetune \
                      --policy.push_to_hub=false \
                      --policy.dtype=float32 \
                      --policy.device=cuda \
                      --policy.gradient_checkpointing=true \
                      --policy.chunk_size=$ACTION_HORIZON \
                      --policy.n_action_steps=$ACTION_HORIZON \
                      --policy.empty_cameras=$EMPTY_CAMERAS \
                      --rename_map="$RENAME_MAP" \
                      --steps=$MAX_STEPS \
                      --batch_size=$BATCH_SIZE \
                      --output_dir=$OUTPUT_DIR/training \
                      --job_name=pi0_droid_finetune \
                      --save_freq=$SAVE_INTERVAL \
                      --optimizer.lr=$LEARNING_RATE \
                      --num_workers=4

                  echo "============================================================"
                  echo "  Training complete. Output: $OUTPUT_DIR/training"
                  echo "============================================================"
              env:
                - name: HF_TOKEN
                  valueFrom:
                    secretKeyRef:
                      name: pi0-lerobot-secrets
                      key: HF_TOKEN
                      optional: true
                - name: NCCL_SOCKET_IFNAME
                  value: "^lo"
                - name: GLOO_SOCKET_IFNAME
                  value: "lo"
                - name: NCCL_DEBUG
                  value: "WARN"
                # NCCL_TIMEOUT is not a native NCCL variable but is read by some
                # framework-level process group implementations. Kept for consistency
                # with other test cases in this repo (e.g., openvla-oft).
                - name: NCCL_TIMEOUT
                  value: "1800"
              resources:
                limits:
                  nvidia.com/gpu: 8
                  vpc.amazonaws.com/efa: 32
                requests:
                  nvidia.com/gpu: 8
                  cpu: "90"
                  memory: "700Gi"
              volumeMounts:
                - name: fsx-volume
                  mountPath: /fsx
                - name: dshm
                  mountPath: /dev/shm
          volumes:
            - name: fsx-volume
              persistentVolumeClaim:
                claimName: fsx-claim
            - name: dshm
              emptyDir:
                medium: Memory
                sizeLimit: "128Gi"
