# Pi0 LeRobot — LIBERO Fine-tuning PyTorchJob
# Trains π0 on LIBERO-10 (episodes 0-399) with FSDP on 8× GPU.
# Uses the DLC image directly and installs LeRobot v0.5.0 at runtime.

apiVersion: "kubeflow.org/v1"
kind: PyTorchJob
metadata:
  name: pi0-lerobot-libero-finetune
  namespace: default
spec:
  runPolicy:
    ttlSecondsAfterFinished: 86400
    cleanPodPolicy: None
  pytorchReplicaSpecs:
    Worker:
      replicas: 1
      restartPolicy: Never
      template:
        metadata:
          labels:
            app: pi0-lerobot-libero-finetune
        spec:
          nodeSelector:
            # HyperPod EKS labels instances with "ml." prefix (ml.p5.48xlarge).
            # On plain EKS (managed node groups / Karpenter), use "p5.48xlarge" instead.
            node.kubernetes.io/instance-type: ml.p5.48xlarge
          tolerations:
            - key: nvidia.com/gpu
              operator: Exists
              effect: NoSchedule
          containers:
            - name: pytorch
              image: 763104351884.dkr.ecr.us-east-2.amazonaws.com/pytorch-training:2.9.0-gpu-py312-cu130-ubuntu22.04-sagemaker-v1.9
              imagePullPolicy: IfNotPresent
              command: ["/bin/bash", "-c"]
              args:
                - |
                  set -e
                  echo "============================================================"
                  echo "  Pi0 Fine-Tuning — LIBERO (episodes 0-399)"
                  echo "============================================================"

                  # --- Config ---
                  MAX_STEPS="${MAX_STEPS:-20000}"
                  BATCH_SIZE="${BATCH_SIZE:-4}"
                  SAVE_INTERVAL="${SAVE_INTERVAL:-2000}"
                  LEARNING_RATE="${LEARNING_RATE:-2.5e-5}"
                  ACTION_HORIZON="${ACTION_HORIZON:-50}"
                  DATASET_PATH="/fsx/datasets/libero_10"
                  OUTPUT_DIR="/fsx/runs/pi0-libero"
                  LOCAL_DATASET_NAME="libero_local"
                  RENAME_MAP='{"observation.images.exterior_image_1_left":"observation.images.base_0_rgb","observation.images.wrist_image_left":"observation.images.left_wrist_0_rgb","observation.images.image":"observation.images.base_0_rgb","observation.images.wrist_image":"observation.images.left_wrist_0_rgb"}'
                  EMPTY_CAMERAS=1

                  mkdir -p "$OUTPUT_DIR"
                  echo "  MAX_STEPS=$MAX_STEPS, BATCH_SIZE=$BATCH_SIZE, LR=$LEARNING_RATE"
                  echo "  DATASET=$DATASET_PATH, OUTPUT=$OUTPUT_DIR"

                  # [1/4] Install LeRobot
                  echo "[1/4] Installing LeRobot v0.5.0..."
                  export GIT_LFS_SKIP_SMUDGE=1
                  git config --global filter.lfs.clean cat
                  git config --global filter.lfs.smudge cat
                  git config --global filter.lfs.process ""
                  git config --global filter.lfs.required false
                  pip install --quiet --upgrade pip
                  pip install --quiet "lerobot[pi,dataset]@git+https://github.com/huggingface/lerobot.git@v0.5.0"
                  pip uninstall -y flash-attn 2>/dev/null || true

                  python -c "
                  import torch
                  from lerobot.policies.pi0 import PI0Policy
                  print(f'PyTorch: {torch.__version__}, CUDA: {torch.cuda.is_available()}, GPUs: {torch.cuda.device_count()}')
                  "

                  # [2/4] HF Login (required for PaliGemma tokenizer — Gemma license)
                  echo "[2/4] HuggingFace login..."
                  python -c "from huggingface_hub import login; import os; login(token=os.environ['HF_TOKEN'])"

                  # [3/4] Setup dataset
                  echo "[3/4] Setting up dataset..."
                  export HF_HOME="/fsx/hf-cache"
                  export HF_LEROBOT_HOME="/fsx/lerobot-cache"
                  mkdir -p "$HF_HOME" "$HF_LEROBOT_HOME"

                  if [ ! -f "$DATASET_PATH/meta/info.json" ]; then
                    echo "  Downloading lerobot/libero_10..."
                    hf download lerobot/libero_10 --repo-type dataset --local-dir "$DATASET_PATH"
                  fi

                  ln -snf "$DATASET_PATH" "$HF_LEROBOT_HOME/$LOCAL_DATASET_NAME"
                  echo "  Dataset linked: $HF_LEROBOT_HOME/$LOCAL_DATASET_NAME -> $DATASET_PATH"

                  # [4/4] Launch training
                  echo "[4/4] Launching training..."
                  NUM_GPUS=$(python -c "import torch; print(torch.cuda.device_count())")
                  echo "  Using $NUM_GPUS GPUs"

                  export TORCHELASTIC_ERROR_FILE=/tmp/torch_error.json
                  export PYTHONUNBUFFERED=1

                  # Handle existing output directory.
                  if [ -d "$OUTPUT_DIR/training" ]; then
                    if [ "${FORCE_RESTART:-0}" = "1" ]; then
                      echo "  FORCE_RESTART=1: removing existing $OUTPUT_DIR/training"
                      rm -rf "$OUTPUT_DIR/training"
                    else
                      echo "  ERROR: $OUTPUT_DIR/training already exists."
                      echo "  Set FORCE_RESTART=1 env var to delete and restart, or"
                      echo "  remove manually: kubectl exec ... -- rm -rf $OUTPUT_DIR/training"
                      exit 1
                    fi
                  fi

                  # Train episodes: use a Python one-liner to generate the list
                  TRAIN_EPS=$(python -c "print(str(list(range(400))))")

                  accelerate launch \
                      --num_processes=$NUM_GPUS \
                      --num_machines=1 \
                      --use_fsdp \
                      --mixed_precision=bf16 \
                      --fsdp_sharding_strategy=FULL_SHARD \
                      --fsdp_auto_wrap_policy=TRANSFORMER_BASED_WRAP \
                      --fsdp_state_dict_type=SHARDED_STATE_DICT \
                      --fsdp_use_orig_params=true \
                      --fsdp_cpu_ram_efficient_loading=false \
                      --fsdp_sync_module_states=true \
                      --fsdp_offload_params=false \
                      $(which lerobot-train) \
                      --dataset.repo_id=$LOCAL_DATASET_NAME \
                      --dataset.root=$DATASET_PATH \
                      --dataset.episodes="$TRAIN_EPS" \
                      --dataset.video_backend=pyav \
                      --policy.path=lerobot/pi0_base \
                      --policy.repo_id=local/pi0_libero_finetune \
                      --policy.push_to_hub=false \
                      --policy.dtype=float32 \
                      --policy.device=cuda \
                      --policy.gradient_checkpointing=true \
                      --policy.chunk_size=$ACTION_HORIZON \
                      --policy.n_action_steps=$ACTION_HORIZON \
                      --policy.empty_cameras=$EMPTY_CAMERAS \
                      --rename_map="$RENAME_MAP" \
                      --steps=$MAX_STEPS \
                      --batch_size=$BATCH_SIZE \
                      --output_dir=$OUTPUT_DIR/training \
                      --job_name=pi0_libero_finetune \
                      --save_freq=$SAVE_INTERVAL \
                      --optimizer.lr=$LEARNING_RATE \
                      --num_workers=4

                  echo "============================================================"
                  echo "  Training complete. Output: $OUTPUT_DIR/training"
                  echo "============================================================"
              env:
                - name: HF_TOKEN
                  valueFrom:
                    secretKeyRef:
                      name: pi0-lerobot-secrets
                      key: HF_TOKEN
                # Required: π0's PaliGemma processor requires Gemma license acceptance.
                - name: FORCE_RESTART
                  value: "0"
                - name: NCCL_SOCKET_IFNAME
                  value: "^lo"
                - name: GLOO_SOCKET_IFNAME
                  value: "lo"
                - name: NCCL_DEBUG
                  value: "WARN"
                # NCCL_TIMEOUT is not a native NCCL variable but is read by some
                # framework-level process group implementations. Kept for consistency
                # with other test cases in this repo (e.g., distillation, nemo-rl).
                - name: NCCL_TIMEOUT
                  value: "1800"
              resources:
                limits:
                  nvidia.com/gpu: 8
                  vpc.amazonaws.com/efa: 32
                requests:
                  nvidia.com/gpu: 8
                  cpu: "90"
                  memory: "700Gi"
              volumeMounts:
                - name: fsx-volume
                  mountPath: /fsx
                - name: dshm
                  mountPath: /dev/shm
          volumes:
            - name: fsx-volume
              persistentVolumeClaim:
                claimName: fsx-claim
            - name: dshm
              emptyDir:
                medium: Memory
                sizeLimit: "128Gi"
