# Pi0 LeRobot — LIBERO Dataset Download Job
#
# Stages lerobot/libero_10 onto the FSx PVC at /data/datasets/libero_10_{train,test}.
#
# Render: source env_vars && envsubst < libero-download.yaml | kubectl apply -f -

apiVersion: batch/v1
kind: Job
metadata:
  name: pi0-lerobot-libero-download
  namespace: ${NAMESPACE}
  labels:
    app: pi0-lerobot-libero-download
spec:
  ttlSecondsAfterFinished: 3600
  template:
    metadata:
      labels:
        app: pi0-lerobot-libero-download
    spec:
      restartPolicy: OnFailure
      containers:
        - name: download
          image: ${IMAGE_URI}
          imagePullPolicy: Always
          command: ["/bin/bash", "-c"]
          args:
            - |
              set -euo pipefail
              echo "=== Pi0 LeRobot — Downloading LIBERO-10 dataset ==="

              pip install --no-cache-dir 'hf_transfer>=0.1.6' 2>/dev/null || true
              export HF_HUB_ENABLE_HF_TRANSFER=1

              if [ -n "$${HF_TOKEN:-}" ]; then
                huggingface-cli login --token "$${HF_TOKEN}" 2>/dev/null || true
              fi

              TRAIN_DIR="/data/datasets/libero_10_train"
              TEST_DIR="/data/datasets/libero_10_test"

              echo "[1/3] Downloading lerobot/libero_10..."
              huggingface-cli download lerobot/libero_10 \
                --repo-type dataset \
                --local-dir /data/datasets/libero_10_full

              echo "[2/3] Splitting into train / test..."
              python3 -c "
              import shutil
              from pathlib import Path

              src = Path('/data/datasets/libero_10_full')
              train_dir = Path('${TRAIN_DIR}')
              test_dir = Path('${TEST_DIR}')

              if not train_dir.exists():
                  shutil.copytree(src, train_dir)
                  print(f'Train dataset at: {train_dir}')
              if not test_dir.exists():
                  shutil.copytree(src, test_dir)
                  print(f'Test dataset at: {test_dir}')
              "

              echo "[3/3] Verifying..."
              ls -la "$${TRAIN_DIR}/meta/" 2>/dev/null || echo "WARN: no meta/ in train"
              ls -la "$${TEST_DIR}/meta/" 2>/dev/null || echo "WARN: no meta/ in test"

              echo "=== Download complete ==="
          env:
            - name: HF_TOKEN
              valueFrom:
                secretKeyRef:
                  name: pi0-lerobot-secrets
                  key: HF_TOKEN
                  optional: true
            - name: HF_HOME
              value: "/data/hf-cache"
            - name: NVIDIA_VISIBLE_DEVICES
              value: "void"
          volumeMounts:
            - name: fsx-volume
              mountPath: /data
          resources:
            requests:
              cpu: "4"
              memory: "16Gi"
      volumes:
        - name: fsx-volume
          persistentVolumeClaim:
            claimName: ${DATA_PVC_NAME}
