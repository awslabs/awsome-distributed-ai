#
# PointWorld 3D World Model Pre-training - Kubernetes PyTorchJob
# Multi-domain DROID + BEHAVIOR, large PTv3 backbone.
# Targets 8 x p5en.48xlarge (64 x NVIDIA H200).
#
# Prerequisites:
#   - Kubeflow PyTorchJob operator (Training Operator) installed
#   - NVIDIA GPU device plugin enabled (nvidia.com/gpu)
#   - EFA device plugin enabled (vpc.amazonaws.com/efa)
#   - FSx for Lustre PVC named "fsx-claim" mounted at /fsx, containing:
#       /fsx/pointworld/dataset/droid/wds         (WDS shards from 1.convert_wds.py)
#       /fsx/pointworld/dataset/behavior/wds
#       /fsx/pointworld/dinov3/checkpoints/...     (gated DINOv3 weights, 2.download_dinov3.sh)
#   - Container image built from pointworld.Dockerfile and pushed to ECR
#
# Launch pattern:
#   The PyTorchJob operator sets MASTER_ADDR, MASTER_PORT, WORLD_SIZE, RANK and
#   (per-process) LOCAL_RANK. PointWorld's Trainer calls
#   dist.init_process_group(backend="nccl", init_method="env://") and reads
#   LOCAL_RANK directly, so torchrun + the operator env vars are sufficient -
#   no thin launcher is required.
#
# Usage:
#   kubectl apply -f pointworld-pretrain.yaml
#   kubectl logs -f pytorchjob/pointworld-pretrain-worker-0

apiVersion: kubeflow.org/v1
kind: PyTorchJob
metadata:
  name: pointworld-pretrain
  namespace: kubeflow
spec:
  pytorchReplicaSpecs:
    Worker:
      replicas: 8
      restartPolicy: OnFailure
      template:
        metadata:
          labels:
            app: pointworld-pretrain
        spec:
          containers:
            - name: pointworld
              # Replace with your ECR image URI (tag matches pinned commit in Dockerfile).
              image: <ACCOUNT_ID>.dkr.ecr.<REGION>.amazonaws.com/pointworld:05484826
              imagePullPolicy: Always
              workingDir: /pointworld
              # A small wrapper links the gated DINOv3 weights from FSx into the
              # path the scene featurizer expects (kept out of the image), then
              # execs torchrun. Doing this in the main container guarantees the
              # symlink lives in the same filesystem as the training process.
              command:
                - bash
                - -c
                - |
                  set -euo pipefail
                  mkdir -p /pointworld/third_party/dinov3/checkpoints
                  if [ -d /fsx/pointworld/dinov3/checkpoints ] && \
                     [ -n "$(ls -A /fsx/pointworld/dinov3/checkpoints 2>/dev/null)" ]; then
                    ln -sfn /fsx/pointworld/dinov3/checkpoints/* \
                      /pointworld/third_party/dinov3/checkpoints/
                    echo "Linked DINOv3 weights:"; ls -l /pointworld/third_party/dinov3/checkpoints/
                  else
                    echo "ERROR: DINOv3 weights not found at /fsx/pointworld/dinov3/checkpoints." >&2
                    echo "Run scripts/2.download_dinov3.sh first (gated Meta access)." >&2
                    exit 1
                  fi
                  # The PyTorchJob operator injects the torchrun rendezvous env
                  # (MASTER_ADDR, MASTER_PORT, WORLD_SIZE, RANK and the PET_*
                  # elastic variables), so torchrun only needs the local topology.
                  exec torchrun \
                    --nproc_per_node=8 \
                    --nnodes=8 \
                    train.py \
                    --distributed=true \
                    --domains=droid,behavior \
                    --data_dirs=/dataset/droid/wds,/dataset/behavior/wds \
                    --norm_stats_path=stats/droid_behavior \
                    --ptv3_size=large \
                    --batch_size=22 \
                    --num_workers=16 \
                    --eval_freq=-1 \
                    --save_freq=1800 \
                    --log_dir=/fsx/pointworld/train_logs \
                    --exp_name=pointworld-large-droid-behavior
              env:
                # PointWorld maps domains -> ${LOCAL_DATASET_DIR}/<domain>/wds.
                # We bind-mount the FSx WDS root here so /dataset/<domain>/wds resolves.
                - name: LOCAL_DATASET_DIR
                  value: /dataset
                - name: WANDB_MODE
                  value: disabled
                - name: NCCL_DEBUG
                  value: INFO
                - name: FI_PROVIDER
                  value: efa
                - name: FI_EFA_SET_CUDA_SYNC_MEMOPS
                  value: "0"
                - name: NCCL_SOCKET_IFNAME
                  value: "^docker,lo,veth"
                - name: PYTHONPATH
                  value: "/pointworld"
              resources:
                limits:
                  nvidia.com/gpu: 8
                  vpc.amazonaws.com/efa: 16
                  memory: 1100Gi
                requests:
                  nvidia.com/gpu: 8
                  vpc.amazonaws.com/efa: 16
                  cpu: "180"
                  memory: 1000Gi
              volumeMounts:
                - name: fsx
                  mountPath: /fsx
                # WDS shards live on FSx; expose them at the /dataset root that
                # LOCAL_DATASET_DIR points to (subPath keeps the droid/ behavior/ layout).
                - name: fsx
                  mountPath: /dataset
                  subPath: pointworld/dataset
                - name: shmem
                  mountPath: /dev/shm
          volumes:
            - name: fsx
              persistentVolumeClaim:
                claimName: fsx-claim
            - name: shmem
              emptyDir:
                medium: Memory
                sizeLimit: 256Gi
          tolerations:
            - key: nvidia.com/gpu
              operator: Exists
              effect: NoSchedule
