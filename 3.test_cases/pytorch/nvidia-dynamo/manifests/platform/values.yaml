# Dynamo platform values for this repo (operator + DynamoGraphDeployment pattern).
#
# The operator reconciles DynamoGraphDeployment (DGD) custom resources into the
# frontend/worker Deployments — this is NVIDIA's recommended Kubernetes path.
#
# Placement: the operator runs on the c6i control nodes; etcd + NATS run on the GPU
# workers because the c6i nodes cap at ~14 pods (filled by daemonsets) and can't fit
# all platform pods. Workers allow ~29 and have headroom.
#
# NOTE: the 0.7.0 chart pins a kube-rbac-proxy sidecar image that no longer exists
# (gcr.io/kubebuilder/...). 01-install-platform.sh patches it to the quay.io/brancz
# mirror right after install (the image tag isn't exposed as a Helm value).
#
# PORTABILITY: the nodeSelectors below use SageMaker HyperPod instance-group labels
# (`sagemaker.amazonaws.com/instance-group-name`), so the group names `dynamo-control`
# and `dynamo-workers` are load-bearing here. On a standard (non-HyperPod) EKS cluster
# that label doesn't exist — replace these nodeSelectors with one your nodes carry, e.g.
# `node.kubernetes.io/instance-type: <type>` or your own node-group label. (The scenario
# manifests already use the portable `node.kubernetes.io/instance-type` affinity instead.)

dynamo-operator:
  enabled: true
  controllerManager:
    nodeSelector:
      sagemaker.amazonaws.com/instance-group-name: dynamo-control
    tolerations: []

etcd:
  persistence:
    storageClass: "gp2"
  nodeSelector:
    sagemaker.amazonaws.com/instance-group-name: dynamo-workers

nats:
  natsBox:
    enabled: true
  config:
    jetstream:
      enabled: true
      fileStore:
        pvc:
          storageClassName: "gp2"
  nodeSelector:
    sagemaker.amazonaws.com/instance-group-name: dynamo-workers
