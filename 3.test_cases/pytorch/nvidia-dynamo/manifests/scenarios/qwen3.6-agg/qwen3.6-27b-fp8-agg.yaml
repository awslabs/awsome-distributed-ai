# Scenario: Qwen3.6-27B-FP8 — Aggregated (1 worker = prefill+decode, 1 GPU)
# Managed by the Dynamo operator via a DynamoGraphDeployment (CRD). Operator wires
# etcd/NATS discovery. Hybrid (Gated DeltaNet) multimodal model; FP8 fits one L40S.
apiVersion: nvidia.com/v1alpha1
kind: DynamoGraphDeployment
metadata:
  name: qwen36-agg
  namespace: dynamo-system
  labels:
    app: qwen36-agg
spec:
  services:
    Frontend:
      dynamoNamespace: qwen36-agg
      componentType: frontend
      replicas: 1
      resources:
        requests: { memory: "4Gi", cpu: "1" }
        limits: { memory: "8Gi", cpu: "2" }
      extraPodSpec:
        mainContainer:
          image: nvcr.io/nvidia/ai-dynamo/sglang-runtime:1.2.1
          env:
            - { name: HF_HUB_OFFLINE, value: "1" }
          command: ["python3"]
          args: ["-m", "dynamo.frontend", "--http-port", "8000"]
          ports:
            - { name: http, containerPort: 8000, protocol: TCP }
          volumeMounts:
            - { name: fsx, mountPath: /fsx, readOnly: true }
        volumes:
          - name: fsx
            persistentVolumeClaim: { claimName: dynamo-fsx }
        affinity:
          nodeAffinity:
            requiredDuringSchedulingIgnoredDuringExecution:
              nodeSelectorTerms:
                - matchExpressions:
                    - key: node.kubernetes.io/instance-type
                      operator: In
                      values: ["ml.g6e.4xlarge", "g6e.4xlarge"]   # HyperPod (ml.) / standard EKS
        tolerations:
          - { effect: NoSchedule, key: nvidia.com/gpu, operator: Exists }
    worker:
      dynamoNamespace: qwen36-agg
      componentType: worker
      replicas: 1
      resources:
        requests: { memory: "40Gi", cpu: "4" }
        limits: { memory: "60Gi", cpu: "6", gpu: "1" }
      extraPodSpec:
        mainContainer:
          image: nvcr.io/nvidia/ai-dynamo/sglang-runtime:1.2.1
          workingDir: /workspace/examples/backends/sglang
          env:
            - { name: HF_HUB_OFFLINE, value: "1" }
          command: ["python3", "-m", "dynamo.sglang"]
          args:
            - --model-path
            - /fsx/models/qwen3.6-27b-fp8
            - --served-model-name
            - Qwen/Qwen3.6-27B-FP8
            - --tp
            - "1"
            # required: Qwen3.6 ships custom modeling code (hybrid Gated DeltaNet + attn);
            #   weights come from the official Hugging Face repo, so remote code is trusted.
            - --trust-remote-code
            - --skip-tokenizer-init
            - --context-length
            - "32768"
            - --mem-fraction-static
            - "0.85"
            - --dyn-reasoning-parser
            - qwen3
            - --dyn-tool-call-parser
            - qwen3_coder
          volumeMounts:
            - { name: fsx, mountPath: /fsx, readOnly: true }
        volumes:
          - name: fsx
            persistentVolumeClaim: { claimName: dynamo-fsx }
        affinity:
          nodeAffinity:
            requiredDuringSchedulingIgnoredDuringExecution:
              nodeSelectorTerms:
                - matchExpressions:
                    - key: node.kubernetes.io/instance-type
                      operator: In
                      values: ["ml.g6e.4xlarge", "g6e.4xlarge"]   # HyperPod (ml.) / standard EKS
        tolerations:
          - { effect: NoSchedule, key: nvidia.com/gpu, operator: Exists }
