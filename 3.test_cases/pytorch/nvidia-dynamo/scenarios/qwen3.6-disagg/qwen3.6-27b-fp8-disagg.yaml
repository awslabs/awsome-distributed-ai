# Scenario: Qwen3.6-27B-FP8 — Disaggregated (separate prefill + decode workers, 2 GPUs)
# Managed by the Dynamo operator (DGD). KV transfer via NIXL.
# IMPORTANT: the hybrid (Gated DeltaNet) decode worker reserves a per-slot SSM/mamba
# state; on a 48GB L40S you MUST cap --max-running-requests (and lower mem-fraction)
# or decode OOMs allocating the mamba cache. 16 slots fits alongside the FP8 weights.
apiVersion: nvidia.com/v1alpha1
kind: DynamoGraphDeployment
metadata:
  name: qwen36-disagg
  namespace: dynamo-system
  labels:
    app: qwen36-disagg
spec:
  services:
    Frontend:
      dynamoNamespace: qwen36-disagg
      componentType: frontend
      replicas: 1
      resources:
        requests: { memory: "4Gi", cpu: "1" }
        limits: { memory: "8Gi", cpu: "2" }
      extraPodSpec:
        mainContainer:
          image: nvcr.io/nvidia/ai-dynamo/sglang-runtime:1.2.1
          env:
            - { name: HF_HUB_OFFLINE, value: "1" }
          command: ["python3"]
          args: ["-m", "dynamo.frontend", "--http-port", "8000"]
          ports:
            - { name: http, containerPort: 8000, protocol: TCP }
          volumeMounts:
            - { name: fsx, mountPath: /fsx, readOnly: true }
        volumes:
          - name: fsx
            persistentVolumeClaim: { claimName: dynamo-fsx }
        nodeSelector:
          sagemaker.amazonaws.com/instance-group-name: dynamo-workers
        tolerations:
          - { effect: NoSchedule, key: nvidia.com/gpu, operator: Exists }
    prefill:
      dynamoNamespace: qwen36-disagg
      componentType: worker
      subComponentType: prefill
      replicas: 1
      resources:
        requests: { memory: "40Gi", cpu: "4" }
        limits: { memory: "60Gi", cpu: "6", gpu: "1" }
      extraPodSpec:
        mainContainer:
          image: nvcr.io/nvidia/ai-dynamo/sglang-runtime:1.2.1
          workingDir: /workspace/examples/backends/sglang
          env:
            - { name: HF_HUB_OFFLINE, value: "1" }
          command: ["python3", "-m", "dynamo.sglang"]
          args:
            - --model-path
            - /fsx/models/qwen3.6-27b-fp8
            - --served-model-name
            - Qwen/Qwen3.6-27B-FP8
            - --tp
            - "1"
            - --trust-remote-code
            - --skip-tokenizer-init
            - --context-length
            - "32768"
            - --mem-fraction-static
            - "0.80"
            - --max-running-requests
            - "16"
            - --disaggregation-mode
            - prefill
            - --disaggregation-transfer-backend
            - nixl
            - --disaggregation-bootstrap-port
            - "12345"
            - --dyn-reasoning-parser
            - qwen3
            - --dyn-tool-call-parser
            - qwen3_coder
            - --host
            - 0.0.0.0
          volumeMounts:
            - { name: fsx, mountPath: /fsx, readOnly: true }
        volumes:
          - name: fsx
            persistentVolumeClaim: { claimName: dynamo-fsx }
        nodeSelector:
          sagemaker.amazonaws.com/instance-group-name: dynamo-workers
        tolerations:
          - { effect: NoSchedule, key: nvidia.com/gpu, operator: Exists }
    decode:
      dynamoNamespace: qwen36-disagg
      componentType: worker
      subComponentType: decode
      replicas: 1
      resources:
        requests: { memory: "40Gi", cpu: "4" }
        limits: { memory: "60Gi", cpu: "6", gpu: "1" }
      extraPodSpec:
        mainContainer:
          image: nvcr.io/nvidia/ai-dynamo/sglang-runtime:1.2.1
          workingDir: /workspace/examples/backends/sglang
          env:
            - { name: HF_HUB_OFFLINE, value: "1" }
          command: ["python3", "-m", "dynamo.sglang"]
          args:
            - --model-path
            - /fsx/models/qwen3.6-27b-fp8
            - --served-model-name
            - Qwen/Qwen3.6-27B-FP8
            - --tp
            - "1"
            - --trust-remote-code
            - --skip-tokenizer-init
            - --context-length
            - "32768"
            - --mem-fraction-static
            - "0.80"
            - --max-running-requests
            - "16"
            - --disaggregation-mode
            - decode
            - --disaggregation-transfer-backend
            - nixl
            - --disaggregation-bootstrap-port
            - "12345"
            - --dyn-reasoning-parser
            - qwen3
            - --dyn-tool-call-parser
            - qwen3_coder
            - --host
            - 0.0.0.0
          volumeMounts:
            - { name: fsx, mountPath: /fsx, readOnly: true }
        volumes:
          - name: fsx
            persistentVolumeClaim: { claimName: dynamo-fsx }
        nodeSelector:
          sagemaker.amazonaws.com/instance-group-name: dynamo-workers
        tolerations:
          - { effect: NoSchedule, key: nvidia.com/gpu, operator: Exists }
