#
# OPTIONAL: only needed if you must authenticate to gated HuggingFace repos.
# The default DreamZero/umt5/libero repos are public and download anonymously.
# Create with: kubectl -n ${NAMESPACE} create secret generic hf-token \
#   --from-literal=HF_TOKEN=hf_xxx
apiVersion: v1
kind: Secret
metadata:
  name: hf-token
  namespace: ${NAMESPACE}
type: Opaque
stringData:
  HF_TOKEN: "REPLACE_WITH_YOUR_HF_TOKEN"
