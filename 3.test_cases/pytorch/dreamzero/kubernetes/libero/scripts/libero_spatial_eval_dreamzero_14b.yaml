# libero_spatial_eval_dreamzero_14b.yaml
# =============================================================================
# DreamZero 14B LIBERO-Spatial simulator eval config (RLinf-on-EKS variant).
#
# WHY THIS FILE EXISTS:
#   Upstream RLinf only ships a *5B* embodied eval config
#   (examples/embodiment/config/libero_spatial_eval_dreamzero.yaml), which pins
#   the 5B WAM architecture (`model/dreamzero_5b@actor.model`: dim 3072, 30
#   layers) and Wan2.2-TI2V-5B component paths. OUR trained checkpoint is the
#   14B WAM (dim 5120, 40 layers), warm-started from DreamZero-DROID and SFT'd on
#   LIBERO (examples/sft/config/libero_sft_dreamzero_14b.yaml). Evaluating a 14B
#   full_weights.pt against a 5B model architecture fails to load
#   (HuggingFaceWorker.init_worker -> model.load_state_dict(model_dict) is a
#   strict load; the parameter shapes will not match). This config selects the
#   14B architecture instead.
#
# HOW THE 14B ARCHITECTURE RESOLVES:
#   The embodied eval entrypoint (examples/embodiment/eval_embodied_agent.py)
#   runs with `--config-path config`, i.e. examples/embodiment/config/. That
#   directory ships ONLY model/dreamzero_5b.yaml -- there is no
#   model/dreamzero_14b.yaml there. The 14B architecture lives in the SFT config
#   tree at examples/sft/config/model/dreamzero_14b.yaml. We therefore add the
#   SFT config dir to the Hydra `searchpath` below so the
#   `model/dreamzero_14b@actor.model` default resolves at eval time. The path is
#   the deterministic in-container location (RLinf/ is COPYed to /workspace/RLinf
#   by examples/Dockerfile).
#
#   Unlike the SFT path (validate_dreamzero_sft_model_cfg merges the checkpoint's
#   config.json into actor.model), the EMBODIED eval path (validate_embodied_cfg)
#   does NOT merge config.json. The architecture comes entirely from this YAML,
#   so the `model/dreamzero_14b` default must be 14B-correct on its own.
#
# HOW THIS FILE IS DELIVERED TO THE CONTAINER:
#   This file lives in OUR repo (examples/dreamzero/configs/), NOT upstream. At
#   runtime it is mounted into the eval pod via the `dreamzero-eval-config`
#   ConfigMap at /opt/eval-config/, and run_dreamzero_eval_eks.sh copies it into
#   /workspace/RLinf/examples/embodiment/config/ before invoking the eval (so
#   `--config-path config` finds it WITHOUT hiding the upstream env/ and model/
#   config groups it depends on). See examples/dreamzero/manifests/dreamzero-eval.yaml.
#
# DROID action space: 8D (7 joint + gripper); model outputs action chunks.
# =============================================================================

defaults:
  - env/libero_spatial@env.train
  - env/libero_spatial@env.eval
  # 14B WAM architecture (NOT the 5B model/dreamzero_5b). Resolved from the SFT
  # config tree via the hydra.searchpath entry below.
  - model/dreamzero_14b@actor.model
  - training_backend/fsdp@actor.fsdp_config
  - weight_syncer/patch_syncer@weight_syncer
  - override hydra/job_logging: stdout

hydra:
  run:
    dir: .
  output_subdir: null
  searchpath:
    - file://${oc.env:EMBODIED_PATH}/config/
    # The 14B model arch (model/dreamzero_14b.yaml) ships only under the SFT
    # config tree, not the embodiment one. Add it to the searchpath so the
    # `model/dreamzero_14b@actor.model` default above resolves. This is the
    # deterministic in-container path (examples/Dockerfile COPYs RLinf/ here).
    - file:///workspace/RLinf/examples/sft/config/

cluster:
  num_nodes: 1
  component_placement:
    actor,env,rollout: all

runner:
  task_type: embodied
  logger:
    log_path: "../results"
    project_name: rlinf
    experiment_name: "libero_spatial_eval_dreamzero_14b"
    logger_backends: ["tensorboard"]

  max_epochs: 1
  only_eval: True
  val_check_interval: -1
  save_interval: -1
  resume_dir: null
  ckpt_path: /path/to/model.pt

algorithm:
  normalize_advantages: True
  kl_penalty: kl
  group_size: 4
  rollout_epoch: 1
  eval_rollout_epoch: 1

  reward_type: chunk_level
  logprob_type: chunk_level
  entropy_type: chunk_level

  update_epoch: 5
  adv_type: grpo
  loss_type: actor_critic

  gamma: 0.99
  gae_lambda: 0.95
  bootstrap_type: always
  kl_beta: 0.0
  entropy_bonus: 0.005
  clip_ratio_high: 0.2
  clip_ratio_low: 0.2
  clip_ratio_c: 3.0
  value_clip: 0.2
  huber_delta: 10.0

  length_params:
    max_new_token: null
    max_length: 1024
    min_length: 1

  sampling_params:
    do_sample: True
    temperature_train: 1.0
    temperature_eval: 0.6
    top_k: 50
    top_p: 1.0
    repetition_penalty: 1.0

env:
  group_name: "EnvGroup"

  train:
    total_num_envs: 8
    max_episode_steps: 480
    max_steps_per_rollout_epoch: 480

  eval:
    # LIBERO-Spatial: 10 tasks x 50 trials = 500 init states. With total_num_envs parallel envs,
    # set max_steps_per_rollout_epoch to ceil(500/total_num_envs) * max_episode_steps so auto_reset
    # cycles through the full suite within one eval_rollout_epoch (see vla-eval.rst).
    #
    # GPU-MEMORY NOTE (14B): the upstream 5B eval uses total_num_envs=128, but the
    # 16.48B DreamZero model + LIBERO sim co-located on one node's 8x H200 (139GB
    # each) OOMs at 128 envs (only ~280MB free on GPU 0). 16 envs fits comfortably.
    # Increase only if you add nodes or reduce per-GPU model memory. For a quick
    # smoke eval, override to 8 via HYDRA_OVERRIDES.
    total_num_envs: 16
    auto_reset: True
    ignore_terminations: True
    max_episode_steps: 480
    max_steps_per_rollout_epoch: 960  # ceil(500/16) * ... -> covers the suite; raise for full coverage
    group_size: 1
    use_fixed_reset_state_ids: True
    use_ordered_reset_state_ids: True
    is_eval: True

    video_cfg:
      save_video: True
      video_base_dir: ${runner.logger.log_path}/video/eval

rollout:
  group_name: "RolloutGroup"
  generation_backend: "huggingface"
  enable_offload: False
  pipeline_stage_num: 1

  model:
    model_path: ${actor.model.model_path}
    precision: ${actor.model.precision}

actor:
  group_name: "ActorGroup"
  training_backend: "fsdp"
  micro_batch_size: 1
  global_batch_size: 64
  seed: 0
  enable_offload: False

  model:
    model_type: "dreamzero"
    precision: bf16
    # model_path is set to /fsx/models/DreamZero-DROID by the launcher
    # (actor.model.model_path=${MODEL_PATH}). The DreamZero-DROID safetensors
    # provide the 14B backbone init; our trained full_weights.pt (runner.ckpt_path)
    # is then strict-loaded over it. Leave null here so the launcher controls it.
    model_path: null
    # umt5-xxl tokenizer. Launcher overrides to /fsx/models/umt5-xxl.
    tokenizer_path: google/umt5-xxl  # https://huggingface.co/google/umt5-xxl

    # NOTE (5B vs 14B): the upstream 5B eval config OVERRIDES the component
    # pretrained paths here to Wan2.2-TI2V-5B (diffusion/image/text/vae). We do
    # NOT do that for 14B. model/dreamzero_14b.yaml already sets all four
    # component paths to null, and skip_component_loading is enabled at build
    # time when full DreamZero safetensors are present under model_path
    # (rlinf/models/embodiment/dreamzero/__init__.py). The 14B backbone weights
    # come from the DreamZero-DROID safetensors + our full_weights.pt, NOT from a
    # 5B Wan2.2-TI2V-5B download. Re-specifying 5B paths here would force a wrong
    # (5B) backbone build, so they are intentionally omitted (left null).

    # Dataset-generated metadata.json for normalisation statistics (libero_sim).
    # Generate with: python toolkits/lerobot/generate_dreamzero_metadata.py \
    #   --preset libero_sim --dataset-root /path/to/libero --output-metadata /path/to/metadata.json
    # IMPORTANT: keep this COMMENTED OUT. model/dreamzero_14b.yaml does not define
    # metadata_json_path, so the launcher ADDS it with the Hydra '+' prefix
    # (+actor.model.metadata_json_path=${METADATA_PATH}). Defining it here would
    # make the '+' append fail ("key already exists").
    # metadata_json_path: /path/to/metadata.json

    embodiment_tag: "libero_sim"

    is_lora: False
    # LIBERO temporal alignment: action_horizon, num_action_chunks and
    # num_action_per_block must all be 16 (same fix as the LIBERO SFT path).
    # model/dreamzero_14b.yaml defaults num_action_per_block to 24 (a DROID
    # value); overriding to 16 keeps num_action_per_block // num_frame_per_block
    # consistent with the LIBERO action layout (see run_dreamzero_sft_eks.sh).
    action_horizon: 16
    num_action_chunks: 16
    num_action_per_block: 16
    # 14B render size (model/dreamzero_14b.yaml: 352x640). This differs from the
    # 5B eval config, which uses 160x320. The video tile/stride geometry of the
    # 14B DiT expects the larger frame.
    target_video_height: 352
    target_video_width: 640


  fsdp_config:
    strategy: "fsdp"
    gradient_checkpointing: False
    mixed_precision:
      param_dtype: ${actor.model.precision}
      reduce_dtype: ${actor.model.precision}
      buffer_dtype: ${actor.model.precision}

reward:
  use_reward_model: False

critic:
  use_critic_model: False
