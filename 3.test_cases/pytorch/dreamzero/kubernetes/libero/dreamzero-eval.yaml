# DreamZero LIBERO 14B Simulator Eval (single-node GPU Job)
# =============================================================================
# Evaluates a trained DreamZero 14B checkpoint (full_weights.pt) in the LIBERO
# Spatial simulator via upstream examples/embodiment/eval_embodied_agent.py,
# reporting success_once and saving in-sim rollout videos.
#
# This is a single-pod GPU Job (NOT a StatefulSet): the eval config pins
# cluster.num_nodes=1, so there is no Ray head/worker split. The 14B model is
# sharded across the 8 GPUs of one p5en.48xlarge node with single-node FSDP.
#
# Prerequisites:
#   - SFT checkpoint converted to a single .pt (convert-checkpoint.yaml), at
#       /fsx/checkpoints/dreamzero-libero-sft/libero_sft_dreamzero/checkpoints/
#         global_step_1/actor/model_state_dict/full_weights.pt
#   - LIBERO normalization metadata generated (generate-metadata.yaml) at
#       /fsx/models/metadata-libero.json
#   - umt5-xxl tokenizer + DreamZero-DROID backbone staged on FSx
#       (/fsx/models/umt5-xxl, /fsx/models/DreamZero-DROID)
#   - LIBERO dataset/assets staged (model-download.yaml)
#   - Container image built and pushed to ECR (build-push.sh)
#   - FSx PVC "fsx-claim" bound; training-sa ServiceAccount exists
#
# ConfigMaps (create BOTH before applying this manifest):
#   # 1) the eval launcher script:
#   kubectl -n ${NAMESPACE} create configmap dreamzero-eval-launcher \
#     --from-file=run_dreamzero_eval_eks.sh=kubernetes/libero/scripts/run_dreamzero_eval_eks.sh \
#     --dry-run=client -o yaml | kubectl apply -f -
#   # 2) the 14B eval config (mounted at /opt/eval-config, copied into the
#   #    embodiment config dir by the launcher so upstream config groups stay visible):
#   kubectl -n ${NAMESPACE} create configmap dreamzero-eval-config \
#     --from-file=libero_spatial_eval_dreamzero_14b.yaml=kubernetes/libero/scripts/libero_spatial_eval_dreamzero_14b.yaml \
#     --dry-run=client -o yaml | kubectl apply -f -
#
# Apply (RESTRICTED envsubst -- substitute ONLY ${ECR_URI} and ${NAMESPACE} so the
# inline ${PYTHONPATH:-} guards in the bootstrap are NOT clobbered):
#   export ECR_URI=<account>.dkr.ecr.<region>.amazonaws.com/<repo>
#   export NAMESPACE=natharno
#   envsubst '${ECR_URI} ${NAMESPACE}' < kubernetes/libero/dreamzero-eval.yaml | kubectl apply -f -
---
apiVersion: batch/v1
kind: Job
metadata:
  name: dreamzero-eval
  namespace: ${NAMESPACE}
  labels:
    app: dreamzero-eval
    reference: rlinf
    example: dreamzero-eval
spec:
  backoffLimit: 0
  ttlSecondsAfterFinished: 86400
  template:
    metadata:
      labels:
        app: dreamzero-eval
        example: dreamzero-eval
      annotations:
        karpenter.sh/do-not-disrupt: "true"
    spec:
      # Job: do not restart-loop on eval failure.
      restartPolicy: Never
      serviceAccountName: training-sa
      tolerations:
        - key: nvidia.com/gpu
          operator: Exists
          effect: NoSchedule
      terminationGracePeriodSeconds: 120
      containers:
        - name: eval
          image: ${ECR_URI}:latest
          command:
            - bash
            - /opt/scripts/run_dreamzero_eval_eks.sh
          env:
            # --- DreamZero LIBERO 14B eval config ---
            - name: VENV_NAME
              value: "dreamzero"
            - name: CONFIG_NAME
              value: "libero_spatial_eval_dreamzero_14b"
            # full_weights.pt produced by convert-checkpoint.yaml from the SFT DCP.
            - name: CKPT_PT
              value: "/fsx/checkpoints/dreamzero-libero-sft/libero_sft_dreamzero/checkpoints/global_step_1/actor/model_state_dict/full_weights.pt"
            # LIBERO (libero_sim) normalization metadata, generated by generate-metadata.yaml.
            - name: METADATA_PATH
              value: "/fsx/models/metadata-libero.json"
            - name: TOKENIZER_PATH
              value: "/fsx/models/umt5-xxl"
            - name: MODEL_PATH
              value: "/fsx/models/DreamZero-DROID"
            - name: LOG_DIR
              value: "/fsx/checkpoints/dreamzero-libero-eval"
            - name: SAVE_VIDEO
              value: "True"
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            # --- NCCL + EFA (matches dreamzero-sft.yaml) ---
            - name: NCCL_DEBUG
              value: "INFO"
            - name: FI_PROVIDER
              value: "efa"
            - name: FI_EFA_USE_DEVICE_RDMA
              value: "1"
            - name: FI_EFA_FORK_SAFE
              value: "1"
            - name: PYTORCH_CUDA_ALLOC_CONF
              value: "expandable_segments:True"
            - name: TOKENIZERS_PARALLELISM
              value: "true"
            - name: TORCH_NCCL_AVOID_RECORD_STREAMS
              value: "1"
            - name: NVIDIA_DRIVER_CAPABILITIES
              value: "all"
          resources:
            requests:
              nvidia.com/gpu: 8
              vpc.amazonaws.com/efa: 16
              cpu: "90"
              memory: "1000Gi"
            limits:
              nvidia.com/gpu: 8
              vpc.amazonaws.com/efa: 16
              cpu: "96"
              memory: "1100Gi"
          volumeMounts:
            - name: fsx
              mountPath: /fsx
            - name: dshm
              mountPath: /dev/shm
            - name: scripts
              mountPath: /opt/scripts
              readOnly: true
            - name: eval-config
              mountPath: /opt/eval-config
              readOnly: true
      volumes:
        - name: fsx
          persistentVolumeClaim:
            claimName: fsx-claim
        - name: dshm
          emptyDir:
            medium: Memory
            sizeLimit: "128Gi"
        - name: scripts
          configMap:
            name: dreamzero-eval-launcher
            optional: false
        - name: eval-config
          configMap:
            name: dreamzero-eval-config
            optional: false
